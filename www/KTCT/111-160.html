<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn thi KTCT Mác-Lênin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:#ececef;min-height:100vh}

/* Header */
.header{background:#1565C0;color:#fff;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.header-left{display:flex;align-items:center;gap:10px}
.header-icon{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer}
.header-title{font-size:17px;font-weight:600}
.nop-bai{display:flex;align-items:center;gap:6px;background:#fff;border:none;border-radius:20px;padding:7px 14px;cursor:pointer;font-size:14px;font-weight:700;color:#1565C0;box-shadow:0 2px 8px rgba(0,0,0,0.15);transition:all .15s;font-family:inherit}
.nop-bai:hover{background:#f0f6ff;transform:scale(1.03)}

/* Timer */
.timer-bar{background:#1976D2;padding:6px 16px;display:flex;align-items:center;justify-content:space-between}
.timer-txt{color:#fff;font-size:14px;font-weight:600;letter-spacing:0.5px}
.progress-info{color:rgba(255,255,255,0.8);font-size:13px}

/* Progress bar */
.prog-bar-wrap{height:5px;background:#e0e0e0;display:flex}
.prog-seg{height:5px;transition:background .3s}

/* Tabs */
.tabs-wrap{background:#fff;border-bottom:1px solid #e0e0e0;overflow-x:auto;display:flex;gap:0;position:sticky;top:44px;z-index:99}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab-item{flex-shrink:0;padding:12px 16px;font-size:14px;font-weight:500;color:#666;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;position:relative}
.tab-item.active{color:#1565C0;border-bottom-color:#1565C0;font-weight:700}
.tab-item.answered-ok{color:#2e7d32}
.tab-item.answered-ng{color:#c62828}
.tab-item.answered-skip{color:#bbb}

/* Question area */
.q-wrap{padding:16px;max-width:700px;margin:0 auto}
.q-number{font-size:14px;color:#1565C0;font-weight:600;margin-bottom:8px}
.q-text{font-size:17px;font-weight:700;color:#1a1a1a;line-height:1.65;margin-bottom:18px}

/* Options */
.options{display:flex;flex-direction:column;gap:10px}
.opt-item{
  display:flex;align-items:center;gap:14px;
  padding:17px 16px;
  border-radius:12px;
  border:2px solid transparent;
  cursor:pointer;
  background:#fff;
  box-shadow:0 1px 4px rgba(0,0,0,0.07);
  transition:background .15s, border-color .15s, box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.opt-item:not(.disabled):hover{background:#f0f4ff;border-color:#c5d8f8}
.opt-item:not(.disabled):hover .opt-num{border-color:#1976D2;color:#1565C0}

/* Pending */
.opt-item.selected-pending{background:#e8f0fe;border-color:#1565C0}
.opt-item.selected-pending .opt-num{border-color:#1565C0;color:#1565C0;background:#dce8fc}
.opt-item.selected-pending .opt-text{color:#0d47a1;font-weight:600}

/* Correct */
.opt-item.selected-ok{background:#e8f5e9;border-color:#43a047}
.opt-item.selected-ok .opt-num{background:#43a047;border-color:#43a047;color:#fff}
.opt-item.selected-ok .opt-text{color:#2e7d32;font-weight:600}
.opt-item.show-correct{background:#e8f5e9;border-color:#43a047}
.opt-item.show-correct .opt-num{background:#43a047;border-color:#43a047;color:#fff}
.opt-item.show-correct .opt-text{color:#2e7d32;font-weight:600}

/* Wrong */
.opt-item.selected-ng{background:#ffebee;border-color:#e53935}
.opt-item.selected-ng .opt-num{background:#e53935;border-color:#e53935;color:#fff}
.opt-item.selected-ng .opt-text{color:#c62828;font-weight:600}

.opt-item.disabled{cursor:default;pointer-events:none}

.opt-num{
  width:36px;height:36px;border-radius:50%;
  border:2px solid #d0d0d0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#888;
  flex-shrink:0;
  transition:all .15s;
  background:#fff;
}
.opt-text{font-size:15px;color:#1a1a1a;line-height:1.5;flex:1}

/* Explanation */
.explain-box{margin-top:14px;padding:13px 14px;border-radius:12px;background:#fffde7;border-left:4px solid #f9a825;display:flex;gap:10px;align-items:flex-start}
.explain-box.correct-box{background:#e8f5e9;border-left-color:#43a047}
.explain-box.wrong-box{background:#ffebee;border-left-color:#e53935}
.explain-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.explain-content{}
.explain-label{font-size:13px;font-weight:700;color:#f57f17;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.explain-box.correct-box .explain-label{color:#2e7d32}
.explain-box.wrong-box .explain-label{color:#c62828}
.explain-text{font-size:15px;color:#333;line-height:1.6}

/* Bottom nav */
.fnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:100;max-width:700px;margin:0 auto}
.fnav-center{font-size:14px;color:#555;font-weight:500;display:flex;align-items:center;gap:6px;cursor:pointer}
.fnav-center svg{color:#1565C0}
.nav-btn{width:42px;height:42px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:all .18s}
.btn-prev{background:#f0f2f5;color:#444}
.btn-prev:hover{background:#e0e0e0}
.btn-next{background:#1565C0;color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.35)}
.btn-next:hover{background:#0d47a1}
.nav-btn:disabled{opacity:0.35;cursor:not-allowed}

/* Summary */
.sum-wrap{padding:24px 16px 100px;max-width:700px;margin:0 auto;text-align:center}
.sum-emoji{font-size:56px;margin-bottom:8px}
.sum-score{font-size:52px;font-weight:700;color:#1565C0;margin:4px 0}
.sum-sub{font-size:14px;color:#666;margin-bottom:24px}
.sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
.sum-card{background:#fff;border-radius:14px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.sum-num{font-size:28px;font-weight:700}
.sum-lbl{font-size:12px;color:#888;margin-top:4px}
.ok-c{color:#43a047}.ng-c{color:#e53935}.skip-c{color:#f57c00}.pct-c{color:#1565C0}
.sum-btn{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;margin-bottom:10px;font-family:inherit;transition:all .18s}
.sum-btn-p{background:#1565C0;color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.3)}
.sum-btn-p:hover{background:#0d47a1}
.sum-btn-o{background:#fff;color:#1565C0;border:2px solid #1565C0}
.sum-btn-o:hover{background:#f0f6ff}

/* Grid dialog */
.grid-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end}
.grid-overlay.show{display:flex}
.grid-modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:70vh;overflow-y:auto;max-width:700px;margin:0 auto}
.grid-modal h3{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:14px;text-align:center}
.q-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.q-dot{width:100%;aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:2px solid #e0e0e0;background:#f5f5f5;color:#666;transition:all .15s}
.q-dot.cur{border-color:#1565C0;background:#e3f2fd;color:#1565C0}
.q-dot.ok{background:#43a047;border-color:#43a047;color:#fff}
.q-dot.ng{background:#e53935;border-color:#e53935;color:#fff}
.q-dot.skip{background:#ff9800;border-color:#ff9800;color:#fff}
.grid-close{width:100%;padding:12px;border-radius:10px;border:none;background:#f0f2f5;color:#333;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;font-family:inherit}

.pb-safe{height:70px}

/* Confirm dialog */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;align-items:center;justify-content:center;padding:24px}
.confirm-overlay.show{display:flex}
.confirm-box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.confirm-icon{font-size:44px;margin-bottom:12px}
.confirm-title{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
.confirm-sub{font-size:14px;color:#777;line-height:1.5;margin-bottom:24px}
.confirm-btns{display:flex;gap:10px}
.confirm-btn{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.confirm-btn-cancel{background:#f0f2f5;color:#555}
.confirm-btn-cancel:hover{background:#e0e0e0}
.confirm-btn-ok{background:#1565C0;color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.3)}
.confirm-btn-ok:hover{background:#0d47a1}

.fab-answer{position:fixed;bottom:80px;right:16px;background:#1565C0;color:#fff;border:none;border-radius:50px;padding:11px 20px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:99;font-family:inherit;transition:all .2s}
.fab-answer:hover{background:#3a6b8a;transform:scale(1.04)}
.fab-answer.hidden{display:none}
</style>
</head>

<script>
const Q=[
{t:"Các doanh nghiệp tự do di chuyển nguồn lực của mình từ ngành này sang ngành khác, vào các ngành sản xuất kinh doanh khác nhau là biện pháp cạnh tranh:",o:["giữa các nền kinh tế.","giữa các ngành.","trong cùng đơn vị sản xuất.","trong nội bộ ngành."],c:1,g:"Biện pháp cạnh tranh giữa các ngành là các doanh nghiệp tự do di chuyển nguồn lực của mình từ ngành này sang ngành khác, vào các ngành sản xuất kinh doanh khác nhau (Xem trang 74, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Căn cứ vào đầu vào và đầu ra của quá trình sản xuất, có thể chia thị trường thành:",o:["thị trường tư liệu sản xuất và thị trường tư liệu tiêu dùng.","thị trường tự do, thị trường có điều tiết.","thị trường trong nước và thị trường thế giới.","thị trường các yếu tố đầu vào và thị trường hàng hóa đầu ra."],c:2,g:"Căn cứ vào đầu vào, đầu ra của quá trình sản xuất, có thể chia thành thị trường tư liệu sản xuất (đầu vào), thị trường tư liệu tiêu dùng (đầu ra) (Xem trang 58, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Căn cứ vào tính chuyên biệt của thị trường, có thể chia thị trường thành:",o:["thị trường cạnh tranh hoàn hảo, thị trường cạnh tranh không hoàn hảo.","thị trường trong nước và thị trường thế giới.","các loại thị trường gắn với các lĩnh vực khác nhau.","thị trường tư liệu sản xuất và thị trường tư liệu tiêu dùng."],c:2,g:"Chuyên biệt tức là tập trung vào một lĩnh vực nào đó. Đáp án C là phương án phân chia dựa trên tính chuyên biệt của các quan hệ kinh tế theo lĩnh vực cụ thể."},
{t:"Cơ chế thị trường là hệ thống các quan hệ kinh tế mang đặc tính tự điều chỉnh các cân đối của nền kinh tế theo yêu cầu của:",o:["người sản xuất.","người tiêu dùng.","các quy luật kinh tế.","các chính sách kinh tế."],c:2,g:"Cơ chế thị trường là hệ thống các quan hệ kinh tế mang đặc tính tự điều chỉnh các cân đối của nền kinh tế theo yêu cầu của các quy luật kinh tế (Xem trang 61, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những đặc trưng chung của kinh tế thị trường là thị trường đóng vai trò quyết định trong việc phân bổ các nguồn lực xã hội thông qua hoạt động của các:",o:["thị trường bộ phận.","chủ thể sản xuất.","chủ thể trung gian.","thị trường đầu vào."],c:0,g:"Thị trường đóng vai trò quyết định trong việc phân bổ các nguồn lực xã hội thông qua hoạt động của các thị trường bộ phận (Xem trang 62, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những đặc trưng chung của kinh tế thị trường là giá cả được hình thành theo:",o:["nguyên tắc tập trung.","mệnh lệnh nhà nước.","nguyên tắc thị trường.","nhu cầu người tiêu dùng."],c:2,g:"Một trong những đặc trưng chung của kinh tế thị trường là giá cả được hình thành theo nguyên tắc thị trường (Xem trang 62, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Kinh tế thị trường là:",o:["nền kinh tế phát triển cao.","nền kinh tế hiện đại.","nền kinh tế hàng hóa.","kinh tế hàng hóa phát triển cao."],c:3,g:"Nền kinh tế thị trường là nền kinh tế hàng hoá phát triển cao (Xem trang 61, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Biện pháp cạnh tranh trong nội bộ ngành là:",o:["di chuyển nguồn lực từ ngành này sang ngành khác.","cải tiến kỹ thuật, đổi mới công nghệ.","chuyển hướng đầu tư sang ngành nghề khác.","mở rộng ngành nghề kinh doanh."],c:1,g:"Biện pháp cạnh tranh trong nội bộ ngành là các doanh nghiệp ra sức cải tiến kỹ thuật, đổi mới công nghệ (Xem trang 73, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Kết quả cạnh tranh trong nội bộ ngành là hình thành:",o:["giá trị cá biệt của tất cả hàng hóa.","giá trị sử dụng của tất cả hàng hóa.","giá trị thị trường của từng loại hàng hóa.","giá trị thặng dư của từng loại hàng hóa."],c:2,g:"Kết quả của cạnh tranh trong nội bộ ngành là hình thành giá trị thị trường của từng loại hàng hoá (Xem trang 73, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá cả thị trường là hình thức biểu hiện bằng tiền của:",o:["giá trị cá biệt.","giá trị trao đổi.","giá trị thặng dư.","giá trị thị trường."],c:3,g:"Giá cả thị trường là hình thức biểu hiện bằng tiền của giá trị thị trường."},
{t:"Giá trị trung bình của những hàng hóa được sản xuất ra trong một khu vực sản xuất nào đó, là:",o:["giá trị cá biệt.","giá trị sử dụng.","giá trị thặng dư.","giá trị thị trường."],c:3,g:"Theo C. Mác, “Một mặt, phải coi giá trị thị trường là giá trị trung bình của những hàng hoá được sản xuất ra trong một khu vực nào đó\" (Xem trang 73, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Biện pháp cạnh tranh giữa các ngành là các doanh nghiệp:",o:["tự do di chuyển nguồn lực của mình từ ngành này sang ngành khác.","tăng cường độ lao động.","tăng năng suất lao động.","cải tiến kỹ thuật, đổi mới công nghệ."],c:0,g:"Biện pháp cạnh tranh giữa các ngành là các doanh nghiệp tự do di chuyển nguồn lực của mình từ ngành này sang ngành khác, vào các ngành sản xuất kinh doanh khác nhau (Xem trang 74, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những phương thức để thực hiện lợi ích của doanh nghiệp trong cùng một ngành sản xuất là cạnh tranh:",o:["giữa các nền kinh tế.","giữa các ngành.","trong nội bộ ngành.","trong cùng đơn vị sản xuất."],c:2,g:"Cạnh tranh trong nội bộ ngành là một trong những phương thức để thực hiện lợi ích của doanh nghiệp trong cùng một ngành sản xuất (Xem trang 73, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tìm nơi đầu tư có lợi nhất là mục đích của cạnh tranh:",o:["giữa các nền kinh tế.","giữa các ngành.","trong nội bộ ngành.","trong cùng đơn vị sản xuất."],c:1,g:"Mục đích cạnh tranh giữa các ngành là nhằm tìm nơi đầu tư có lợi nhất (Xem trang 74, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Các doanh nghiệp cải tiến kỹ thuật, đổi mới công nghệ là biện pháp cạnh tranh:",o:["giữa các nền kinh tế.","giữa các ngành.","trong nội bộ ngành.","trong cùng đơn vị sản xuất."],c:2,g:"Trong cạnh tranh trong nội bộ ngành, biện pháp cạnh tranh là các doanh nghiệp ra sức cải tiến kỹ thuật, đổi mới công nghệ, hợp lý hoá sản xuất, tăng năng suất lao động để hạ thấp giá trị cá biệt của hàng hoá."},
{t:"Các doanh nghiệp tự do di chuyển nguồn lực của mình từ ngành này sang ngành khác là biện pháp cạnh tranh:",o:["giữa các nền kinh tế.","giữa các ngành.","trong nội bộ ngành.","trong cùng đơn vị sản xuất."],c:1,g:"Biện pháp cạnh tranh giữa các ngành là các doanh nghiệp tự do di chuyển nguồn lực của mình từ ngành này sang ngành khác, vào các ngành sản xuất kinh doanh khác nhau (Xem trang 74, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá trị hàng hóa là:",o:["hình thức biểu hiện ra bên ngoài của giá trị trao đổi.","nội dung, là cơ sở của trao đổi.","nội dung, cơ sở của giá trị sử dụng.","hình thức biểu hiện ra bên ngoài của giá trị sử dụng."],c:1,g:"Giá trị hàng hóa là hình thức biểu hiện ra bên ngoài của giá trị; giá trị là nội dung, là cơ sở của trao đổi (Xem trang 39, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Việc phát hiện ra tính hai mặt của lao động sản xuất hàng hóa, giúp C. Mác luận giải triệt để và khoa học về:",o:["nguồn gốc, bản chất của giá trị.","nguồn gốc, bản chất của tiền.","mối quan hệ giữa hai thuộc tính của hàng hóa.","hai thuộc tính của hàng hóa."],c:0,g:"Việc phát hiện ra tính hai mặt của lao động sản xuất hàng hoá là phát kiến quan trọng của C. Mác, giúp ông luận giải triệt để và khoa học về nguồn gốc, bản chất của giá trị (Xem trang 81, 82, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Gắn kết nền kinh tế thành một chỉnh thể, gắn kết nền kinh tế quốc gia với nền kinh tế thế giới là vai trò của:",o:["doanh nghiệp.","thị trường.","nhà đầu tư.","người tiêu dùng."],c:1,g:"Thị trường gắn kết nền kinh tế thành một chỉnh thể, gắn kết nền kinh tế quốc gia với nền kinh tế thế giới (Xem trang 59, 60, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Nền sản xuất phát triển, khoa học, công nghệ càng tiên tiến, càng giúp con người phát hiện ra nhiều:",o:["giá trị sử dụng.","giá trị trao đổi.","giá trị thị trường.","giá trị cá biệt."],c:0,g:"Nền sản xuất phát triển, khoa học – công nghệ càng hiện đại, càng giúp con người phát hiện thêm các giá trị sử dụng của sản phẩm (Xem trang 37, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá trị hàng hóa là phạm trù có tính:",o:["tự nhiên.","phổ biến.","lịch sử.","phức tạp."],c:2,g:"Giá trị hàng hoá biểu hiện mối quan hệ kinh tế giữa những người sản xuất, trao đổi hàng hoá và là phạm trù có tính lịch sử (Xem trang 39, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Hàng hóa ở nơi có giá cả thấp được thu hút, chảy đến nơi có giá cả cao hơn, góp phần làm cho cung cầu hàng hóa giữa các vùng cân bằng thông qua mệnh lệnh của:",o:["giá trị hàng hóa.","giá trị sử dụng.","giá cả thị trường.","giá cả sản xuất."],c:2,g:"Thông qua mệnh lệnh của giá cả thị trường, hàng hoá ở nơi có giá cả thấp được thu hút, chảy đến nơi có giá cả cao hơn, góp phần làm cho cung – cầu hàng hoá giữa các vùng được cân bằng (Xem trang 68, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khi sản phẩm do những người sản xuất hàng hóa riêng biệt tạo ra không phù hợp với nhu cầu của xã hội thì xuất hiện mâu thuẫn giữa lao động cụ thể và:",o:["lao động quá khứ.","lao động hiện tại.","lao động sống.","lao động trừu tượng."],c:3,g:"Mâu thuẫn giữa lao động cụ thể và lao động trừu tượng xuất hiện khi sản phẩm do những người sản xuất hàng hoá riêng biệt tạo ra không phù hợp với nhu cầu xã hội (Xem trang 42, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khi mức tiêu hao lao động cá biệt cao hơn mức tiêu hao mà xã hội có thể chấp nhận được thì xuất hiện mâu thuẫn giữa lao động cụ thể và:",o:["lao động trừu tượng.","lao động quá khứ.","lao động hiện tại.","lao động sống."],c:0,g:"Mâu thuẫn giữa lao động cụ thể và lao động trừu tượng xuất hiện khi sản phẩm không phù hợp hoặc mức hao phí cá biệt cao hơn xã hội chấp nhận (Xem trang 42, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khi giá trị của đơn vị hàng hóa được đại biểu bằng một số tiền nhất định thì số tiền đó được gọi là:",o:["giá cả thị trường.","giá cả hàng hóa.","giá cả xã hội.","giá cả cá biệt."],c:1,g:"Giá trị hàng hoá được biểu hiện bằng tiền gọi là giá cả hàng hoá (Xem trang 49, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khi thực hiện chức năng phương tiện lưu thông, tiền được dùng:",o:["làm môi giới cho quá trình trao đổi hàng hóa.","rút khỏi lưu thông đi vào cất trữ.","trả nợ, trả tiền mua chịu hàng hóa.","để đo lượng giá trị của tất cả các hàng hóa khác nhau."],c:0,g:"Khi thực hiện chức năng phương tiện lưu thông, tiền được dùng làm môi giới cho quá trình trao đổi hàng hoá (Xem trang 50, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Cạnh tranh giữa các chủ thể kinh doanh trong cùng một ngành, cùng sản xuất một loại hàng hóa là cạnh tranh:",o:["trong nội bộ ngành.","giữa các ngành khác nhau.","trong nội bộ doanh nghiệp.","trong cùng đơn vị sản xuất kinh doanh."],c:0,g:"Cạnh tranh trong nội bộ ngành là cạnh tranh giữa các chủ thể kinh doanh trong cùng một ngành hàng hoá (Xem trang 73, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Mâu thuẫn giữa lao động cụ thể và lao động trừu tượng xuất hiện khi mức độ tiêu hao lao động cá biệt cao hơn mức tiêu hao mà xã hội có thể chấp nhận được là mầm mống của:",o:["suy thoái.","khủng hoảng thiếu.","khủng hoảng thừa.","hưng thịnh."],c:2,g:"Khi đó hàng hoá không bán được (thừa hàng), gây nên mầm mống của khủng hoảng thừa (Xem trang 42, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những vai trò của thị trường là:",o:["kết nối, thông tin trong các quan hệ mua bán.","thỏa mãn nhu cầu hiện tại của xã hội.","thực hiện quản trị phát triển nền kinh tế.","thông tin, định hướng cho mọi nhu cầu sản xuất kinh doanh."],c:3,g:"Thị trường có vai trò thông tin, định hướng cho mọi nhu cầu sản xuất kinh doanh (Xem trang 59, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá cả thị trường do yếu tố nào sau đây quyết định?",o:["Giá trị thị trường.","Giá trị hàng hóa.","Giá trị trao đổi.","Giá trị cá biệt."],c:0,g:"Giá cả thị trường là hình thức biểu hiện bằng tiền của giá trị thị trường, lấy giá trị thị trường làm cơ sở khách quan."},
{t:"Giá trị cá biệt của những hàng hóa được sản xuất trong những điều kiện trung bình của khu vực và chiếm đại bộ phận trong tổng số những hàng hóa của khu vực đó là:",o:["giá trị hàng hóa.","giá trị thị trường.","giá trị cá biệt.","giá trị trao đổi."],c:1,g:"Giá trị thị trường là giá trị cá biệt của những hàng hoá được sản xuất ra trong những điều kiện trung bình của khu vực đó (Xem trang 73, 74, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Trong lưu thông, quy luật giá trị điều tiết hàng hóa từ nơi có:",o:["giá cả thấp đến nơi có giá cả cao.","cung nhỏ hơn cầu đến nơi có cung lớn hơn cầu.","giá cả cao đến nơi có giá cả thấp.","cung bằng cầu đến nơi có cung lớn hơn cầu."],c:0,g:"Trong lưu thông, quy luật giá trị điều tiết hàng hoá từ nơi có giá cả thấp đến nơi có giá cả cao (Xem trang 68, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Trong lưu thông, quy luật giá trị điều tiết hàng hóa từ nơi có:",o:["cung lớn hơn cầu đến nơi có cung nhỏ hơn cầu.","giá cả cao đến nơi có giá cả thấp.","cung nhỏ hơn cầu đến nơi có cung lớn hơn cầu.","cung bằng cầu đến nơi có cung lớn hơn cầu."],c:0,g:"Quy luật giá trị điều tiết hàng hóa từ nơi có cung lớn hơn cầu đến nơi có cung nhỏ hơn cầu (Xem trang 68, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Mối quan hệ tỷ lệ về lượng giữa các giá trị sử dụng khác nhau là:",o:["giá trị hàng hóa.","giá trị cá biệt.","giá trị trao đổi.","giá trị thị trường."],c:2,g:"Tỷ lệ trao đổi giữa các giá trị sử dụng khác nhau này được gọi là giá trị trao đổi (Xem trang 1, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Năng suất lao động tỷ lệ nghịch với:",o:["lượng giá trị trong một đơn vị hàng hóa.","lượng giá trị sử dụng trong một đơn vị hàng hóa.","lượng giá trị trao đổi trong một đơn vị hàng hóa.","lượng giá trị thặng dư trong một đơn vị hàng hóa."],c:0,g:"Năng suất lao động tăng lên sẽ làm cho lượng giá trị trong một đơn vị sản xuất hàng hoá giảm xuống (Xem trang 44, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"C. Mác gọi lao động giản đơn được nhân bội lên là:",o:["lao động phức tạp.","lao động cá biệt.","lao động cụ thể.","lao động trừu tượng."],c:0,g:"Lao động phức tạp là lao động giản đơn được nhân bội lên (Xem trang 46, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Dịch vụ là hàng hóa:",o:["dùng để cất trữ.","dạng vật thể.","hữu hình.","không thể cất trữ."],c:3,g:"Dịch vụ là hàng hoá không thể cất trữ (Xem trang 52, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Dịch vụ là một loại hàng hóa:",o:["vô hình.","hữu hình.","có thể cất trữ.","dạng vật thể."],c:0,g:"Dịch vụ là một loại hàng hoá, nhưng đó là loại hàng hoá vô hình (Xem trang 51, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Những hoạt động lao động yêu cầu phải trải qua một quá trình đào tạo về kỹ năng, nghiệp vụ theo yêu cầu nhất định, gọi là:",o:["lao động cụ thể.","lao động giản đơn.","lao động trừu tượng.","lao động phức tạp."],c:0,g:"Lao động cụ thể là lao động có ích dưới một hình thức cụ thể của những nghề nghiệp chuyên môn nhất định (Xem trang 40, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Mục đích của việc cung ứng dịch vụ là nhằm thỏa mãn nhu cầu của người:",o:["có nhu cầu cung ứng dịch vụ đó.","tạo ra dịch vụ đó.","có nhu cầu về loại hình dịch vụ đó.","môi giới dịch vụ."],c:2,g:"Mục đích của việc cung ứng dịch vụ là nhằm thỏa mãn nhu cầu của người có nhu cầu về loại hình dịch vụ đó (Xem trang 52, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Những người kết nối giữa sản xuất và tiêu dùng, làm cho sản xuất và tiêu dùng trở nên ăn khớp với nhau là:",o:["các chủ thể trung gian trong thị trường.","người tiêu dùng.","người sản xuất hàng hóa.","chủ doanh nghiệp."],c:0,g:"Các chủ thể trung gian làm tăng sự kết nối giữa sản xuất và tiêu dùng (Xem trang 79, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Những người mua hàng hóa, dịch vụ trên thị trường để thỏa mãn nhu cầu tiêu dùng là:",o:["người tiêu dùng.","các chủ thể trung gian trong thị trường.","chủ doanh nghiệp.","người sản xuất hàng hóa."],c:0,g:"Người tiêu dùng là những người mua hàng hóa, dịch vụ trên thị trường để thỏa mãn nhu cầu tiêu dùng (Xem trang 78, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Những người sử dụng các yếu tố đầu vào để sản xuất, kinh doanh và thu lợi nhuận là:",o:["người tiêu dùng.","các chủ thể trung gian trong thị trường.","người sản xuất hàng hóa.","hộ gia đình."],c:2,g:"Người sản xuất là những người sử dụng các yếu tố đầu vào để sản xuất, kinh doanh và thu lợi nhuận (Xem trang 78, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Thực hiện quản trị phát triển nền kinh tế thông qua việc tạo lập môi trường kinh tế tốt nhất cho các chủ thể và khắc phục các khuyết tật của thị trường là vai trò của:",o:["nhà nước.","người tiêu dùng.","người sản xuất.","các chủ thể trung gian."],c:0,g:"Trong nền kinh tế thị trường, nhà nước thực hiện quản trị phát triển nền kinh tế và khắc phục các khuyết tật (Xem trang 80, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tăng cơ hội thực hiện giá trị của hàng hóa cũng như thỏa mãn nhu cầu của người tiêu dùng là vai trò của:",o:["các chủ thể trung gian trong thị trường.","người tiêu dùng.","nhà nước.","người sản xuất."],c:0,g:"Hoạt động của các chủ thể trung gian trong thị trường làm tăng cơ hội thực hiện giá trị và thỏa mãn nhu cầu người tiêu dùng (Xem trang 79, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Định hướng sản xuất là vai trò của:",o:["người tiêu dùng.","nhà nước.","các chủ thể trung gian.","người sản xuất."],c:0,g:"Người tiêu dùng có vai trò rất quan trọng trong định hướng sản xuất (Xem trang 78, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Không chỉ làm thỏa mãn nhu cầu hiện tại mà còn tạo ra và phục vụ cho nhu cầu tương lai là vai trò của:",o:["người sản xuất.","người tiêu dùng.","hộ gia đình.","các chủ thể trung gian."],c:0,g:"Nhiệm vụ của người sản xuất không chỉ làm thoả mãn nhu cầu hiện tại mà còn tạo nhu cầu trong tương lai (Xem trang 78, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Cung cấp hàng hoá, dịch vụ không làm tổn hại tới sức khoẻ và lợi ích xã hội là trách nhiệm của:",o:["người sản xuất.","người tiêu dùng.","nhà nước.","các chủ thể trung gian."],c:0,g:"Người sản xuất cần phải có trách nhiệm cung cấp những hàng hoá, dịch vụ không gây tổn hại (Xem trang 78, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những vai trò của các chủ thể trung gian trong thị trường là:",o:["kết nối, trao đổi thông tin trong các quan hệ mua, bán.","thực hiện quản trị phát triển nền kinh tế.","làm thỏa mãn nhu cầu hiện tại của xã hội.","kết nối các nhà sản xuất, định hướng sản xuất."],c:0,g:"Một trong những vai trò của các chủ thể trung gian trong thị trường là kết nối, trao đổi thông tin (Xem trang 79, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những vai trò của các chủ thể trung gian trong thị trường là:",o:["làm cho sản xuất và tiêu dùng trở nên ăn khớp với nhau.","làm thỏa mãn nhu cầu hiện tại của xã hội.","kết nối các nhà sản xuất, định hướng sản xuất.","thực hiện quản trị phát triển nền kinh tế."],c:0,g:"Các chủ thể trung gian làm tăng sự kết nối, làm cho sản xuất và tiêu dùng trở nên ăn khớp với nhau (Xem trang 79, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."}
];
// State
// ans[i]: null = chưa làm, number = đã chọn, 'skip' = bỏ qua
let cur = 0;
let ans = new Array(Q.length).fill(null);
let showSum = false;

// Timer
let totalSec = 60 * 60; // 60 phút
let timerInterval = setInterval(()=>{
  if(totalSec <= 0){ clearInterval(timerInterval); finishQuiz(); return; }
  totalSec--;
  const m = String(Math.floor(totalSec/60)).padStart(2,'0');
  const s = String(totalSec%60).padStart(2,'0');
  const el = document.getElementById('timer-txt');
  if(el) el.textContent = m+':'+s;
}, 1000);

function getTabClass(i){
  const a = ans[i];
  const active = i===cur ? ' active' : '';
  if(a === null) return 'tab-item'+active;
  if(a === 'skip' || a === 'unanswered' || a === 'hint') return 'tab-item answered-skip'+active;
  if(!a.revealed) return 'tab-item'+active; // đã chọn nhưng chưa reveal → coi như chưa làm
  if(a.choice === Q[i].c) return 'tab-item answered-ok'+active;
  return 'tab-item answered-ng'+active;
}

function renderTabs(){
  const wrap = document.getElementById('tabs-wrap');
  wrap.innerHTML = Q.map((_,i)=>`<div class="${getTabClass(i)}" onclick="goTo(${i})">Câu ${i+1}</div>`).join('');
  setTimeout(()=>{
    const tabs = wrap.querySelectorAll('.tab-item');
    if(tabs[cur]) tabs[cur].scrollIntoView({block:'nearest',inline:'center'});
  }, 30);
}

function renderProgress(){
  const done = ans.filter(a=>a && (a==='skip' || a==='unanswered' || a==='hint' || a.revealed)).length;
  const el = document.getElementById('prog-info');
  if(el) el.textContent = done + ' / ' + Q.length + ' câu';
  const bar = document.getElementById('prog-bar');
  if(!bar) return;
  // Mỗi câu một đoạn nhỏ: đúng=xanh lá, sai=đỏ, chưa làm/bỏ qua=xám nhạt
  const segW = (100 / Q.length).toFixed(4) + '%';
  bar.innerHTML = Q.map((_,i)=>{
    const a = ans[i];
    let color = '#e0e0e0'; // chưa làm / bỏ qua = trắng
    if(a === 'unanswered'){
      color = '#e53935'; // nộp bài mà chưa làm = đỏ
    } else if(a && a !== 'skip' && a !== 'unanswered' && a !== 'hint' && a.revealed){
      color = a.choice === Q[i].c ? '#43a047' : '#e53935';
    }
    return `<div class="prog-seg" style="width:${segW};background:${color}"></div>`;
  }).join('');
}

function renderQ(){
  if(showSum){ renderSum(); return; }
  const q = Q[cur];
  // ans[cur]: null = chưa làm, {choice: number, revealed: bool} = đã chọn, 'skip' = bỏ qua
  const a = ans[cur];
  const isSkip = a === 'unanswered';
  const isHint = a === 'hint'; // bấm xem đáp án mà không chọn
  const isChosen = a !== null && a !== 'skip' && a !== 'unanswered' && a !== 'hint';
  const isRevealed = isChosen && a.revealed;
  const choice = isChosen ? a.choice : null;

  // Chỉ hiện đúng/sai khi đã revealed (tức đã bấm sang câu khác sau khi chọn)
  let explain = '';
  if(isRevealed){
    if(choice === q.c){
      explain = `<div class="explain-box correct-box"><span class="explain-icon">✅</span><div class="explain-content"><div class="explain-label">Chính xác!</div><div class="explain-text">${q.g}</div></div></div>`;
    } else {
      explain = `<div class="explain-box wrong-box"><span class="explain-icon">❌</span><div class="explain-content"><div class="explain-label">Chưa đúng — Đáp án: ${q.o[q.c]}</div><div class="explain-text">${q.g}</div></div></div>`;
    }
  } else if(isHint){
    explain = `<div class="explain-box"><span class="explain-icon">💡</span><div class="explain-content"><div class="explain-label">Đáp án đúng</div><div class="explain-text"><strong>${q.o[q.c]}</strong><br>${q.g}</div></div></div>`;
  }

  // Lock options: nếu đã skip hoặc đã revealed thì không cho chọn nữa
  // Nếu đã chọn nhưng chưa revealed: vẫn hiện lựa chọn nhưng chưa tô màu đúng/sai
  const locked = isSkip || isRevealed || isHint;

  const opts = q.o.map((o,i)=>{
    let cls = 'opt-item';
    if(locked) cls += ' disabled';
    if(isRevealed){
      if(i === q.c) cls += ' selected-ok';
      else if(i === choice && choice !== q.c) cls += ' selected-ng';
    } else if(isChosen && i === choice){
      // Đã chọn nhưng chưa revealed: tô xanh nhạt nhưng chưa show đúng/sai
      cls += ' selected-pending';
    }
    const click = !locked ? `onclick="pick(${i})"` : '';
    const numLabel = ['1','2','3','4'][i];
    return `<div class="${cls}" ${click}><div class="opt-num">${numLabel}</div><span class="opt-text">${o}</span></div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="q-wrap">
      <div class="q-number">Câu ${cur+1} / ${Q.length}</div>
      <div class="q-text">${q.t}</div>
      <div class="options">${opts}</div>
      ${explain}
      <div class="pb-safe"></div>
    </div>
    <div class="fnav">
      <button class="nav-btn btn-prev" onclick="prev()" ${cur===0?'disabled':''}>
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="fnav-center" onclick="toggleGrid()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="#1565C0" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="#1565C0" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="#1565C0" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="#1565C0" stroke-width="2"/></svg>
        Câu ${cur+1} / ${Q.length}
      </div>
      <button class="nav-btn btn-next" onclick="next()">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  `;

  renderTabs();
  renderProgress();
  // Hiện nút Đáp án chỉ khi câu chưa làm/chưa revealed và chưa hint
  const fab = document.getElementById('fab-ans');
  if(fab){
    const _a = ans[cur];
    const canHint = !showSum && (_a === null || (_a && _a !== 'skip' && _a !== 'unanswered' && _a !== 'hint' && !_a.revealed));
    fab.classList.toggle('hidden', !canHint);
  }
  setTimeout(renderMath, 50);
}

function renderSum(){
  const ok = ans.filter((a,i)=>a && a!=='skip' && a.revealed && a.choice===Q[i].c).length;
  const ng = ans.filter((a,i)=>a && a!=='skip' && a.revealed && a.choice!==Q[i].c).length;
  const sk = ans.filter(a=>a===null||a==='skip'||a==='unanswered'||a==='hint').length;
  const pct = Math.round(ok/Q.length*100);
  const pass = ok >= Math.ceil(Q.length*0.8);

  document.getElementById('main-content').innerHTML = `
    <div class="sum-wrap">
      <div class="sum-emoji">${pass?'🎉':'📖'}</div>
      <div class="sum-score">${ok}/${Q.length}</div>
      <div class="sum-sub">${pass?'Xuất sắc! Bạn nắm vững nội dung.':'Cần ôn thêm để nắm chắc hơn nhé.'}</div>
      <div class="sum-grid">
        <div class="sum-card"><div class="sum-num ok-c">${ok}</div><div class="sum-lbl">Câu đúng</div></div>
        <div class="sum-card"><div class="sum-num ng-c">${ng}</div><div class="sum-lbl">Câu sai</div></div>
        <div class="sum-card"><div class="sum-num skip-c">${sk}</div><div class="sum-lbl">Bỏ qua</div></div>
        <div class="sum-card"><div class="sum-num pct-c">${pct}%</div><div class="sum-lbl">Điểm số</div></div>
      </div>
      <button class="sum-btn sum-btn-p" onclick="restart()">Làm lại từ đầu</button>
      <button class="sum-btn sum-btn-o" onclick="review()">Xem lại câu trả lời</button>
    </div>
  `;
  renderTabs();
  renderProgress();
}

// Helper: reveal câu hiện tại (đánh dấu đã chuyển câu)
function revealCurrent(){
  const a = ans[cur];
  if(a && a !== 'skip' && a !== 'unanswered' && a !== 'hint' && !a.revealed){
    ans[cur] = {choice: a.choice, revealed: true};
  }
}

// Helper: skip câu nếu chưa chọn gì
function skipIfEmpty(){
  if(ans[cur] === null) ans[cur] = 'skip';
  // hint = đã xem đáp án, giữ nguyên (không skip)
}

function pick(i){
  const a = ans[cur];
  if(a && a !== 'skip' && a !== 'unanswered' && a !== 'hint' && a.revealed) return;
  ans[cur] = {choice: i, revealed: false};
  renderQ();
}

function prev(){
  if(cur === 0) return;
  // Reveal câu hiện tại nếu đã chọn, skip nếu chưa
  revealCurrent();
  cur--;
  showSum = false;
  renderQ();
}

function next(){
  // Reveal câu hiện tại nếu đã chọn, skip nếu chưa
  revealCurrent();
  if(cur < Q.length - 1){
    cur++;
    renderQ();
  } else {
    showSum = true;
    renderSum();
  }
}

function goTo(i){
  if(i === cur && !showSum){ closeGridDirect(); return; }
  revealCurrent();
  skipIfEmpty();
  cur = i;
  showSum = false;
  renderQ();
  closeGridDirect();
}

function openConfirm(){
  const done = ans.filter(a => a !== null && a !== 'skip').length;
  const skip = ans.filter(a => a === null || a === 'skip').length;
  const sub = document.getElementById('confirm-sub');
  if(skip > 0){
    sub.innerHTML = `Đã làm <strong>${done}/${Q.length}</strong> câu, còn <strong>${skip}</strong> câu chưa trả lời.`;
  } else {
    sub.innerHTML = `Đã hoàn thành <strong>tất cả ${Q.length} câu</strong>. Sẵn sàng nộp!`;
  }
  document.getElementById('confirm-overlay').classList.add('show');
}
function closeConfirm(){
  document.getElementById('confirm-overlay').classList.remove('show');
}
function confirmFinish(){
  closeConfirm();
  finishQuiz();
}

function finishQuiz(){
  revealCurrent();
  ans = ans.map(a => {
    if(a === null) return 'unanswered'; // chưa làm → đỏ trên thanh
    if(a === 'skip') return 'skip';     // bỏ qua → trắng
    if(!a.revealed) return {choice: a.choice, revealed: true};
    return a;
  });
  showSum = true;
  renderSum();
}

function restart(){
  ans = new Array(Q.length).fill(null);
  cur = 0; showSum = false;
  totalSec = 60*60;
  renderQ();
}

function review(){
  showSum = false; cur = 0; renderQ();
}

function showHint(){
  const q = Q[cur];
  const a = ans[cur];
  // Nếu đã chọn rồi thì reveal luôn, nếu chưa thì đánh dấu hint
  if(a && a !== 'skip' && a !== 'unanswered' && !a.revealed){
    ans[cur] = {choice: a.choice, revealed: true};
  } else if(a === null){
    ans[cur] = 'hint'; // xem đáp án mà không chọn
  }
  renderQ();
}

function toggleGrid(){
  const ov = document.getElementById('grid-overlay');
  const grid = document.getElementById('q-grid');
  grid.innerHTML = Q.map((_,i)=>{
    const a = ans[i];
    let cls = 'q-dot';
    if(i===cur && !showSum) cls += ' cur';
    else if(a===null) cls += '';
    else if(a==='skip') cls += ' skip';
    else if(!a.revealed) cls += ''; // chọn rồi nhưng chưa qua câu
    else if(a.choice===Q[i].c) cls += ' ok';
    else cls += ' ng';
    return `<div class="${cls}" onclick="goTo(${i})">${i+1}</div>`;
  }).join('');
  ov.classList.add('show');
}

function closeGrid(e){
  if(e.target === document.getElementById('grid-overlay')) closeGridDirect();
}

function closeGridDirect(){
  document.getElementById('grid-overlay').classList.remove('show');
}

function renderMath(){
  if(typeof renderMathInElement === 'function'){
    renderMathInElement(document.getElementById('main-content'), {
      delimiters: [{left:"$",right:"$",display:false}],
      throwOnError: false
    });
  }
}

// Init
renderQ();
</script>

</html>
