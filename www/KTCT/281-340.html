<html lang="vi">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:#ececef;min-height:100vh}

/* Header */
.header{background:#1565C0;color:#fff;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.header-left{display:flex;align-items:center;gap:10px}
.header-icon{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer}
.header-title{font-size:17px;font-weight:600}
.nop-bai{display:flex;align-items:center;gap:6px;background:#fff;border:none;border-radius:20px;padding:7px 14px;cursor:pointer;font-size:14px;font-weight:700;color:#1565C0;box-shadow:0 2px 8px rgba(0,0,0,0.15);transition:all .15s;font-family:inherit}
.nop-bai:hover{background:#f0f6ff;transform:scale(1.03)}

/* Timer */
.timer-bar{background:#1976D2;padding:6px 16px;display:flex;align-items:center;justify-content:space-between}
.timer-txt{color:#fff;font-size:14px;font-weight:600;letter-spacing:0.5px}
.progress-info{color:rgba(255,255,255,0.8);font-size:13px}

/* Progress bar */
.prog-bar-wrap{height:5px;background:#e0e0e0;display:flex}
.prog-seg{height:5px;transition:background .3s}

/* Tabs */
.tabs-wrap{background:#fff;border-bottom:1px solid #e0e0e0;overflow-x:auto;display:flex;gap:0;position:sticky;top:44px;z-index:99}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab-item{flex-shrink:0;padding:12px 16px;font-size:14px;font-weight:500;color:#666;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;position:relative}
.tab-item.active{color:#1565C0;border-bottom-color:#1565C0;font-weight:700}
.tab-item.answered-ok{color:#2e7d32}
.tab-item.answered-ng{color:#c62828}
.tab-item.answered-skip{color:#bbb}

/* Question area */
.q-wrap{padding:16px;max-width:700px;margin:0 auto}
.q-number{font-size:14px;color:#1565C0;font-weight:600;margin-bottom:8px}
.q-text{font-size:17px;font-weight:700;color:#1a1a1a;line-height:1.65;margin-bottom:18px}

/* Options */
.options{display:flex;flex-direction:column;gap:10px}
.opt-item{
  display:flex;align-items:center;gap:14px;
  padding:17px 16px;
  border-radius:12px;
  border:2px solid transparent;
  cursor:pointer;
  background:#fff;
  box-shadow:0 1px 4px rgba(0,0,0,0.07);
  transition:background .15s, border-color .15s, box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.opt-item:not(.disabled):hover{background:#f0f4ff;border-color:#c5d8f8}
.opt-item:not(.disabled):hover .opt-num{border-color:#1976D2;color:#1565C0}

/* Pending */
.opt-item.selected-pending{background:#e8f0fe;border-color:#1565C0}
.opt-item.selected-pending .opt-num{border-color:#1565C0;color:#1565C0;background:#dce8fc}
.opt-item.selected-pending .opt-text{color:#0d47a1;font-weight:600}

/* Correct */
.opt-item.selected-ok{background:#e8f5e9;border-color:#43a047}
.opt-item.selected-ok .opt-num{background:#43a047;border-color:#43a047;color:#fff}
.opt-item.selected-ok .opt-text{color:#2e7d32;font-weight:600}
.opt-item.show-correct{background:#e8f5e9;border-color:#43a047}
.opt-item.show-correct .opt-num{background:#43a047;border-color:#43a047;color:#fff}
.opt-item.show-correct .opt-text{color:#2e7d32;font-weight:600}

/* Wrong */
.opt-item.selected-ng{background:#ffebee;border-color:#e53935}
.opt-item.selected-ng .opt-num{background:#e53935;border-color:#e53935;color:#fff}
.opt-item.selected-ng .opt-text{color:#c62828;font-weight:600}

.opt-item.disabled{cursor:default;pointer-events:none}

.opt-num{
  width:36px;height:36px;border-radius:50%;
  border:2px solid #d0d0d0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#888;
  flex-shrink:0;
  transition:all .15s;
  background:#fff;
}
.opt-text{font-size:15px;color:#1a1a1a;line-height:1.5;flex:1}

/* Explanation */
.explain-box{margin-top:14px;padding:13px 14px;border-radius:12px;background:#fffde7;border-left:4px solid #f9a825;display:flex;gap:10px;align-items:flex-start}
.explain-box.correct-box{background:#e8f5e9;border-left-color:#43a047}
.explain-box.wrong-box{background:#ffebee;border-left-color:#e53935}
.explain-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.explain-content{}
.explain-label{font-size:13px;font-weight:700;color:#f57f17;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.explain-box.correct-box .explain-label{color:#2e7d32}
.explain-box.wrong-box .explain-label{color:#c62828}
.explain-text{font-size:15px;color:#333;line-height:1.6}

/* Bottom nav */
.fnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:100;max-width:700px;margin:0 auto}
.fnav-center{font-size:14px;color:#555;font-weight:500;display:flex;align-items:center;gap:6px;cursor:pointer}
.fnav-center svg{color:#1565C0}
.nav-btn{width:42px;height:42px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:all .18s}
.btn-prev{background:#f0f2f5;color:#444}
.btn-prev:hover{background:#e0e0e0}
.btn-next{background:#1565C0;color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.35)}
.btn-next:hover{background:#0d47a1}
.nav-btn:disabled{opacity:0.35;cursor:not-allowed}

/* Summary */
.sum-wrap{padding:24px 16px 100px;max-width:700px;margin:0 auto;text-align:center}
.sum-emoji{font-size:56px;margin-bottom:8px}
.sum-score{font-size:52px;font-weight:700;color:#1565C0;margin:4px 0}
.sum-sub{font-size:14px;color:#666;margin-bottom:24px}
.sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
.sum-card{background:#fff;border-radius:14px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.sum-num{font-size:28px;font-weight:700}
.sum-lbl{font-size:12px;color:#888;margin-top:4px}
.ok-c{color:#43a047}.ng-c{color:#e53935}.skip-c{color:#f57c00}.pct-c{color:#1565C0}
.sum-btn{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;margin-bottom:10px;font-family:inherit;transition:all .18s}
.sum-btn-p{background:#1565C0;color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.3)}
.sum-btn-p:hover{background:#0d47a1}
.sum-btn-o{background:#fff;color:#1565C0;border:2px solid #1565C0}
.sum-btn-o:hover{background:#f0f6ff}

/* Grid dialog */
.grid-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end}
.grid-overlay.show{display:flex}
.grid-modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:70vh;overflow-y:auto;max-width:700px;margin:0 auto}
.grid-modal h3{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:14px;text-align:center}
.q-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.q-dot{width:100%;aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:2px solid #e0e0e0;background:#f5f5f5;color:#666;transition:all .15s}
.q-dot.cur{border-color:#1565C0;background:#e3f2fd;color:#1565C0}
.q-dot.ok{background:#43a047;border-color:#43a047;color:#fff}
.q-dot.ng{background:#e53935;border-color:#e53935;color:#fff}
.q-dot.skip{background:#ff9800;border-color:#ff9800;color:#fff}
.grid-close{width:100%;padding:12px;border-radius:10px;border:none;background:#f0f2f5;color:#333;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;font-family:inherit}

.pb-safe{height:70px}

/* Confirm dialog */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;align-items:center;justify-content:center;padding:24px}
.confirm-overlay.show{display:flex}
.confirm-box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.confirm-icon{font-size:44px;margin-bottom:12px}
.confirm-title{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
.confirm-sub{font-size:14px;color:#777;line-height:1.5;margin-bottom:24px}
.confirm-btns{display:flex;gap:10px}
.confirm-btn{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.confirm-btn-cancel{background:#f0f2f5;color:#555}
.confirm-btn-cancel:hover{background:#e0e0e0}
.confirm-btn-ok{background:#1565C0;color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.3)}
.confirm-btn-ok:hover{background:#0d47a1}

.fab-answer{position:fixed;bottom:80px;right:16px;background:#1565C0;color:#fff;border:none;border-radius:50px;padding:11px 20px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:99;font-family:inherit;transition:all .2s}
.fab-answer:hover{background:#3a6b8a;transform:scale(1.04)}
.fab-answer.hidden{display:none}
</style>
</head>

<script>
const Q=[
{t:"Ngày làm việc 8 giờ thì tỷ suất giá trị thặng dư 100%. Sau đó nhà tư bản kéo dài ngày làm việc đến 10 giờ. Vậy tỷ suất giá trị thặng dư thay đổi như thế nào nếu giá trị sức lao động không đổi và nhà tư bản sử dụng phương pháp sản xuất giá trị thặng dư nào?",o:["150%, sản xuất giá trị thặng dư tuyệt đối.","300%, sản xuất giá trị thặng dư tương đối.","300%, sản xuất giá trị thặng dư tuyệt đối.","150%, sản xuất giá trị thặng dư tương đối."],c:0,g:"Thời gian lao động tất yếu không đổi (t = 4 giờ), thời gian lao động thặng dư mới là 10 - 4 = 6 giờ. m' = (6/4) x 100% = 150%. Do kéo dài ngày lao động nên là phương pháp tuyệt đối (Trang 101)."},
{t:"Nâng cao tỷ suất giá trị thặng dư, nâng cao năng suất lao động, sử dụng hiệu quả máy móc, đại lượng tư bản ứng trước là những nhân tố ảnh hưởng:",o:["quy mô tích lũy tư bản.","thời gian chu chuyển tư bản.","quy mô tiết kiệm tư bản.","tốc độ chu chuyển tư bản."],c:0,g:"Đây là các nhân tố chính ảnh hưởng tới quy mô tích lũy tư bản (Trang 106, 107)."},
{t:"Tích tụ tư bản là kết quả trực tiếp của:",o:["tích lũy tư bản.","phát triển tư bản.","tập trung tư bản.","tiết kiệm tư bản."],c:0,g:"Tích tụ tư bản là kết quả trực tiếp của tích lũy tư bản (Trang 108)."},
{t:"Cấu tạo giá trị của tư bản phản ánh mối quan hệ tỷ lệ giữa tư bản bất biến và:",o:["tư bản khả biến.","tư bản tiền tệ.","tư bản sản xuất.","tư bản lưu động."],c:0,g:"Cấu tạo giá trị phản ánh tỷ lệ giữa tư bản bất biến (c) với tư bản khả biến (v) (Trang 107)."},
{t:"Để tái sản xuất sức lao động cần tiêu dùng: ăn uống 50.000 đồng/ngày, đồ gia dụng 29.200.000 đồng/năm, nhu cầu văn hóa 900.000 đồng/tháng. Vậy giá trị sức lao động trong ngày là bao nhiêu?",o:["180.000 đồng.","200.000 đồng.","170.000 đồng.","160.000 đồng."],c:3,g:"Tổng chi phí/ngày = 50.000 + (29.200.000/365) + (900.000/30) = 50.000 + 80.000 + 30.000 = 160.000 đồng."},
{t:"Tăng cấu tạo hữu cơ tư bản là một trong những hệ quả của:",o:["chu chuyển tư bản.","tích lũy tư bản.","tuần hoàn tư bản.","tiết kiệm tư bản."],c:1,g:"Tích lũy tư bản làm tăng cấu tạo hữu cơ của tư bản (Trang 107, 108)."},
{t:"Xí nghiệp A có lượng tư bản đầu tư 200.000.000 đồng, c/v = 4/1, m' = 100%, m được tư bản hóa 50%. Nếu m' tăng lên 150% thì lượng m tư bản hóa tăng lên so với trước là bao nhiêu?",o:["35.000.000 đồng.","10.000.000 đồng.","20.000.000 đồng.","30.000.000 đồng."],c:1,g:"Lúc đầu tích lũy 20 triệu. Khi m' = 150%, m = 60 triệu, tích lũy 30 triệu. Tăng thêm 30 - 20 = 10 triệu đồng."},
{t:"Trong tái sản xuất giản đơn, toàn bộ giá trị thặng dư đã được nhà tư bản tiêu dùng cho:",o:["sản xuất.","tư bản khả biến.","tư bản bất biến.","cá nhân."],c:3,g:"Trong tái sản xuất giản đơn, toàn bộ m được tiêu dùng cho cá nhân (Trang 105)."},
{t:"Tích tụ tư bản và tập trung tư bản giống nhau ở điểm nào sau đây?",o:["Làm tăng quy mô tư bản xã hội.","Có chung hình thức biểu hiện.","Có chung nguồn gốc tích lũy.","Làm tăng quy mô tư bản cá biệt."],c:3,g:"Cả hai đều làm tăng quy mô tư bản cá biệt (Trang 108)."},
{t:"Cấu tạo kỹ thuật của tư bản phản ánh mối quan hệ tỷ lệ giữa số lượng tư liệu sản xuất và số lượng:",o:["quan hệ sản xuất.","lao động.","lực lượng sản xuất.","sức lao động."],c:3,g:"Cấu tạo kỹ thuật phản ánh tỷ lệ giữa số lượng tư liệu sản xuất và số lượng sức lao động (Trang 107)."},
{t:"Tăng chênh lệch giữa thu nhập của nhà tư bản với thu nhập của người lao động làm thuê là hệ quả của:",o:["chu chuyển tư bản.","tích lũy tư bản.","tiết kiệm tư bản.","tuần hoàn tư bản."],c:1,g:"Đây là một trong các hệ quả của tích lũy tư bản (Trang 107, 108)."},
{t:"Tích tụ tư bản là sự tăng thêm quy mô tư bản cá biệt bằng cách tư bản hóa:",o:["giá trị cá biệt.","giá trị xã hội.","giá trị sử dụng.","giá trị thặng dư."],c:3,g:"Tích tụ tư bản là sự tư bản hóa giá trị thặng dư (Trang 108)."},
{t:"Tập trung tư bản có thể được thực hiện thông qua sáp nhập các:",o:["tư bản cho vay với nhau.","tư bản thương nghiệp với nhau.","tư bản cá biệt với nhau.","tư bản công nghiệp với nhau."],c:2,g:"Tập trung tư bản thực hiện qua hợp nhất các tư bản cá biệt (Trang 108)."},
{t:"Sự tăng thêm quy mô của tư bản cá biệt bằng cách tư bản hóa giá trị thặng dư là:",o:["tích tụ tư bản.","phát triển tư bản.","đầu tư tư bản.","tập trung tư bản."],c:0,g:"Định nghĩa tích tụ tư bản (Trang 108)."},
{t:"Xí nghiệp A có lượng tư bản đầu tư lần thứ nhất 200 triệu đồng, c/v = 4/1, m' = 100%, m được tư bản hóa 50%. Vậy lượng tư bản đầu tư lần thứ hai là bao nhiêu?",o:["225.000.000 đồng.","235.000.000 đồng.","220.000.000 đồng.","230.000.000 đồng."],c:2,g:"m = 40 triệu, phần tích lũy là 20 triệu. Tư bản lần hai = 200 + 20 = 220 triệu đồng."},
{t:"Xí nghiệp A đầu tư 10 tỷ đồng, c = 4v, m' = 50%, chu chuyển 6 tháng/vòng. Khối lượng m thu được trong năm là bao nhiêu?",o:["1 tỷ đồng.","900.000.000 đồng.","500.000.000 đồng.","2 tỷ đồng."],c:3,g:"v = 2 tỷ, M một vòng = 1 tỷ. Một năm 2 vòng nên M = 2 tỷ đồng."},
{t:"Công ty A có 10 lao động, lương 5 triệu/người/tháng, sản xuất 1000 hàng hóa, chi phí c một tháng 90 triệu, m' = 50%. Giá trị một đơn vị hàng hóa là:",o:["185.000 đồng.","165.000 đồng.","195.000 đồng.","190.000 đồng."],c:1,g:"v = 50 triệu, m = 25 triệu. Tổng giá trị = 90 + 50 + 25 = 165 triệu. Đơn giá = 165.000 đồng."},
{t:"Xí nghiệp A đầu tư 100 triệu, c/v=4/1, m'=100%, m tư bản hóa 50%, quy mô sau tích lũy là 110 triệu. Nếu đầu tư 200 triệu thì quy mô sau tích lũy là:",o:["300.000.000 đồng.","200.000.000 đồng.","250.000.000 đồng.","220.000.000 đồng."],c:3,g:"Khi tư bản đầu tư ban đầu gấp đôi, phần tích lũy cũng gấp đôi, tổng là 220 triệu đồng."},
{t:"Sự hợp nhất các tư bản cá biệt vào một chỉnh thể tạo thành một tư bản cá biệt lớn hơn là:",o:["tích tụ tư bản.","phát triển tư bản.","tập trung tư bản.","tích lũy tư bản."],c:2,g:"Định nghĩa tập trung tư bản (Trang 108)."},
{t:"C. Mác ký hiệu cấu tạo hữu cơ của tư bản là:",o:["v/c.","v/m.","m/v.","c/v."],c:3,g:"Ký hiệu cấu tạo hữu cơ là c/v (Trang 107)."},
{t:"Công ty A có 10 lao động, lương 5 triệu/tháng, c = 90 triệu, m' = 50%. Tổng giá trị hàng hóa là:",o:["195.000.000 đồng.","185.000.000 đồng.","190.000.000 đồng.","165.000.000 đồng."],c:3,g:"Tổng G = c + v + m = 90 + 50 + 25 = 165 triệu đồng."},
{t:"Xí nghiệp A có chi phí tư bản 100 triệu, c/v = 3/2. Chi phí tư bản khả biến là:",o:["20.000.000 đồng.","40.000.000 đồng.","30.000.000 đồng.","10.000.000 đồng."],c:1,g:"c = 1,5v. Ta có 1,5v + v = 100 => 2,5v = 100 => v = 40 triệu."},
{t:"Xí nghiệp A đầu tư 200 triệu, c/v = 4/1, m' = 100%, tỷ suất tích lũy 80%. Khối lượng m tư bản hóa là:",o:["32.000.000 đồng.","20.000.000 đồng.","30.000.000 đồng.","35.000.000 đồng."],c:0,g:"v = 40 triệu, m = 40 triệu. Phần tích lũy = 80% x 40 = 32 triệu đồng."},
{t:"Một trong những hệ quả của tích lũy tư bản là:",o:["tăng chi phí sản xuất.","giảm cấu tạo hữu cơ tư bản.","giảm tích tụ và tập trung tư bản.","tăng cấu tạo hữu cơ tư bản."],c:3,g:"Tích lũy tư bản làm tăng cấu tạo hữu cơ (Trang 107, 108)."},
{t:"Xí nghiệp A đầu tư 10 tỷ đồng, c = 4v, m' = 50%. Khối lượng giá trị thặng dư là:",o:["500.000.000 đồng.","1.000.000.000 đồng.","700.000.000 đồng.","900.000.000 đồng."],c:1,g:"5v = 10 tỷ => v = 2 tỷ. M = 50% x 2 tỷ = 1 tỷ đồng."},
{t:"Công ty A có 10 lao động, lương 5 triệu/tháng, m' = 50%. Giá trị mới của mỗi người lao động là bao nhiêu?",o:["750.000 đồng.","850.000 đồng.","7.500.000 đồng.","8.500.000 đồng."],c:2,g:"Giá trị mới = v + m = 5 triệu + 2,5 triệu = 7,5 triệu đồng/người."},
{t:"Ngày làm việc 8 giờ, lao động thặng dư 4 giờ. Do năng suất lao động tăng làm giá trị hàng hóa giảm 2 lần. Tỷ suất thặng dư thay đổi thế nào và thuộc phương pháp nào?",o:["200%, sản xuất giá trị thặng dư tương đối.","300%, sản xuất giá trị thặng dư tuyệt đối.","300%, sản xuất giá trị thặng dư siêu ngạch.","300%, sản xuất giá trị thặng dư tương đối."],c:3,g:"t giảm 2 lần còn 2 giờ. t' = 8 - 2 = 6 giờ. m' = (6/2) x 100% = 300%. Đây là phương pháp tương đối."},
{t:"Nguồn gốc của tư bản tích lũy là:",o:["lợi nhuận bình quân.","lợi nhuận siêu ngạch.","giá trị hàng hóa.","giá trị thặng dư."],c:3,g:"Nguồn gốc duy nhất của tích lũy là giá trị thặng dư (Trang 105)."},
{t:"Xí nghiệp A chi phí 100 triệu, c/v = 3/2. Chi phí tư bản bất biến là:",o:["40.000.000 đồng.","60.000.000 đồng.","50.000.000 đồng.","30.000.000 đồng."],c:1,g:"v = 40 triệu (từ câu 22), suy ra c = 100 - 40 = 60 triệu đồng."},
{t:"Tích lũy tư bản là tư bản hóa:",o:["giá trị trao đổi.","giá trị sử dụng.","giá trị.","giá trị thặng dư."],c:3,g:"Sự chuyển hóa một phần m thành tư bản gọi là tích lũy (Trang 105)."},
{t:"Quy mô tư bản cá biệt tăng lên thông qua tích tụ và:",o:["nhập khẩu tư bản.","tập trung tư bản.","xuất khẩu đầu tư.","tiết kiệm tư bản."],c:1,g:"Quy mô tư bản cá biệt tăng qua tích tụ và tập trung tư bản (Trang 108)."},
{t:"Mối quan hệ tỷ lệ giữa số lượng tư liệu sản xuất và số lượng sức lao động là:",o:["cấu tạo hữu cơ của tư bản.","cấu tạo kỹ thuật của tư bản.","cấu tạo giá trị sử dụng của tư bản.","cấu tạo giá trị của tư bản."],c:1,g:"Đây là định nghĩa cấu tạo kỹ thuật (Trang 107)."},
{t:"Cấu tạo giá trị được quyết định bởi cấu tạo kỹ thuật và phản ánh sự biến đổi của cấu tạo kỹ thuật là:",o:["cấu tạo hữu cơ của tư bản.","cấu tạo vô hình của tư bản.","cấu tạo hữu hình của tư bản.","cấu tạo hiện vật của tư bản."],c:0,g:"Định nghĩa cấu tạo hữu cơ của tư bản (Trang 107)."},
{t:"Xí nghiệp A đầu tư 200 triệu, c/v = 4/1, m' = 100%, m dành cho tiêu dùng 50%. Vậy lượng m tư bản hóa là:",o:["35.000.000 đồng.","30.000.000 đồng.","20.000.000 đồng.","25.000.000 đồng."],c:2,g:"m = 40 triệu. Phần tư bản hóa là 100% - 50% = 50%. Lượng tích lũy = 20 triệu."},
{t:"Xí nghiệp A chi phí 100 triệu, chi mua tư liệu sản xuất 70 triệu. Cấu tạo hữu cơ là:",o:["3/2.","7/3.","3/1.","4/1."],c:1,g:"c = 70 triệu, v = 100 - 70 = 30 triệu. c/v = 70/30 = 7/3."},
{t:"Tích tụ tư bản khác tập trung tư bản ở điểm làm tăng quy mô:",o:["tư bản xã hội.","tư bản sản xuất.","tư bản cá biệt.","tư bản tiền tệ."],c:0,g:"Tích tụ làm tăng quy mô tư bản xã hội, còn tập trung thì không (Trang 108)."},
{t:"Xí nghiệp A có thời gian chu chuyển một vòng là 6 tháng. Tốc độ chu chuyển tư bản là:",o:["4 vòng/năm.","3 vòng/năm.","1 vòng/năm.","2 vòng/năm."],c:3,g:"n = 12/6 = 2 vòng/năm."},
{t:"Xí nghiệp A đầu tư 10 tỷ đồng, c = 4v, M = 1 tỷ. Tỷ suất giá trị thặng dư là:",o:["50%.","200%.","150%.","100%."],c:0,g:"v = 2 tỷ. m' = (1/2) x 100% = 50%."},
{t:"Xí nghiệp A đầu tư 200 triệu, c/v = 4/1, m' = 100%, m tích lũy 20 triệu. Tỷ suất tích lũy là:",o:["50%.","100%.","200%.","150%."],c:0,g:"m = 40 triệu. Tỷ suất tích lũy = (20/40) x 100% = 50%."},
{t:"Xí nghiệp A chi phí 100 triệu, trả lương 40 triệu. Cấu tạo hữu cơ là:",o:["3/2.","3/1.","7/3.","4/1."],c:0,g:"v = 40 triệu, c = 60 triệu. c/v = 60/40 = 3/2."},
{t:"C. Mác ký hiệu tỷ suất lợi nhuận là",o:["P","V","p'","m"],c:2,g:"Ký hiệu của tỷ suất lợi nhuận là p' (Trang 113)."},
{t:"Các hình thức cơ bản của địa tô là",o:["địa tô chênh lệch, địa tô tuyệt đối","địa tô chênh lệch II, địa tô tuyệt đối","địa tô chênh lệch I, địa tô chênh lệch II","địa tô chênh lệch I, địa tô tuyệt đối"],c:0,g:"Địa tô gồm 2 hình thức cơ bản là địa tô chênh lệch và địa tô tuyệt đối (Trang 120, 121)."},
{t:"Phần giá trị thặng dư còn lại sau khi đã khấu trừ đi phần lợi nhuận bình quân mà các nhà tư bản kinh doanh nông nghiệp phải trả cho địa chủ là",o:["tỷ suất lợi nhuận","lợi tức","địa tô","tỷ suất lợi nhuận bình quân"],c:2,g:"Địa tô là phần giá trị thặng dư còn lại sau khi khấu trừ lợi nhuận bình quân trả cho địa chủ (Trang 120)."},
{t:"Cạnh tranh giữa các ngành là cơ chế cho sự hình thành của",o:["tỷ suất lợi nhuận bình quân","tỷ suất lợi nhuận","lợi nhuận bình quân","lợi nhuận thương nghiệp"],c:2,g:"Cạnh tranh giữa các ngành là cơ chế dẫn đến sự hình thành lợi nhuận bình quân (Trang 114)."},
{t:"Ông A vay ông B số tiền 100.000.000 đồng với tỷ suất lợi tức 3% một tháng. Vậy lợi tức ông A trả cho ông B một tháng là bao nhiêu?",o:["3.000.000 đồng","6.000.000 đồng","5.000.000 đồng","4.000.000 đồng"],c:0,g:"Lợi tức (z) = Số tiền vay x Tỷ suất lợi tức = 100.000.000 x 3% = 3.000.000 đồng."},
{t:"C. Mác ký hiệu lợi nhuận là",o:["V","M","C","p"],c:3,g:"Ký hiệu của lợi nhuận là p (Trang 111)."},
{t:"C. Mác ký hiệu địa tô là",o:["P","z","R","M"],c:2,g:"Ký hiệu của địa tô là R (Trang 120)."},
{t:"Khi hàng hóa bán bằng chi phí sản xuất thì",o:["lợi nhuận cao","không có lợi nhuận","lợi nhuận thấp","lợi nhuận bằng chi phí sản xuất"],c:1,g:"Trong trường hợp bán hàng hoá với giá cả đúng bằng chi phí sản xuất là không có lợi nhuận (Trang 112)."},
{t:"Lợi nhuận bình quân được hình thành do cạnh tranh",o:["trong nội bộ ngành","không lành mạnh","giữa các ngành","trong nội bộ doanh nghiệp"],c:2,g:"Cạnh tranh giữa các ngành tất yếu dẫn tới hình thành lợi nhuận bình quân (Trang 116)."},
{t:"Khi hàng hóa bán thấp hơn giá trị nhưng cao hơn chi phí sản xuất thì",o:["không có lợi nhuận","có lợi nhuận","lợi nhuận bằng chi phí sản xuất","lợi nhuận bằng giá trị thặng dư"],c:1,g:"Bán hàng hoá thấp hơn giá trị và cao hơn chi phí sản xuất cũng thu được lợi nhuận (Trang 112)."},
{t:"Công thức vận động của tư bản cho vay là",o:["T-H-T'","T-T'","H-T-H'","H-T"],c:1,g:"Tư bản cho vay vận động theo công thức T-T' (Trang 119)."},
{t:"Tỷ lệ phần trăm giữa lợi nhuận và toàn bộ giá trị của tư bản ứng trước là",o:["tỷ suất lợi tức","tỷ suất lợi nhuận bình quân","tỷ suất lợi nhuận","tỷ suất giá trị thặng dư"],c:2,g:"Tỷ suất lợi nhuận là tỷ lệ phần trăm giữa lợi nhuận và toàn bộ giá trị tư bản ứng trước (Trang 113)."},
{t:"Một phần giá trị thặng dư mà tư bản sản xuất trả cho nhà tư bản thương nghiệp là",o:["lợi nhuận thương nghiệp","lợi tức","địa tô","lợi nhuận bình quân"],c:0,g:"Nguồn gốc của lợi nhuận thương nghiệp là một phần giá trị thặng dư từ sản xuất trả cho thương nghiệp (Trang 117)."},
{t:"Giá mảnh đất 100 m2 tăng từ 500 triệu lên 800 triệu, lãi suất vay giảm từ 5% xuống 4%. Địa tô thay đổi thế nào?",o:["Từ 25.000.000 đồng tăng lên 32.000.000 đồng","Từ 25.000.000 đồng tăng lên 30.000.000 đồng","Từ 32.000.000 đồng giảm xuống 25.000.000 đồng","Từ 30.000.000 đồng giảm xuống 25.000.000 đồng"],c:0,g:"Địa tô = Giá cả đất đai x Lãi suất vay. Lúc đầu: 500tr x 5% = 25tr; Lúc sau: 800tr x 4% = 32tr."},
{t:"Khi hàng hóa bán đúng giá trị thì lợi nhuận",o:["nhỏ hơn giá trị thặng dư","lớn hơn giá trị thặng dư","bằng giá trị","bằng giá trị thặng dư"],c:3,g:"Khi giá cả bằng đúng giá trị, nhà tư bản thực hiện được toàn bộ giá trị thặng dư dưới hình thái lợi nhuận (p = m)."},
{t:"Ông A vay 100.000.000 đồng, sau 1 tháng phải trả 103.000.000 đồng. Tỷ suất lợi tức là bao nhiêu?",o:["4%","2%","3%","1%"],c:2,g:"Tiền lợi tức = 3tr. Tỷ suất lợi tức (z') = (3tr / 100tr) x 100% = 3%."},
{t:"C. Mác ký hiệu lợi tức là",o:["M","V","P","z"],c:3,g:"Ký hiệu của lợi tức là z."},
{t:"Giá cả sản xuất bằng chi phí sản xuất cộng",o:["giá trị thặng dư","lợi nhuận bình quân","tỷ suất lợi nhuận bình quân","lợi nhuận"],c:1,g:"Công thức: Giá cả sản xuất (GCSX) = k + p (Trang 116)."},
{t:"Có 3 ngành sản xuất: I (900C+100V), II (3100C+900V), III (8000C+2000V), m' = 100%. Tỷ suất lợi nhuận bình quân là",o:["15%","10%","20%","25%"],c:2,g:"Tổng m = tổng v = 3000. Tổng tư bản (c+v) = 15000. p' = (3000 / 15000) x 100% = 20%."},
{t:"Đặc điểm cơ bản của tư bản cho vay là quyền sử dụng",o:["gắn liền quyền thừa kế","tách khỏi quyền quản lý","gắn liền quyền sở hữu","tách khỏi quyền sở hữu"],c:3,g:"Tư bản cho vay có đặc điểm là quyền sử dụng tách khỏi quyền sở hữu (Trang 118, 119)."},
{t:"Xí nghiệp A đầu tư 400.000.000 đồng, c/v = 3/2, m' = 50%. Lợi nhuận (cung = cầu) là bao nhiêu?",o:["80.000.000 đồng","20.000.000 đồng","50.000.000 đồng","40.000.000 đồng"],c:0,g:"v = 160tr. m = 50% x 160tr = 80tr. Khi cung = cầu, p = m = 80.000.000 đồng."},
{t:"Địa tô thu được trên mảnh đất cho thuê, không kể độ màu mỡ tự nhiên thuận lợi hay do thâm canh là",o:["địa tô chênh lệch I","địa tô tương đối","địa tô tuyệt đối","địa tô chênh lệch II"],c:2,g:"Địa tô tuyệt đối thu được trên mảnh đất cho thuê bất kể chất lượng đất (Trang 121)."},
{t:"Địa tô thu được trên những loại ruộng đất tốt, độ màu mỡ cao và điều kiện tự nhiên thuận lợi là",o:["địa tô chênh lệch I","địa tô tuyệt đối","địa tô chênh lệch II","địa tô tương đối"],c:0,g:"Địa tô chênh lệch I thu được do điều kiện tự nhiên thuận lợi và đất màu mỡ (Trang 120)."},
{t:"C. Mác ký hiệu lợi nhuận bình quân là",o:["P","P'","p (có gạch ngang đầu)","m"],c:2,g:"Ký hiệu của lợi nhuận bình quân là p có gạch ngang trên đầu (Trang 115)."},
{t:"3 ngành A, B, C đầu tư cùng 100 triệu, c/v lần lượt 4/1, 3/2, 7/3, m' = 100%. Lợi nhuận bình quân từng ngành là",o:["80.000.000 đồng","40.000.000 đồng","20.000.000 đồng","30.000.000 đồng"],c:3,g:"Tổng m = 90tr. Tổng tư bản = 300tr. p' = 30%. Lợi nhuận bình quân = 30% x 100tr = 30 triệu đồng."},
{t:"Xí nghiệp A đầu tư 800.000.000 đồng, lợi nhuận 8.000.000 đồng. Tỷ suất lợi nhuận là",o:["0,1%","10%","1%","2%"],c:2,g:"p' = (8tr / 800tr) x 100% = 1%."},
{t:"Kết quả cạnh tranh giữa các ngành hình thành",o:["giá cả thị trường","lợi nhuận bình quân","giá cả sản xuất","giá trị thị trường"],c:1,g:"Cạnh tranh giữa các ngành tất yếu dẫn tới hình thành lợi nhuận bình quân (Trang 116)."},
{t:"Xí nghiệp giày da có tổng giá trị hàng hóa 650 triệu, m thu được 100 triệu. Chi phí sản xuất là bao nhiêu?",o:["550.000.000 đồng","300.000.000 đồng","450.000.000 đồng","500.000.000 đồng"],c:0,g:"Chi phí sản xuất k = G - m = 650tr - 100tr = 550.000.000 đồng."},
{t:"Lợi nhuận thương nghiệp là số chênh lệch giữa",o:["giá bán và giá mua hàng hóa","giá cả và giá trị hàng hóa","giá trị và chi phí sản xuất","giá cả và chi phí sản xuất"],c:0,g:"Lợi nhuận thương nghiệp là số chênh lệch giữa giá bán và giá mua (Trang 117)."},
{t:"C. Mác ký hiệu tỷ suất lợi nhuận bình quân là",o:["p' (có gạch ngang đầu)","P","P'","M"],c:0,g:"Ký hiệu của tỷ suất lợi nhuận bình quân là p' có gạch ngang trên đầu (Trang 115)."},
{t:"C. Mác ký hiệu tỷ suất lợi tức là",o:["m","z'","P","z"],c:1,g:"Ký hiệu của tỷ suất lợi tức là z' (Trang 119)."},
{t:"Chi phí sản xuất (k) bao gồm",o:["m và v","c và m","c và v","c, v và m"],c:2,g:"Chi phí sản xuất bao gồm tư bản bất biến (c) và tư bản khả biến (v) (Trang 111)."},
{t:"Tỷ suất lợi tức là tỷ lệ phần trăm giữa",o:["lợi tức và giá trị thặng dư","lợi nhuận bình quân và giá trị thặng dư","lợi tức và tư bản cho vay","giá trị thặng dư và tư bản cho vay"],c:2,g:"Tỷ suất lợi tức là tỷ lệ phần trăm giữa lợi tức và tư bản cho vay (Trang 119)."},
{t:"Địa tô thu được trên những mảnh đất do đầu tư thâm canh và làm tăng độ màu mỡ là",o:["địa tô tương đối","địa tô chênh lệch II","địa tô tuyệt đối","địa tô chênh lệch I"],c:1,g:"Địa tô chênh lệch II thu được do thâm canh làm tăng độ màu mỡ (Trang 120)."},
{t:"Phần giá trị bù lại giá cả tư liệu sản xuất và sức lao động đã sử dụng là",o:["chi phí chu chuyển tư bản","chi phí tuần hoàn tư bản","chi phí tư bản bất biến","chi phí sản xuất tư bản chủ nghĩa"],c:3,g:"Đây là định nghĩa chi phí sản xuất tư bản chủ nghĩa (Trang 111)."},
{t:"Có 3 ngành A, B, C đầu tư cùng 100 triệu, c/v lần lượt 4/1, 3/2, 7/3, m' = 100%. Tỷ suất lợi nhuận bình quân bằng bao nhiêu?",o:["20%","30%","25%","10%"],c:1,g:"p' = (90tr / 300tr) x 100% = 30%."},
{t:"Điểm giống nhau giữa địa tô chênh lệch và địa tô tuyệt đối là đều có nguồn gốc từ",o:["giá trị thặng dư","giá trị sử dụng","giá trị trao đổi","giá trị"],c:0,g:"Các hình thức địa tô đều có chung nguồn gốc là giá trị thặng dư (Trang 120)."},
{t:"Xí nghiệp A đầu tư 800 triệu, lợi nhuận 8 triệu, chu chuyển 6 tháng/vòng. Tỷ suất lợi nhuận trong năm là",o:["0,2%","0,1%","1%","2%"],c:3,g:"1 năm có 2 vòng. Tổng lợi nhuận năm là 16tr. p' = (16tr / 800tr) x 100% = 2%."},
{t:"Về bản chất lợi nhuận và giá trị thặng dư đều là",o:["lao động của người lao động làm thuê","lao động cụ thể của người làm thuê","lao động phức tạp của người làm thuê","lao động không công của người lao động làm thuê"],c:3,g:"Cả hai đều có nguồn gốc duy nhất là lao động không công của công nhân."},
{t:"Một phần lợi nhuận bình quân mà người đi vay trả cho người cho vay vì sử dụng lượng tiền nhàn rỗi là",o:["lợi nhuận bình quân","lợi tức","địa tô","lợi nhuận thương nghiệp"],c:1,g:"Đây là định nghĩa về lợi tức (Trang 118)."}
];
// State
// ans[i]: null = chưa làm, number = đã chọn, 'skip' = bỏ qua
let cur = 0;
let ans = new Array(Q.length).fill(null);
let showSum = false;

// Timer
let totalSec = 60 * 60; // 60 phút
let timerInterval = setInterval(()=>{
  if(totalSec <= 0){ clearInterval(timerInterval); finishQuiz(); return; }
  totalSec--;
  const m = String(Math.floor(totalSec/60)).padStart(2,'0');
  const s = String(totalSec%60).padStart(2,'0');
  const el = document.getElementById('timer-txt');
  if(el) el.textContent = m+':'+s;
}, 1000);

function getTabClass(i){
  const a = ans[i];
  const active = i===cur ? ' active' : '';
  if(a === null) return 'tab-item'+active;
  if(a === 'skip' || a === 'unanswered' || a === 'hint') return 'tab-item answered-skip'+active;
  if(!a.revealed) return 'tab-item'+active; // đã chọn nhưng chưa reveal → coi như chưa làm
  if(a.choice === Q[i].c) return 'tab-item answered-ok'+active;
  return 'tab-item answered-ng'+active;
}

function renderTabs(){
  const wrap = document.getElementById('tabs-wrap');
  wrap.innerHTML = Q.map((_,i)=>`<div class="${getTabClass(i)}" onclick="goTo(${i})">Câu ${i+1}</div>`).join('');
  setTimeout(()=>{
    const tabs = wrap.querySelectorAll('.tab-item');
    if(tabs[cur]) tabs[cur].scrollIntoView({block:'nearest',inline:'center'});
  }, 30);
}

function renderProgress(){
  const done = ans.filter(a=>a && (a==='skip' || a==='unanswered' || a==='hint' || a.revealed)).length;
  const el = document.getElementById('prog-info');
  if(el) el.textContent = done + ' / ' + Q.length + ' câu';
  const bar = document.getElementById('prog-bar');
  if(!bar) return;
  // Mỗi câu một đoạn nhỏ: đúng=xanh lá, sai=đỏ, chưa làm/bỏ qua=xám nhạt
  const segW = (100 / Q.length).toFixed(4) + '%';
  bar.innerHTML = Q.map((_,i)=>{
    const a = ans[i];
    let color = '#e0e0e0'; // chưa làm / bỏ qua = trắng
    if(a === 'unanswered'){
      color = '#e53935'; // nộp bài mà chưa làm = đỏ
    } else if(a && a !== 'skip' && a !== 'unanswered' && a !== 'hint' && a.revealed){
      color = a.choice === Q[i].c ? '#43a047' : '#e53935';
    }
    return `<div class="prog-seg" style="width:${segW};background:${color}"></div>`;
  }).join('');
}

function renderQ(){
  if(showSum){ renderSum(); return; }
  const q = Q[cur];
  // ans[cur]: null = chưa làm, {choice: number, revealed: bool} = đã chọn, 'skip' = bỏ qua
  const a = ans[cur];
  const isSkip = a === 'unanswered';
  const isHint = a === 'hint'; // bấm xem đáp án mà không chọn
  const isChosen = a !== null && a !== 'skip' && a !== 'unanswered' && a !== 'hint';
  const isRevealed = isChosen && a.revealed;
  const choice = isChosen ? a.choice : null;

  // Chỉ hiện đúng/sai khi đã revealed (tức đã bấm sang câu khác sau khi chọn)
  let explain = '';
  if(isRevealed){
    if(choice === q.c){
      explain = `<div class="explain-box correct-box"><span class="explain-icon">✅</span><div class="explain-content"><div class="explain-label">Chính xác!</div><div class="explain-text">${q.g}</div></div></div>`;
    } else {
      explain = `<div class="explain-box wrong-box"><span class="explain-icon">❌</span><div class="explain-content"><div class="explain-label">Chưa đúng — Đáp án: ${q.o[q.c]}</div><div class="explain-text">${q.g}</div></div></div>`;
    }
  } else if(isHint){
    explain = `<div class="explain-box"><span class="explain-icon">💡</span><div class="explain-content"><div class="explain-label">Đáp án đúng</div><div class="explain-text"><strong>${q.o[q.c]}</strong><br>${q.g}</div></div></div>`;
  }

  // Lock options: nếu đã skip hoặc đã revealed thì không cho chọn nữa
  // Nếu đã chọn nhưng chưa revealed: vẫn hiện lựa chọn nhưng chưa tô màu đúng/sai
  const locked = isSkip || isRevealed || isHint;

  const opts = q.o.map((o,i)=>{
    let cls = 'opt-item';
    if(locked) cls += ' disabled';
    if(isRevealed){
      if(i === q.c) cls += ' selected-ok';
      else if(i === choice && choice !== q.c) cls += ' selected-ng';
    } else if(isChosen && i === choice){
      // Đã chọn nhưng chưa revealed: tô xanh nhạt nhưng chưa show đúng/sai
      cls += ' selected-pending';
    }
    const click = !locked ? `onclick="pick(${i})"` : '';
    const numLabel = ['1','2','3','4'][i];
    return `<div class="${cls}" ${click}><div class="opt-num">${numLabel}</div><span class="opt-text">${o}</span></div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="q-wrap">
      <div class="q-number">Câu ${cur+1} / ${Q.length}</div>
      <div class="q-text">${q.t}</div>
      <div class="options">${opts}</div>
      ${explain}
      <div class="pb-safe"></div>
    </div>
    <div class="fnav">
      <button class="nav-btn btn-prev" onclick="prev()" ${cur===0?'disabled':''}>
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="fnav-center" onclick="toggleGrid()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="#1565C0" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="#1565C0" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="#1565C0" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="#1565C0" stroke-width="2"/></svg>
        Câu ${cur+1} / ${Q.length}
      </div>
      <button class="nav-btn btn-next" onclick="next()">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  `;

  renderTabs();
  renderProgress();
  // Hiện nút Đáp án chỉ khi câu chưa làm/chưa revealed và chưa hint
  const fab = document.getElementById('fab-ans');
  if(fab){
    const _a = ans[cur];
    const canHint = !showSum && (_a === null || (_a && _a !== 'skip' && _a !== 'unanswered' && _a !== 'hint' && !_a.revealed));
    fab.classList.toggle('hidden', !canHint);
  }
  setTimeout(renderMath, 50);
}

function renderSum(){
  const ok = ans.filter((a,i)=>a && a!=='skip' && a.revealed && a.choice===Q[i].c).length;
  const ng = ans.filter((a,i)=>a && a!=='skip' && a.revealed && a.choice!==Q[i].c).length;
  const sk = ans.filter(a=>a===null||a==='skip'||a==='unanswered'||a==='hint').length;
  const pct = Math.round(ok/Q.length*100);
  const pass = ok >= Math.ceil(Q.length*0.8);

  document.getElementById('main-content').innerHTML = `
    <div class="sum-wrap">
      <div class="sum-emoji">${pass?'🎉':'📖'}</div>
      <div class="sum-score">${ok}/${Q.length}</div>
      <div class="sum-sub">${pass?'Xuất sắc! Bạn nắm vững nội dung.':'Cần ôn thêm để nắm chắc hơn nhé.'}</div>
      <div class="sum-grid">
        <div class="sum-card"><div class="sum-num ok-c">${ok}</div><div class="sum-lbl">Câu đúng</div></div>
        <div class="sum-card"><div class="sum-num ng-c">${ng}</div><div class="sum-lbl">Câu sai</div></div>
        <div class="sum-card"><div class="sum-num skip-c">${sk}</div><div class="sum-lbl">Bỏ qua</div></div>
        <div class="sum-card"><div class="sum-num pct-c">${pct}%</div><div class="sum-lbl">Điểm số</div></div>
      </div>
      <button class="sum-btn sum-btn-p" onclick="restart()">Làm lại từ đầu</button>
      <button class="sum-btn sum-btn-o" onclick="review()">Xem lại câu trả lời</button>
    </div>
  `;
  renderTabs();
  renderProgress();
}

// Helper: reveal câu hiện tại (đánh dấu đã chuyển câu)
function revealCurrent(){
  const a = ans[cur];
  if(a && a !== 'skip' && a !== 'unanswered' && a !== 'hint' && !a.revealed){
    ans[cur] = {choice: a.choice, revealed: true};
  }
}

// Helper: skip câu nếu chưa chọn gì
function skipIfEmpty(){
  if(ans[cur] === null) ans[cur] = 'skip';
  // hint = đã xem đáp án, giữ nguyên (không skip)
}

function pick(i){
  const a = ans[cur];
  if(a && a !== 'skip' && a !== 'unanswered' && a !== 'hint' && a.revealed) return;
  ans[cur] = {choice: i, revealed: false};
  renderQ();
}

function prev(){
  if(cur === 0) return;
  // Reveal câu hiện tại nếu đã chọn, skip nếu chưa
  revealCurrent();
  cur--;
  showSum = false;
  renderQ();
}

function next(){
  // Reveal câu hiện tại nếu đã chọn, skip nếu chưa
  revealCurrent();
  if(cur < Q.length - 1){
    cur++;
    renderQ();
  } else {
    showSum = true;
    renderSum();
  }
}

function goTo(i){
  if(i === cur && !showSum){ closeGridDirect(); return; }
  revealCurrent();
  skipIfEmpty();
  cur = i;
  showSum = false;
  renderQ();
  closeGridDirect();
}

function openConfirm(){
  const done = ans.filter(a => a !== null && a !== 'skip').length;
  const skip = ans.filter(a => a === null || a === 'skip').length;
  const sub = document.getElementById('confirm-sub');
  if(skip > 0){
    sub.innerHTML = `Đã làm <strong>${done}/${Q.length}</strong> câu, còn <strong>${skip}</strong> câu chưa trả lời.`;
  } else {
    sub.innerHTML = `Đã hoàn thành <strong>tất cả ${Q.length} câu</strong>. Sẵn sàng nộp!`;
  }
  document.getElementById('confirm-overlay').classList.add('show');
}
function closeConfirm(){
  document.getElementById('confirm-overlay').classList.remove('show');
}
function confirmFinish(){
  closeConfirm();
  finishQuiz();
}

function finishQuiz(){
  revealCurrent();
  ans = ans.map(a => {
    if(a === null) return 'unanswered'; // chưa làm → đỏ trên thanh
    if(a === 'skip') return 'skip';     // bỏ qua → trắng
    if(!a.revealed) return {choice: a.choice, revealed: true};
    return a;
  });
  showSum = true;
  renderSum();
}

function restart(){
  ans = new Array(Q.length).fill(null);
  cur = 0; showSum = false;
  totalSec = 60*60;
  renderQ();
}

function review(){
  showSum = false; cur = 0; renderQ();
}

function showHint(){
  const q = Q[cur];
  const a = ans[cur];
  // Nếu đã chọn rồi thì reveal luôn, nếu chưa thì đánh dấu hint
  if(a && a !== 'skip' && a !== 'unanswered' && !a.revealed){
    ans[cur] = {choice: a.choice, revealed: true};
  } else if(a === null){
    ans[cur] = 'hint'; // xem đáp án mà không chọn
  }
  renderQ();
}

function toggleGrid(){
  const ov = document.getElementById('grid-overlay');
  const grid = document.getElementById('q-grid');
  grid.innerHTML = Q.map((_,i)=>{
    const a = ans[i];
    let cls = 'q-dot';
    if(i===cur && !showSum) cls += ' cur';
    else if(a===null) cls += '';
    else if(a==='skip') cls += ' skip';
    else if(!a.revealed) cls += ''; // chọn rồi nhưng chưa qua câu
    else if(a.choice===Q[i].c) cls += ' ok';
    else cls += ' ng';
    return `<div class="${cls}" onclick="goTo(${i})">${i+1}</div>`;
  }).join('');
  ov.classList.add('show');
}

function closeGrid(e){
  if(e.target === document.getElementById('grid-overlay')) closeGridDirect();
}

function closeGridDirect(){
  document.getElementById('grid-overlay').classList.remove('show');
}

function renderMath(){
  if(typeof renderMathInElement === 'function'){
    renderMathInElement(document.getElementById('main-content'), {
      delimiters: [{left:"$",right:"$",display:false}],
      throwOnError: false
    });
  }
}

// Init
renderQ();
</script>
</body>
</html>
