<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn thi KTCT Mác-Lênin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:#ececef;min-height:100vh}

/* Header */
.header{background:#1565C0;color:#fff;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.header-left{display:flex;align-items:center;gap:10px}
.header-icon{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer}
.header-title{font-size:17px;font-weight:600}
.nop-bai{display:flex;align-items:center;gap:6px;background:#fff;border:none;border-radius:20px;padding:7px 14px;cursor:pointer;font-size:14px;font-weight:700;color:#1565C0;box-shadow:0 2px 8px rgba(0,0,0,0.15);transition:all .15s;font-family:inherit}
.nop-bai:hover{background:#f0f6ff;transform:scale(1.03)}

/* Timer */
.timer-bar{background:#1976D2;padding:6px 16px;display:flex;align-items:center;justify-content:space-between}
.timer-txt{color:#fff;font-size:14px;font-weight:600;letter-spacing:0.5px}
.progress-info{color:rgba(255,255,255,0.8);font-size:13px}

/* Progress bar */
.prog-bar-wrap{height:5px;background:#e0e0e0;display:flex}
.prog-seg{height:5px;transition:background .3s}

/* Tabs */
.tabs-wrap{background:#fff;border-bottom:1px solid #e0e0e0;overflow-x:auto;display:flex;gap:0;position:sticky;top:44px;z-index:99}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab-item{flex-shrink:0;padding:12px 16px;font-size:14px;font-weight:500;color:#666;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;position:relative}
.tab-item.active{color:#1565C0;border-bottom-color:#1565C0;font-weight:700}
.tab-item.answered-ok{color:#2e7d32}
.tab-item.answered-ng{color:#c62828}
.tab-item.answered-skip{color:#bbb}

/* Question area */
.q-wrap{padding:16px;max-width:700px;margin:0 auto}
.q-number{font-size:14px;color:#1565C0;font-weight:600;margin-bottom:8px}
.q-text{font-size:17px;font-weight:700;color:#1a1a1a;line-height:1.65;margin-bottom:18px}

/* Options */
.options{display:flex;flex-direction:column;gap:10px}
.opt-item{
  display:flex;align-items:center;gap:14px;
  padding:17px 16px;
  border-radius:12px;
  border:2px solid transparent;
  cursor:pointer;
  background:#fff;
  box-shadow:0 1px 4px rgba(0,0,0,0.07);
  transition:background .15s, border-color .15s, box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.opt-item:not(.disabled):hover{background:#f0f4ff;border-color:#c5d8f8}
.opt-item:not(.disabled):hover .opt-num{border-color:#1976D2;color:#1565C0}

/* Pending */
.opt-item.selected-pending{background:#e8f0fe;border-color:#1565C0}
.opt-item.selected-pending .opt-num{border-color:#1565C0;color:#1565C0;background:#dce8fc}
.opt-item.selected-pending .opt-text{color:#0d47a1;font-weight:600}

/* Correct */
.opt-item.selected-ok{background:#e8f5e9;border-color:#43a047}
.opt-item.selected-ok .opt-num{background:#43a047;border-color:#43a047;color:#fff}
.opt-item.selected-ok .opt-text{color:#2e7d32;font-weight:600}
.opt-item.show-correct{background:#e8f5e9;border-color:#43a047}
.opt-item.show-correct .opt-num{background:#43a047;border-color:#43a047;color:#fff}
.opt-item.show-correct .opt-text{color:#2e7d32;font-weight:600}

/* Wrong */
.opt-item.selected-ng{background:#ffebee;border-color:#e53935}
.opt-item.selected-ng .opt-num{background:#e53935;border-color:#e53935;color:#fff}
.opt-item.selected-ng .opt-text{color:#c62828;font-weight:600}

.opt-item.disabled{cursor:default;pointer-events:none}

.opt-num{
  width:36px;height:36px;border-radius:50%;
  border:2px solid #d0d0d0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#888;
  flex-shrink:0;
  transition:all .15s;
  background:#fff;
}
.opt-text{font-size:15px;color:#1a1a1a;line-height:1.5;flex:1}

/* Explanation */
.explain-box{margin-top:14px;padding:13px 14px;border-radius:12px;background:#fffde7;border-left:4px solid #f9a825;display:flex;gap:10px;align-items:flex-start}
.explain-box.correct-box{background:#e8f5e9;border-left-color:#43a047}
.explain-box.wrong-box{background:#ffebee;border-left-color:#e53935}
.explain-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.explain-content{}
.explain-label{font-size:13px;font-weight:700;color:#f57f17;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.explain-box.correct-box .explain-label{color:#2e7d32}
.explain-box.wrong-box .explain-label{color:#c62828}
.explain-text{font-size:15px;color:#333;line-height:1.6}

/* Bottom nav */
.fnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:100;max-width:700px;margin:0 auto}
.fnav-center{font-size:14px;color:#555;font-weight:500;display:flex;align-items:center;gap:6px;cursor:pointer}
.fnav-center svg{color:#1565C0}
.nav-btn{width:42px;height:42px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:all .18s}
.btn-prev{background:#f0f2f5;color:#444}
.btn-prev:hover{background:#e0e0e0}
.btn-next{background:#1565C0;color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.35)}
.btn-next:hover{background:#0d47a1}
.nav-btn:disabled{opacity:0.35;cursor:not-allowed}

/* Summary */
.sum-wrap{padding:24px 16px 100px;max-width:700px;margin:0 auto;text-align:center}
.sum-emoji{font-size:56px;margin-bottom:8px}
.sum-score{font-size:52px;font-weight:700;color:#1565C0;margin:4px 0}
.sum-sub{font-size:14px;color:#666;margin-bottom:24px}
.sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
.sum-card{background:#fff;border-radius:14px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.sum-num{font-size:28px;font-weight:700}
.sum-lbl{font-size:12px;color:#888;margin-top:4px}
.ok-c{color:#43a047}.ng-c{color:#e53935}.skip-c{color:#f57c00}.pct-c{color:#1565C0}
.sum-btn{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;margin-bottom:10px;font-family:inherit;transition:all .18s}
.sum-btn-p{background:#1565C0;color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.3)}
.sum-btn-p:hover{background:#0d47a1}
.sum-btn-o{background:#fff;color:#1565C0;border:2px solid #1565C0}
.sum-btn-o:hover{background:#f0f6ff}

/* Grid dialog */
.grid-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end}
.grid-overlay.show{display:flex}
.grid-modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:70vh;overflow-y:auto;max-width:700px;margin:0 auto}
.grid-modal h3{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:14px;text-align:center}
.q-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.q-dot{width:100%;aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:2px solid #e0e0e0;background:#f5f5f5;color:#666;transition:all .15s}
.q-dot.cur{border-color:#1565C0;background:#e3f2fd;color:#1565C0}
.q-dot.ok{background:#43a047;border-color:#43a047;color:#fff}
.q-dot.ng{background:#e53935;border-color:#e53935;color:#fff}
.q-dot.skip{background:#ff9800;border-color:#ff9800;color:#fff}
.grid-close{width:100%;padding:12px;border-radius:10px;border:none;background:#f0f2f5;color:#333;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;font-family:inherit}

.pb-safe{height:70px}

/* Confirm dialog */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;align-items:center;justify-content:center;padding:24px}
.confirm-overlay.show{display:flex}
.confirm-box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.confirm-icon{font-size:44px;margin-bottom:12px}
.confirm-title{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
.confirm-sub{font-size:14px;color:#777;line-height:1.5;margin-bottom:24px}
.confirm-btns{display:flex;gap:10px}
.confirm-btn{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.confirm-btn-cancel{background:#f0f2f5;color:#555}
.confirm-btn-cancel:hover{background:#e0e0e0}
.confirm-btn-ok{background:#1565C0;color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.3)}
.confirm-btn-ok:hover{background:#0d47a1}

.fab-answer{position:fixed;bottom:80px;right:16px;background:#1565C0;color:#fff;border:none;border-radius:50px;padding:11px 20px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:99;font-family:inherit;transition:all .2s}
.fab-answer:hover{background:#3a6b8a;transform:scale(1.04)}
.fab-answer.hidden{display:none}
</style>
</head>

  </div>

<div class="prog-bar-wrap" id="prog-bar"></div>

<div class="tabs-wrap" id="tabs-wrap"></div>

<div id="main-content"></div>

<!-- Floating answer button -->

  <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>

</div>

<script>
const Q=[
{t:"Khi tiền thực hiện chức năng thước đo giá trị thì được ngầm hiểu đó là:",o:["bitcoin.","tiền vàng.","tiền điện tử.","tiền giấy."],c:1,g:"Để thực hiện chức năng đo lường giá trị, không nhất thiết phải là tiền mặt mà chỉ cần so sánh với một lượng vàng nhất định một cách tưởng tượng (Xem trang 49, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Theo yêu cầu của quy luật giá trị, người sản xuất muốn bán được hàng hóa trên thị trường, muốn được xã hội thừa nhận sản phẩm thì lượng giá trị của một hàng hóa cá biệt phải phù hợp với thời gian lao động:",o:["cá biệt cần thiết.","trừu tượng cần thiết.","tư nhân cần thiết.","xã hội cần thiết."],c:3,g:"Quy luật giá trị đòi hỏi việc sản xuất và trao đổi phải dựa trên cơ sở hao phí lao động xã hội cần thiết (Xem trang 67, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Yêu cầu của quy luật giá trị, việc sản xuất và trao đổi hàng hóa phải được tiến hành trên cơ sở của hao phí lao động:",o:["xã hội cần thiết.","trừu tượng cần thiết.","cá biệt cần thiết.","tư nhân cần thiết."],c:0,g:"Việc sản xuất và trao đổi hàng hóa phải được tiến hành trên cơ sở của hao phí lao động xã hội cần thiết (Xem trang 67, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Lao động xã hội của người sản xuất đã hao phí để sản xuất ra hàng hóa kết tinh trong hàng hóa ấy là:",o:["giá trị của hàng hóa.","giá trị sử dụng của hàng hóa.","giá trị thị trường.","giá trị thặng dư."],c:0,g:"Giá trị hàng hoá là lao động xã hội của người sản xuất hàng hoá kết tinh trong hàng hoá. Giá trị sử dụng là công dụng của vật phẩm (Xem trang 39, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá trị hàng hóa biểu hiện mối quan hệ giữa những người:",o:["tiêu dùng hàng hóa.","phân phối hàng hóa.","sản xuất, trao đổi hàng hóa.","phân phối, tiêu dùng hàng hóa."],c:2,g:"Giá trị hàng hoá biểu hiện mối quan hệ kinh tế giữa những người sản xuất và trao đổi hàng hoá (Xem trang 39, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khối lượng tiền cần thiết cho lưu thông tỷ lệ thuận với tổng số giá cả hàng hóa được đưa ra thị trường và tỷ lệ nghịch với:",o:["lượng tiền cất trữ.","tốc độ lưu thông của tiền tệ.","mức thanh toán mua hàng.","tốc độ lưu thông của hàng hóa."],c:1,g:"Khối lượng tiền cần thiết tỷ lệ thuận với tổng giá cả và tỷ lệ nghịch với tốc độ lưu thông của tiền tệ (Xem trang 71, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Lao động cụ thể phản ánh tính chất nào sau đây của lao động sản xuất hàng hóa?",o:["Trừu tượng.","Xã hội.","Tư nhân.","Cụ thể."],c:2,g:"Lao động cụ thể phản ánh tính chất tư nhân, trong khi lao động trừu tượng phản ánh tính chất xã hội của lao động sản xuất hàng hoá (Xem trang 41, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tiền được dùng làm phương tiện mua bán, thanh toán quốc tế giữa các nước với nhau là thực hiện chức năng:",o:["thước đo giá trị.","phương tiện lưu thông.","phương tiện cất trữ.","tiền tệ thế giới."],c:3,g:"Khi tiền thực hiện chức năng mua bán, thanh toán quốc tế thì đó là chức năng tiền tệ thế giới (Xem trang 51, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Lượng thời gian hao phí lao động xã hội cần thiết để sản xuất ra đơn vị hàng hóa là:",o:["lượng giá trị của hàng hóa.","thời gian lao động tất yếu.","lượng giá trị cá biệt của hàng hóa.","thời gian lao động thặng dư."],c:0,g:"Lượng giá trị của hàng hoá chính là lượng thời gian hao phí lao động xã hội cần thiết để sản xuất ra sản phẩm đó."},
{t:"Yêu cầu của quy luật giá trị, trong lĩnh vực trao đổi phải tiến hành theo nguyên tắc ngang giá, dựa trên cơ sở:",o:["giá trị cá biệt.","giá trị trao đổi.","giá thị thặng dư.","giá trị xã hội."],c:3,g:"Trao đổi phải dựa trên cơ sở giá trị xã hội, tức là dựa trên hao phí lao động xã hội cần thiết (Xem trang 67, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Các nhân tố ảnh hưởng đến lượng giá trị của hàng hóa bao gồm năng suất lao động và:",o:["trình độ phát triển của lực lượng sản xuất.","năng lực lao động.","tính chất phức tạp hay giản đơn của lao động.","cường độ lao động."],c:2,g:"Lượng giá trị hàng hóa chịu ảnh hưởng bởi năng suất lao động và tính chất của lao động (phức tạp hay giản đơn) (Xem trang 43, 45 giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Hàng hóa không thể cất trữ, việc sản xuất và tiêu dùng diễn ra đồng thời là:",o:["bản quyền.","chứng quyền.","thương hiệu.","dịch vụ."],c:3,g:"Dịch vụ là hàng hoá vô hình, không thể cất trữ, quá trình sản xuất và tiêu dùng diễn ra đồng thời (Xem trang 52, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Lượng giá trị trong một đơn vị hàng hóa sẽ giảm xuống khi tăng:",o:["tốc độ chu chuyển của tư bản.","cường độ lao động.","thời gian chu chuyển của tư bản.","năng suất lao động."],c:3,g:"Năng suất lao động tăng lên làm hao phí lao động trên một đơn vị sản phẩm giảm đi, do đó lượng giá trị giảm (Xem trang 44, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những chức năng của tiền là phương tiện:",o:["phát triển.","vận hành.","đầu tư.","lưu thông."],c:3,g:"Tiền làm môi giới trong trao đổi hàng hóa thực hiện chức năng phương tiện lưu thông (Xem trang 50, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},

// State
// ans[i]: null = chưa làm, number = đã chọn, 'skip' = bỏ qua
let cur = 0;
let ans = new Array(Q.length).fill(null);
let showSum = false;

// Timer
let totalSec = 60 * 60; // 60 phút
let timerInterval = setInterval(()=>{
  if(totalSec <= 0){ clearInterval(timerInterval); finishQuiz(); return; }
  totalSec--;
  const m = String(Math.floor(totalSec/60)).padStart(2,'0');
  const s = String(totalSec%60).padStart(2,'0');
  const el = document.getElementById('timer-txt');
  if(el) el.textContent = m+':'+s;
}, 1000);

function getTabClass(i){
  const a = ans[i];
  const active = i===cur ? ' active' : '';
  if(a === null) return 'tab-item'+active;
  if(a === 'skip' || a === 'unanswered' || a === 'hint') return 'tab-item answered-skip'+active;
  if(!a.revealed) return 'tab-item'+active; // đã chọn nhưng chưa reveal → coi như chưa làm
  if(a.choice === Q[i].c) return 'tab-item answered-ok'+active;
  return 'tab-item answered-ng'+active;
}

function renderTabs(){
  const wrap = document.getElementById('tabs-wrap');
  wrap.innerHTML = Q.map((_,i)=>`<div class="${getTabClass(i)}" onclick="goTo(${i})">Câu ${i+1}</div>`).join('');
  setTimeout(()=>{
    const tabs = wrap.querySelectorAll('.tab-item');
    if(tabs[cur]) tabs[cur].scrollIntoView({block:'nearest',inline:'center'});
  }, 30);
}

function renderProgress(){
  const done = ans.filter(a=>a && (a==='skip' || a==='unanswered' || a==='hint' || a.revealed)).length;
  const el = document.getElementById('prog-info');
  if(el) el.textContent = done + ' / ' + Q.length + ' câu';
  const bar = document.getElementById('prog-bar');
  if(!bar) return;
  // Mỗi câu một đoạn nhỏ: đúng=xanh lá, sai=đỏ, chưa làm/bỏ qua=xám nhạt
  const segW = (100 / Q.length).toFixed(4) + '%';
  bar.innerHTML = Q.map((_,i)=>{
    const a = ans[i];
    let color = '#e0e0e0'; // chưa làm / bỏ qua = trắng
    if(a === 'unanswered'){
      color = '#e53935'; // nộp bài mà chưa làm = đỏ
    } else if(a && a !== 'skip' && a !== 'unanswered' && a !== 'hint' && a.revealed){
      color = a.choice === Q[i].c ? '#43a047' : '#e53935';
    }
    return `<div class="prog-seg" style="width:${segW};background:${color}"></div>`;
  }).join('');
}

function renderQ(){
  if(showSum){ renderSum(); return; }
  const q = Q[cur];
  // ans[cur]: null = chưa làm, {choice: number, revealed: bool} = đã chọn, 'skip' = bỏ qua
  const a = ans[cur];
  const isSkip = a === 'unanswered';
  const isHint = a === 'hint'; // bấm xem đáp án mà không chọn
  const isChosen = a !== null && a !== 'skip' && a !== 'unanswered' && a !== 'hint';
  const isRevealed = isChosen && a.revealed;
  const choice = isChosen ? a.choice : null;

  // Chỉ hiện đúng/sai khi đã revealed (tức đã bấm sang câu khác sau khi chọn)
  let explain = '';
  if(isRevealed){
    if(choice === q.c){
      explain = `<div class="explain-box correct-box"><span class="explain-icon">✅</span><div class="explain-content"><div class="explain-label">Chính xác!</div><div class="explain-text">${q.g}</div></div></div>`;
    } else {
      explain = `<div class="explain-box wrong-box"><span class="explain-icon">❌</span><div class="explain-content"><div class="explain-label">Chưa đúng — Đáp án: ${q.o[q.c]}</div><div class="explain-text">${q.g}</div></div></div>`;
    }
  } else if(isHint){
    explain = `<div class="explain-box"><span class="explain-icon">💡</span><div class="explain-content"><div class="explain-label">Đáp án đúng</div><div class="explain-text"><strong>${q.o[q.c]}</strong><br>${q.g}</div></div></div>`;
  }

  // Lock options: nếu đã skip hoặc đã revealed thì không cho chọn nữa
  // Nếu đã chọn nhưng chưa revealed: vẫn hiện lựa chọn nhưng chưa tô màu đúng/sai
  const locked = isSkip || isRevealed || isHint;

  const opts = q.o.map((o,i)=>{
    let cls = 'opt-item';
    if(locked) cls += ' disabled';
    if(isRevealed){
      if(i === q.c) cls += ' selected-ok';
      else if(i === choice && choice !== q.c) cls += ' selected-ng';
    } else if(isChosen && i === choice){
      // Đã chọn nhưng chưa revealed: tô xanh nhạt nhưng chưa show đúng/sai
      cls += ' selected-pending';
    }
    const click = !locked ? `onclick="pick(${i})"` : '';
    const numLabel = ['1','2','3','4'][i];
    return `<div class="${cls}" ${click}><div class="opt-num">${numLabel}</div><span class="opt-text">${o}</span></div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="q-wrap">
      <div class="q-number">Câu ${cur+1} / ${Q.length}</div>
      <div class="q-text">${q.t}</div>
      <div class="options">${opts}</div>
      ${explain}
      <div class="pb-safe"></div>
    </div>
    <div class="fnav">
      <button class="nav-btn btn-prev" onclick="prev()" ${cur===0?'disabled':''}>
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="fnav-center" onclick="toggleGrid()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="#1565C0" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="#1565C0" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="#1565C0" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="#1565C0" stroke-width="2"/></svg>
        Câu ${cur+1} / ${Q.length}
      </div>
      <button class="nav-btn btn-next" onclick="next()">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  `;

  renderTabs();
  renderProgress();
  // Hiện nút Đáp án chỉ khi câu chưa làm/chưa revealed và chưa hint
  const fab = document.getElementById('fab-ans');
  if(fab){
    const _a = ans[cur];
    const canHint = !showSum && (_a === null || (_a && _a !== 'skip' && _a !== 'unanswered' && _a !== 'hint' && !_a.revealed));
    fab.classList.toggle('hidden', !canHint);
  }
  setTimeout(renderMath, 50);
}

function renderSum(){
  const ok = ans.filter((a,i)=>a && a!=='skip' && a.revealed && a.choice===Q[i].c).length;
  const ng = ans.filter((a,i)=>a && a!=='skip' && a.revealed && a.choice!==Q[i].c).length;
  const sk = ans.filter(a=>a===null||a==='skip'||a==='unanswered'||a==='hint').length;
  const pct = Math.round(ok/Q.length*100);
  const pass = ok >= Math.ceil(Q.length*0.8);

  document.getElementById('main-content').innerHTML = `
    <div class="sum-wrap">
      <div class="sum-emoji">${pass?'🎉':'📖'}</div>
      <div class="sum-score">${ok}/${Q.length}</div>
      <div class="sum-sub">${pass?'Xuất sắc! Bạn nắm vững nội dung.':'Cần ôn thêm để nắm chắc hơn nhé.'}</div>
      <div class="sum-grid">
        <div class="sum-card"><div class="sum-num ok-c">${ok}</div><div class="sum-lbl">Câu đúng</div></div>
        <div class="sum-card"><div class="sum-num ng-c">${ng}</div><div class="sum-lbl">Câu sai</div></div>
        <div class="sum-card"><div class="sum-num skip-c">${sk}</div><div class="sum-lbl">Bỏ qua</div></div>
        <div class="sum-card"><div class="sum-num pct-c">${pct}%</div><div class="sum-lbl">Điểm số</div></div>
      </div>
      <button class="sum-btn sum-btn-p" onclick="restart()">Làm lại từ đầu</button>
      <button class="sum-btn sum-btn-o" onclick="review()">Xem lại câu trả lời</button>
    </div>
  `;
  renderTabs();
  renderProgress();
}

// Helper: reveal câu hiện tại (đánh dấu đã chuyển câu)
function revealCurrent(){
  const a = ans[cur];
  if(a && a !== 'skip' && a !== 'unanswered' && a !== 'hint' && !a.revealed){
    ans[cur] = {choice: a.choice, revealed: true};
  }
}

// Helper: skip câu nếu chưa chọn gì
function skipIfEmpty(){
  if(ans[cur] === null) ans[cur] = 'skip';
  // hint = đã xem đáp án, giữ nguyên (không skip)
}

function pick(i){
  const a = ans[cur];
  if(a && a !== 'skip' && a !== 'unanswered' && a !== 'hint' && a.revealed) return;
  ans[cur] = {choice: i, revealed: false};
  renderQ();
}

function prev(){
  if(cur === 0) return;
  // Reveal câu hiện tại nếu đã chọn, skip nếu chưa
  revealCurrent();
  cur--;
  showSum = false;
  renderQ();
}

function next(){
  // Reveal câu hiện tại nếu đã chọn, skip nếu chưa
  revealCurrent();
  if(cur < Q.length - 1){
    cur++;
    renderQ();
  } else {
    showSum = true;
    renderSum();
  }
}

function goTo(i){
  if(i === cur && !showSum){ closeGridDirect(); return; }
  revealCurrent();
  skipIfEmpty();
  cur = i;
  showSum = false;
  renderQ();
  closeGridDirect();
}

function openConfirm(){
  const done = ans.filter(a => a !== null && a !== 'skip').length;
  const skip = ans.filter(a => a === null || a === 'skip').length;
  const sub = document.getElementById('confirm-sub');
  if(skip > 0){
    sub.innerHTML = `Đã làm <strong>${done}/${Q.length}</strong> câu, còn <strong>${skip}</strong> câu chưa trả lời.`;
  } else {
    sub.innerHTML = `Đã hoàn thành <strong>tất cả ${Q.length} câu</strong>. Sẵn sàng nộp!`;
  }
  document.getElementById('confirm-overlay').classList.add('show');
}
function closeConfirm(){
  document.getElementById('confirm-overlay').classList.remove('show');
}
function confirmFinish(){
  closeConfirm();
  finishQuiz();
}

function finishQuiz(){
  revealCurrent();
  ans = ans.map(a => {
    if(a === null) return 'unanswered'; // chưa làm → đỏ trên thanh
    if(a === 'skip') return 'skip';     // bỏ qua → trắng
    if(!a.revealed) return {choice: a.choice, revealed: true};
    return a;
  });
  showSum = true;
  renderSum();
}

function restart(){
  ans = new Array(Q.length).fill(null);
  cur = 0; showSum = false;
  totalSec = 60*60;
  renderQ();
}

function review(){
  showSum = false; cur = 0; renderQ();
}

function showHint(){
  const q = Q[cur];
  const a = ans[cur];
  // Nếu đã chọn rồi thì reveal luôn, nếu chưa thì đánh dấu hint
  if(a && a !== 'skip' && a !== 'unanswered' && !a.revealed){
    ans[cur] = {choice: a.choice, revealed: true};
  } else if(a === null){
    ans[cur] = 'hint'; // xem đáp án mà không chọn
  }
  renderQ();
}

function toggleGrid(){
  const ov = document.getElementById('grid-overlay');
  const grid = document.getElementById('q-grid');
  grid.innerHTML = Q.map((_,i)=>{
    const a = ans[i];
    let cls = 'q-dot';
    if(i===cur && !showSum) cls += ' cur';
    else if(a===null) cls += '';
    else if(a==='skip') cls += ' skip';
    else if(!a.revealed) cls += ''; // chọn rồi nhưng chưa qua câu
    else if(a.choice===Q[i].c) cls += ' ok';
    else cls += ' ng';
    return `<div class="${cls}" onclick="goTo(${i})">${i+1}</div>`;
  }).join('');
  ov.classList.add('show');
}

function closeGrid(e){
  if(e.target === document.getElementById('grid-overlay')) closeGridDirect();
}

function closeGridDirect(){
  document.getElementById('grid-overlay').classList.remove('show');
}

function renderMath(){
  if(typeof renderMathInElement === 'function'){
    renderMathInElement(document.getElementById('main-content'), {
      delimiters: [{left:"$",right:"$",display:false}],
      throwOnError: false
    });
  }
}

// Init
renderQ();
</script>
</body>
</html>
