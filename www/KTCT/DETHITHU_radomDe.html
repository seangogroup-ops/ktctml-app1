<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn thi KTCT Mác-Lênin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563EB;--blue-dark:#1D4ED8;--blue-light:#EFF6FF;
  --green:#16A34A;--green-light:#F0FDF4;
  --red:#DC2626;--red-light:#FEF2F2;
  --gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;--gray-400:#94A3B8;--gray-600:#475569;--gray-900:#0F172A;
  --radius:14px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
}
body{font-family:'Inter',sans-serif;background:var(--gray-100);min-height:100vh;color:var(--gray-900)}

/* ===== SPLASH ===== */
.splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px;background:linear-gradient(160deg,#1E40AF 0%,#2563EB 60%,#3B82F6 100%)}
.splash-inner{width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center}
.splash-logo{font-size:56px;margin-bottom:16px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.25))}
.splash-title{font-size:24px;font-weight:800;color:#fff;text-align:center;letter-spacing:-.3px;margin-bottom:4px}
.splash-sub{font-size:14px;color:rgba(255,255,255,.65);text-align:center;margin-bottom:28px}

.splash-card{width:100%;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:20px 22px;margin-bottom:22px}
.sc-label{font-size:13px;color:rgba(255,255,255,.7);font-weight:500;margin-bottom:12px;text-transform:uppercase;letter-spacing:.6px}
.count-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:0}
.count-btn{padding:11px 6px;border-radius:12px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s;text-align:center}
.count-btn:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.5)}
.count-btn.active{background:#fff;color:var(--blue);border-color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.2)}

.meta-row{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.15)}
.meta-item{text-align:center;flex:1}
.meta-val{font-size:18px;font-weight:700;color:#fff}
.meta-lbl{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.meta-divider{width:1px;height:32px;background:rgba(255,255,255,.2)}

.btn-start{width:100%;max-width:380px;background:#fff;color:var(--blue);border:none;border-radius:16px;padding:17px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 6px 24px rgba(0,0,0,.22);transition:all .2s;letter-spacing:-.1px}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.28)}
.btn-start:active{transform:translateY(0)}

/* ===== APP ===== */
#app{display:none;min-height:100vh}

/* Header */
.hdr{background:var(--blue);color:#fff;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(37,99,235,.4)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.hdr-back:hover{background:rgba(255,255,255,.25)}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:-.2px}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
.hdr-submit{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:20px;padding:7px 13px;cursor:pointer;font-size:13px;font-weight:600;color:#fff;font-family:inherit;transition:all .15s}
.hdr-submit:hover{background:rgba(255,255,255,.25)}

/* Timer strip */
.timer-strip{background:var(--blue-dark);display:flex;align-items:center;justify-content:space-between;padding:5px 14px}
.timer-txt{font-size:13px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:.3px}
.timer-warn{color:#FCD34D}
.prog-dots{display:flex;align-items:center;gap:5px}
.prog-dot-ok{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);display:inline-block}

/* Progress bar */
.pbar{height:4px;background:var(--gray-200);display:flex}
.pbar-seg{height:4px;transition:background .3s}

/* Tabs */
.tabs{background:#fff;border-bottom:1px solid var(--gray-200);overflow-x:auto;display:flex;position:sticky;top:54px;z-index:99;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 13px;font-size:12px;font-weight:500;color:var(--gray-400);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.tab.ok{color:var(--green)}
.tab.ng{color:var(--red)}
.tab.skip{color:var(--gray-200)}

/* Question */
.qwrap{padding:16px 14px 90px;max-width:680px;margin:0 auto}
.qnum{font-size:12px;font-weight:600;color:var(--blue);letter-spacing:.3px;margin-bottom:8px;text-transform:uppercase}
.qtext{font-size:16px;font-weight:700;color:var(--gray-900);line-height:1.7;margin-bottom:16px}

/* Options */
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--radius);border:2px solid var(--gray-200);cursor:pointer;background:#fff;transition:all .17s;-webkit-tap-highlight-color:transparent;user-select:none;box-shadow:var(--shadow)}
.opt:not(.locked):hover{border-color:var(--blue);background:var(--blue-light)}
.opt:not(.locked):hover .obadge{border-color:var(--blue);color:var(--blue)}
.opt.pending{border-color:var(--blue);background:var(--blue-light)}
.opt.pending .obadge{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.opt.pending .otext{color:var(--blue);font-weight:600}
.opt.correct{border-color:var(--green);background:var(--green-light)}
.opt.correct .obadge{background:var(--green);border-color:var(--green);color:#fff}
.opt.correct .otext{color:var(--green);font-weight:600}
.opt.wrong{border-color:var(--red);background:var(--red-light)}
.opt.wrong .obadge{background:var(--red);border-color:var(--red);color:#fff}
.opt.wrong .otext{color:var(--red);font-weight:600}
.opt.locked{cursor:default;pointer-events:none}
.obadge{width:34px;height:34px;border-radius:50%;border:2px solid var(--gray-200);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gray-400);flex-shrink:0;transition:all .17s;background:#fff}
.otext{font-size:14px;color:var(--gray-900);line-height:1.5;flex:1}

/* Explain */
.explain{margin-top:12px;padding:13px;border-radius:var(--radius);display:flex;gap:10px;align-items:flex-start}
.explain.correct{background:var(--green-light);border:1px solid #BBF7D0}
.explain.wrong{background:var(--red-light);border:1px solid #FECACA}
.explain.hint{background:#FFFBEB;border:1px solid #FDE68A}
.explain-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.explain-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.explain.correct .explain-lbl{color:var(--green)}
.explain.wrong .explain-lbl{color:var(--red)}
.explain.hint .explain-lbl{color:#D97706}
.explain-body{font-size:14px;color:var(--gray-600);line-height:1.6}

/* Bottom nav */
.fnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);padding:10px 14px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;z-index:100;max-width:680px;margin:0 auto}
.nav-btn{width:44px;height:44px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;flex-shrink:0}
.nav-prev{background:var(--gray-100);color:var(--gray-600)}
.nav-prev:hover{background:var(--gray-200)}
.nav-next{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.4)}
.nav-next:hover{background:var(--blue-dark)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-center{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;padding:8px}
.nav-center-txt{font-size:13px;font-weight:600;color:var(--gray-600)}

/* Hint FAB */
.fab{position:fixed;bottom:76px;right:14px;background:var(--blue);color:#fff;border:none;border-radius:50px;padding:10px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.4);z-index:99;font-family:inherit;transition:all .2s}
.fab:hover{background:var(--blue-dark);transform:translateY(-1px)}
.fab.hidden{display:none}

/* Grid overlay */
.grid-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:200;align-items:flex-end;backdrop-filter:blur(2px)}
.grid-ov.show{display:flex}
.grid-modal{background:#fff;border-radius:24px 24px 0 0;padding:20px 16px 30px;width:100%;max-height:72vh;overflow-y:auto;max-width:680px;margin:0 auto}
.grid-title{font-size:15px;font-weight:700;text-align:center;color:var(--gray-900);margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:7px}
.gdot{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;border:2px solid var(--gray-200);background:var(--gray-50);color:var(--gray-400);transition:all .15s}
.gdot.cur{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.gdot.ok{background:var(--green);border-color:var(--green);color:#fff}
.gdot.ng{background:var(--red);border-color:var(--red);color:#fff}
.grid-close{width:100%;padding:13px;border-radius:13px;border:none;background:var(--gray-100);color:var(--gray-600);font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;font-family:inherit;transition:background .15s}
.grid-close:hover{background:var(--gray-200)}

/* Confirm overlay */
.conf-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:300;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.conf-ov.show{display:flex}
.conf-box{background:#fff;border-radius:22px;padding:28px 22px;width:100%;max-width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.conf-icon{font-size:44px;margin-bottom:12px}
.conf-title{font-size:18px;font-weight:800;color:var(--gray-900);margin-bottom:8px}
.conf-sub{font-size:14px;color:var(--gray-400);line-height:1.5;margin-bottom:22px}
.conf-btns{display:flex;gap:10px}
.conf-btn{flex:1;padding:13px;border-radius:13px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.conf-cancel{background:var(--gray-100);color:var(--gray-600)}
.conf-cancel:hover{background:var(--gray-200)}
.conf-ok{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.3)}
.conf-ok:hover{background:var(--blue-dark)}

/* Summary */
.sum-wrap{padding:24px 14px 100px;max-width:680px;margin:0 auto}
.sum-hero{text-align:center;margin-bottom:24px}
.sum-emoji{font-size:60px;margin-bottom:8px}
.sum-score{font-size:56px;font-weight:800;color:var(--blue);letter-spacing:-2px;line-height:1}
.sum-grade{display:inline-block;margin-top:8px;font-size:13px;font-weight:600;padding:4px 14px;border-radius:20px;background:var(--blue-light);color:var(--blue)}
.sum-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.sum-card{background:#fff;border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow)}
.sum-card-num{font-size:30px;font-weight:800}
.sum-card-lbl{font-size:12px;color:var(--gray-400);margin-top:3px;font-weight:500}
.c-ok{color:var(--green)}.c-ng{color:var(--red)}.c-sk{color:#F59E0B}.c-pct{color:var(--blue)}
.sum-actions{display:flex;flex-direction:column;gap:9px}
.sum-btn{width:100%;padding:15px;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .18s;letter-spacing:-.1px}
.sb-primary{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.3)}
.sb-primary:hover{background:var(--blue-dark)}
.sb-outline{background:#fff;color:var(--blue);border:2px solid var(--blue)}
.sb-outline:hover{background:var(--blue-light)}
.sb-ghost{background:var(--gray-100);color:var(--gray-600)}
.sb-ghost:hover{background:var(--gray-200)}
</style>
</head>
<body>
<div style="position:fixed;top:10px;left:10px;z-index:9999">
  <a href="../index.html" style="display:flex;align-items:center;gap:6px;background:#1565C0;color:#fff;padding:8px 14px;border-radius:20px;text-decoration:none;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-family:sans-serif"><body>#8592; Trang chủ</a>
</div>

<!-- ===== SPLASH ===== -->
<div class="splash" id="splash">
  <div class="splash-inner">
    <div class="splash-logo">📚</div>
    <div class="splash-title">KTCT Mác-Lênin</div>


    <div class="splash-card">
      <div class="sc-label">Chọn số câu</div>
      <div class="count-grid">
        <button class="count-btn" onclick="setCount(20,this)">20 câu</button>
        <button class="count-btn" onclick="setCount(40,this)">40 câu</button>
        <button class="count-btn active" onclick="setCount(60,this)">60 câu</button>
        <button class="count-btn" onclick="setCount(100,this)">100 câu</button>
        <button class="count-btn" onclick="setCount(200,this)">200 câu</button>
        <button class="count-btn" onclick="setCount(473,this)">Tất cả</button>
      </div>
      <div class="meta-row">
        <div class="meta-item">
          <div class="meta-val" id="meta-count">60</div>
          <div class="meta-lbl">Số câu</div>
        </div>
        <div class="meta-divider"></div>
        <div class="meta-item">
          <div class="meta-val" id="meta-time">60</div>
          <div class="meta-lbl">Phút</div>
        </div>

      </div>
    </div>

    <button class="btn-start" onclick="startExam()">Bắt đầu làm bài →</button>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div class="hdr">
    <div class="hdr-left">
      <button class="hdr-back" onclick="backToSplash()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div>
        <div class="hdr-title">KTCT Mác-Lênin</div>
        <div class="hdr-sub" id="hdr-sub">Đang tải...</div>
      </div>
    </div>
    <button class="hdr-submit" onclick="openConfirm()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Nộp bài
    </button>
  </div>

  <div class="timer-strip">
    <span class="timer-txt" id="timer-txt">60:00</span>
    <span style="font-size:12px;color:rgba(255,255,255,.5)" id="prog-info"></span>
  </div>
  <div class="pbar" id="prog-bar"></div>
  <div class="tabs" id="tabs-wrap"></div>
  <div id="main-content"></div>

  <button class="fab hidden" id="fab-ans" onclick="showHint()">💡 Xem đáp án</button>
</div>

<!-- Confirm -->
<div class="conf-ov" id="confirm-overlay">
  <div class="conf-box">
    <div class="conf-icon">📋</div>
    <div class="conf-title">Nộp bài?</div>
    <div class="conf-sub" id="confirm-sub"></div>
    <div class="conf-btns">
      <button class="conf-btn conf-cancel" onclick="closeConfirm()">Làm tiếp</button>
      <button class="conf-btn conf-ok" onclick="confirmFinish()">Nộp bài</button>
    </div>
  </div>
</div>

<!-- Grid -->
<div class="grid-ov" id="grid-overlay" onclick="closeGrid(event)">
  <div class="grid-modal">
    <div class="grid-title">Danh sách câu hỏi</div>
    <div class="grid" id="q-grid"></div>
    <button class="grid-close" onclick="closeGridDirect()">Đóng</button>
  </div>
</div>

<script>
const BANK = [
{t:"Thuật ngữ Kinh tế chính trị xuất hiện lần đầu tiên vào năm nào sau đây?",o:["1605","1615","1625","1635"],c:1,g:"Thuật ngữ kinh tế chính trị xuất hiện lần đầu tiên vào năm 1615 (Xem trang 12, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Nhà kinh tế học nào sau đây là người đầu tiên đưa ra thuật ngữ Kinh tế chính trị?",o:["A. Montchretien","W. Petty","A. Smith","D. Ricardo"],c:0,g:"Nhà kinh tế học Autoine de Montchrétien là người đầu tiên đưa ra thuật ngữ kinh tế chính trị (Xem trang 12, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Thuật ngữ Kinh tế chính trị xuất hiện đầu tiên trong tác phẩm nào sau đây?",o:["Lý luận về kinh tế chính trị.","Bàn về kinh tế chính trị.","Khoa học về kinh tế chính trị.","Chuyên luận về kinh tế chính trị."],c:3,g:"Thuật ngữ Kinh tế chính trị xuất hiện đầu tiên trong tác phẩm Chuyên luận về kinh tế chính trị (Xem trang 12, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tác phẩm nào sau đây được coi là phác thảo ban đầu về môn học kinh tế chính trị?",o:["Lý luận về kinh tế chính trị.","Chuyên luận về kinh tế chính trị.","Thảo luận về kinh tế chính trị.","Bàn luận về kinh tế chính trị."],c:1,g:"Chuyên luận về kinh tế chính trị được coi là phác thảo ban đầu về môn học kinh tế chính trị (Xem trang 12, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Trong lịch sử kinh tế chính trị học, từ cuối thế kỷ XVIII đến nửa đầu thế kỷ XIX là giai đoạn phát triển của:",o:["Chủ nghĩa trọng thương.","Chủ nghĩa trọng nông.","Kinh tế chính trị tầm thường.","Kinh tế chính trị cổ điển Anh."],c:3,g:"Kinh tế chính trị cổ điển Anh được hình thành và phát triển từ cuối thế kỷ XVIII đến nửa đầu thế kỷ XIX (Xem trang 14, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},

{t:"Kinh tế chính trị Mác – Lênin phát triển liên tục kể từ:",o:["XVI.","XVII.","XVIII.","XIX."],c:3,g:"Kinh tế chính trị Mác – Lênin phát triển không ngừng từ giữa thế kỷ XIX (Xem trang 19, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Kinh tế chính trị Mác – Lênin tìm quy luật chi phối con người tương ứng với trình độ phát triển của:",o:["lực lượng sản xuất.","xã hội.","quan hệ sản xuất.","kinh tế."],c:0,g:"Kinh tế chính trị nghiên cứu sự vận động gắn liền với các trình độ phát triển của xã hội."},
{t:"Quan hệ sản xuất và trao đổi đặt trong liên hệ biện chứng với lực lượng sản xuất và kiến trúc thượng tầng của:",o:["tư liệu sản xuất.","phương thức sản xuất nhất định.","quá trình sản xuất.","cơ sở hạ tầng nhất định."],c:1,g:"Đối tượng nghiên cứu gắn với phương thức sản xuất nhất định (Xem trang 23, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Quy luật kinh tế tác động vào động cơ lợi ích, từ đó giúp con người điều chỉnh:",o:["quy luật kinh tế.","hành vi kinh tế.","nền sản xuất.","cơ chế thị trường."],c:1,g:"Quy luật kinh tế điều chỉnh hành vi của con người trong hoạt động kinh tế (Xem trang 25, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Chính sách kinh tế là sản phẩm chủ quan của con người được hình thành trên cơ sở:",o:["thay đổi các quy luật kinh tế.","bỏ qua các quy luật kinh tế.","vận dụng các quy luật kinh tế.","thủ tiêu các quy luật kinh tế."],c:2,g:"Chính sách kinh tế dựa trên việc vận dụng các quy luật (Xem trang 26, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Những mối liên hệ phản ánh bản chất, khách quan, lặp đi lặp lại của các hiện tượng kinh tế gọi là:",o:["chu kỳ kinh tế.","hiện tượng kinh tế.","quy luật kinh tế.","quá trình kinh tế."],c:2,g:"Đây là định nghĩa về quy luật kinh tế (Xem trang 25, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Phương pháp nghiên cứu quan trọng nhất của Kinh tế chính trị Mác – Lênin là:",o:["lôgic kết hợp với lịch sử.","trừu tượng hóa khoa học.","quan sát thống kê.","hệ thống hóa."],c:1,g:"Trừu tượng hoá khoa học là phương pháp nghiên cứu quan trọng nhất (Xem trang 27, 28, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Quy luật kinh tế là mối liên hệ phản ánh bản chất, khách quan của các:",o:["hiện tượng và quá trình kinh tế.","nền kinh tế.","giai đoạn và chu kỳ kinh tế.","chế độ kinh tế."],c:0,g:"Quy luật kinh tế phản ánh bản chất các hiện tượng và quá trình kinh tế (Xem trang 25, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Sự tác động của chính sách kinh tế vào các quan hệ lợi ích mang tính:",o:["khách quan.","phổ biến.","chủ quan.","đa dạng."],c:2,g:"Tác động của chính sách kinh tế mang tính chủ quan vì do con người ban hành (Xem trang 25, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"\"Kinh tế học tuyệt nhiên không nghiên cứu sản xuất, mà nghiên cứu quan hệ xã hội giữa người với người\" là của:",o:["C. Mác.","Ph. Ăngghen.","V.I. Lênin.","Hêghen."],c:2,g:"Đây là quan điểm nhấn mạnh của V.I. Lênin (Xem trang 22, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khi vận dụng không phù hợp với quy luật kinh tế, con người cần phải:",o:["thủ tiêu quy luật kinh tế.","thay đổi hành vi.","thay đổi quy luật kinh tế.","thay đổi thói quen."],c:1,g:"Khi không phù hợp, con người phải thay đổi hành vi chứ quy luật không thay đổi (Xem trang 26, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Nghiên cứu mặt xã hội của sản xuất và trao đổi phản ánh đúng thực tiễn sự vận động của:",o:["kinh tế tự nhiên.","kinh tế kế hoạch hóa tập trung.","kinh tế thị trường.","kinh tế tri thức."],c:2,g:"Quan điểm này phản ánh đúng thực tiễn vận động của kinh tế thị trường (Xem trang 24, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Gạt bỏ yếu tố ngẫu nhiên để tách ra hiện tượng bền vững, điển hình nhằm nắm được bản chất là nội dung của:",o:["Lôgic kết hợp với lịch sử.","Trừu tượng hóa khoa học.","Quan sát thống kê.","Hệ thống hóa."],c:1,g:"Đây là định nghĩa về phương pháp trừu tượng hoá khoa học (Xem trang 28, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tiếp cận bản chất gắn với tiến trình hình thành, phát triển của các quan hệ xã hội là nội dung của phương pháp:",o:["Lôgic kết hợp với lịch sử.","Trừu tượng hóa khoa học.","Quan sát thống kê.","Hệ thống hóa."],c:0,g:"Phương pháp Lôgic - Lịch sử nghiên cứu hiện tượng theo tiến trình thời gian để rút ra quy luật."},
{t:"Chức năng mở rộng sự hiểu biết về quan hệ kinh tế, triển vọng và xu hướng phát triển là chức năng:",o:["Nhận thức.","Thực tiễn.","Tư tưởng.","Phương pháp luận."],c:0,g:"Chức năng nhận thức giúp mở rộng sự hiểu biết của chủ thể (Xem trang 30, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Chức năng giúp thực hiện hoạt động kinh tế phù hợp với quy luật khách quan là chức năng:",o:["Nhận thức.","Thực tiễn.","Tư tưởng.","Phương pháp luận."],c:1,g:"Vận dụng vào đời sống và hoạt động thực tế thuộc về chức năng thực tiễn (Xem trang 31, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Cung cấp nền tảng lý luận khoa học cho việc tiếp cận các khoa học kinh tế khác là chức năng:",o:["Nhận thức.","Thực tiễn.","Tư tưởng.","Phương pháp luận."],c:3,g:"Kinh tế chính trị là nền tảng lý luận cho các môn kinh tế chuyên ngành (Xem trang 32, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Góp phần xây dựng thế giới quan khoa học, hướng tới giải phóng con người là chức năng:",o:["Nhận thức.","Thực tiễn.","Tư tưởng.","Phương pháp luận."],c:2,g:"Xây dựng niềm tin và hướng tới xã hội tốt đẹp thuộc chức năng tư tưởng (Xem trang 31, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Chức năng phương pháp luận của Kinh tế chính trị Mác – Lênin thể hiện ở:",o:["Nền tảng lý luận khoa học cho việc tiếp cận các khoa học kinh tế khác.","Cơ sở lý luận để phát triển các ngành kinh tế.","Cơ sở khoa học để đánh giá các bộ môn khoa học khác.","Kiến thức kinh tế cơ bản để vận dụng vào thực tiễn cuộc sống."],c:0,g:"Đây là biểu hiện cốt lõi của chức năng phương pháp luận (Xem trang 32, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khi tiền thực hiện chức năng thước đo giá trị thì được ngầm hiểu đó là:",o:["bitcoin.","tiền vàng.","tiền điện tử.","tiền giấy."],c:1,g:"Để thực hiện chức năng đo lường giá trị, không nhất thiết phải là tiền mặt mà chỉ cần so sánh với một lượng vàng nhất định một cách tưởng tượng (Xem trang 49, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Theo yêu cầu của quy luật giá trị, người sản xuất muốn bán được hàng hóa trên thị trường, muốn được xã hội thừa nhận sản phẩm thì lượng giá trị của một hàng hóa cá biệt phải phù hợp với thời gian lao động:",o:["cá biệt cần thiết.","trừu tượng cần thiết.","tư nhân cần thiết.","xã hội cần thiết."],c:3,g:"Quy luật giá trị đòi hỏi việc sản xuất và trao đổi phải dựa trên cơ sở hao phí lao động xã hội cần thiết (Xem trang 67, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Yêu cầu của quy luật giá trị, việc sản xuất và trao đổi hàng hóa phải được tiến hành trên cơ sở của hao phí lao động:",o:["xã hội cần thiết.","trừu tượng cần thiết.","cá biệt cần thiết.","tư nhân cần thiết."],c:0,g:"Việc sản xuất và trao đổi hàng hóa phải được tiến hành trên cơ sở của hao phí lao động xã hội cần thiết (Xem trang 67, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Lao động xã hội của người sản xuất đã hao phí để sản xuất ra hàng hóa kết tinh trong hàng hóa ấy là:",o:["giá trị của hàng hóa.","giá trị sử dụng của hàng hóa.","giá trị thị trường.","giá trị thặng dư."],c:0,g:"Giá trị hàng hoá là lao động xã hội của người sản xuất hàng hoá kết tinh trong hàng hoá. Giá trị sử dụng là công dụng của vật phẩm (Xem trang 39, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá trị hàng hóa biểu hiện mối quan hệ giữa những người:",o:["tiêu dùng hàng hóa.","phân phối hàng hóa.","sản xuất, trao đổi hàng hóa.","phân phối, tiêu dùng hàng hóa."],c:2,g:"Giá trị hàng hoá biểu hiện mối quan hệ kinh tế giữa những người sản xuất và trao đổi hàng hoá (Xem trang 39, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khối lượng tiền cần thiết cho lưu thông tỷ lệ thuận với tổng số giá cả hàng hóa được đưa ra thị trường và tỷ lệ nghịch với:",o:["lượng tiền cất trữ.","tốc độ lưu thông của tiền tệ.","mức thanh toán mua hàng.","tốc độ lưu thông của hàng hóa."],c:1,g:"Khối lượng tiền cần thiết tỷ lệ thuận với tổng giá cả và tỷ lệ nghịch với tốc độ lưu thông của tiền tệ (Xem trang 71, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Lao động cụ thể phản ánh tính chất nào sau đây của lao động sản xuất hàng hóa?",o:["Trừu tượng.","Xã hội.","Tư nhân.","Cụ thể."],c:2,g:"Lao động cụ thể phản ánh tính chất tư nhân, trong khi lao động trừu tượng phản ánh tính chất xã hội của lao động sản xuất hàng hoá (Xem trang 41, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tiền được dùng làm phương tiện mua bán, thanh toán quốc tế giữa các nước với nhau là thực hiện chức năng:",o:["thước đo giá trị.","phương tiện lưu thông.","phương tiện cất trữ.","tiền tệ thế giới."],c:3,g:"Khi tiền thực hiện chức năng mua bán, thanh toán quốc tế thì đó là chức năng tiền tệ thế giới (Xem trang 51, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Lượng thời gian hao phí lao động xã hội cần thiết để sản xuất ra đơn vị hàng hóa là:",o:["lượng giá trị của hàng hóa.","thời gian lao động tất yếu.","lượng giá trị cá biệt của hàng hóa.","thời gian lao động thặng dư."],c:0,g:"Lượng giá trị của hàng hoá chính là lượng thời gian hao phí lao động xã hội cần thiết để sản xuất ra sản phẩm đó."},
{t:"Yêu cầu của quy luật giá trị, trong lĩnh vực trao đổi phải tiến hành theo nguyên tắc ngang giá, dựa trên cơ sở:",o:["giá trị cá biệt.","giá trị trao đổi.","giá thị thặng dư.","giá trị xã hội."],c:3,g:"Trao đổi phải dựa trên cơ sở giá trị xã hội, tức là dựa trên hao phí lao động xã hội cần thiết (Xem trang 67, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Các nhân tố ảnh hưởng đến lượng giá trị của hàng hóa bao gồm năng suất lao động và:",o:["trình độ phát triển của lực lượng sản xuất.","năng lực lao động.","tính chất phức tạp hay giản đơn của lao động.","cường độ lao động."],c:2,g:"Lượng giá trị hàng hóa chịu ảnh hưởng bởi năng suất lao động và tính chất của lao động (phức tạp hay giản đơn) (Xem trang 43, 45 giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Hàng hóa không thể cất trữ, việc sản xuất và tiêu dùng diễn ra đồng thời là:",o:["bản quyền.","chứng quyền.","thương hiệu.","dịch vụ."],c:3,g:"Dịch vụ là hàng hoá vô hình, không thể cất trữ, quá trình sản xuất và tiêu dùng diễn ra đồng thời (Xem trang 52, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Lượng giá trị trong một đơn vị hàng hóa sẽ giảm xuống khi tăng:",o:["tốc độ chu chuyển của tư bản.","cường độ lao động.","thời gian chu chuyển của tư bản.","năng suất lao động."],c:3,g:"Năng suất lao động tăng lên làm hao phí lao động trên một đơn vị sản phẩm giảm đi, do đó lượng giá trị giảm (Xem trang 44, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những chức năng của tiền là phương tiện:",o:["phát triển.","vận hành.","đầu tư.","lưu thông."],c:3,g:"Tiền làm môi giới trong trao đổi hàng hóa thực hiện chức năng phương tiện lưu thông (Xem trang 50, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Thời gian để sản xuất ra một giá trị sử dụng nào đó trong những điều kiện bình thường của xã hội với trình độ thành thạo trung bình, cường độ lao động trung bình là:",o:["thời gian lao động xã hội cần thiết.","thời gian lao động tất yếu.","thời gian lao động cá biệt cần thiết.","thời gian lao động thặng dư."],c:0,g:"Đây là định nghĩa về thời gian lao động xã hội cần thiết (Xem trang 43, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Người đầu tiên phát hiện ra tính chất hai mặt của lao động sản xuất hàng hóa là:",o:["C. Mác.","D. Ricardo.","A. Smith.","V. I. Lênin."],c:0,g:"C. Mác là người đầu tiên phát hiện ra tính hai mặt (cụ thể và trừu tượng) của lao động sản xuất hàng hóa (Xem trang 41, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Để nền kinh tế hàng hóa có thể hình thành và phát triển, C. Mác cho rằng cần có sự tách biệt về mặt kinh tế của các chủ thể sản xuất và:",o:["phân công lao động cụ thể.","phân công lao động cá biệt.","phân công lao động xã hội.","phân công lao động trừu tượng."],c:2,g:"Hai điều kiện ra đời của sản xuất hàng hóa là phân công lao động xã hội và sự tách biệt kinh tế (Xem trang 35, 36, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những đặc trưng chung của kinh tế thị trường là giá cả được hình thành:",o:["theo nguyên tắc thị trường.","bởi người mua.","bởi người bán.","theo quy định của nhà nước."],c:0,g:"Trong kinh tế thị trường, giá cả do cung - cầu và cạnh tranh trên thị trường quyết định (Xem trang 62, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Quy luật kinh tế nào sau đây là quy luật kinh tế cơ bản của sản xuất hàng hoá?",o:["Giá trị.","Lưu thông tiền tệ.","Cung - cầu.","Cạnh tranh."],c:0,g:"Quy luật giá trị là quy luật kinh tế cơ bản của sản xuất hàng hoá (Xem trang 67, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tiền được dùng để biểu hiện và đo lượng giá trị của tất cả các hàng hóa khác nhau là thực hiện chức năng:",o:["thước đo giá trị.","phương tiện lưu thông.","phương tiện thanh toán.","tiền tệ thế giới."],c:0,g:"Khi dùng để đo lường giá trị của các hàng hóa khác, tiền thực hiện chức năng thước đo giá trị (Xem trang 49, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Trong cùng một đơn vị thời gian, so với lao động giản đơn, lao động phức tạp sẽ tạo ra:",o:["nhiều lượng giá trị hơn.","bằng lượng giá trị.","tương đương lượng giá trị.","ít lượng giá trị hơn."],c:0,g:"Lao động phức tạp là lao động giản đơn được nhân bội lên, tạo ra nhiều giá trị hơn (Xem trang 45, 46, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Sản phẩm của lao động chỉ mang hình thái hàng hóa khi thỏa mãn một nhu cầu nào đó của con người và thông qua:",o:["tiêu dùng và tích lũy.","đầu tư.","tích lũy.","trao đổi, mua bán."],c:3,g:"Sản phẩm chỉ trở thành hàng hóa khi được đưa ra trao đổi, mua bán trên thị trường (Xem trang 37, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Thời gian lao động xã hội cần thiết là thời gian để sản xuất ra một giá trị sử dụng nào đó trong những điều kiện:",o:["bình thường của xã hội.","xấu của xã hội.","đặc biệt của xã hội.","tốt của xã hội."],c:0,g:"Thời gian lao động xã hội cần thiết gắn với các điều kiện sản xuất bình thường (Xem trang 43, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Hàng hóa có hai thuộc tính là do lao động của người sản xuất hàng hóa có tính hai mặt là:",o:["lao động cụ thể và lao động trừu tượng.","lao động cá biệt và lao động xã hội.","lao động tư nhân và lao động cá biệt.","lao động tư nhân và lao động xã hội."],c:0,g:"Lao động cụ thể tạo ra giá trị sử dụng, lao động trừu tượng tạo ra giá trị (Xem trang 40, 41, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Lao động cụ thể tạo ra:",o:["giá trị trao đổi của hàng hóa.","giá trị xã hội của hàng hóa.","giá trị của hàng hóa.","giá trị sử dụng của hàng hóa."],c:3,g:"Lao động cụ thể là lao động có ích dưới hình thức chuyên môn nhất định, tạo ra công dụng (giá trị sử dụng) (Xem trang 40, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tiền có mấy chức năng?",o:["Sáu.","Năm.","Bốn.","Ba."],c:1,g:"Tiền có 5 chức năng: Thước đo giá trị, Phương tiện lưu thông, Phương tiện cất giữ, Phương tiện thanh toán, Tiền tệ thế giới (Xem trang 49-51, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Các hình thức lao động cụ thể ngày càng phong phú, đa dạng do sự phát triển của khoa học kỹ thuật và:",o:["tăng năng suất lao động.","phân công lao động xã hội.","tăng cường độ lao động.","trình độ của người lao động."],c:1,g:"Phân công lao động xã hội càng sâu sắc thì lao động cụ thể càng đa dạng (Xem trang 41, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Quy luật cung cầu có tác dụng điều tiết quan hệ giữa sản xuất và lưu thông hàng hóa, làm biến đổi cơ cấu và dung lượng thị trường, quyết định:",o:["giá cả thị trường.","nhu cầu của xã hội.","mục đích của chủ thể kinh tế.","giá trị của hàng hóa."],c:0,g:"Cung - cầu quyết định giá cả thị trường xoay quanh trục giá trị (Xem trang 70, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Cơ chế thị trường là hệ thống các quan hệ mang tính tự điều chỉnh tuân theo yêu cầu của:",o:["nhà nước.","người mua.","người bán.","các quy luật kinh tế."],c:3,g:"Cơ chế thị trường vận hành khách quan theo các quy luật kinh tế (Xem trang 61, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Quy luật giá trị điều tiết sản xuất và lưu thông thông qua sự biến động của:",o:["giá trị thặng dư.","giá cả hàng hóa.","giá trị sử dụng.","giá cả sản xuất."],c:1,g:"Quy luật giá trị điều tiết thông qua tín hiệu giá cả trên thị trường."},
{t:"Theo C. Mác, sản xuất hàng hóa là kiểu tổ chức kinh tế mà ở đó, những người sản xuất ra sản phẩm nhằm phục vụ mục đích:",o:["tích lũy.","trao đổi, mua bán.","tiêu dùng.","cho, tặng."],c:1,g:"Mục đích của sản xuất hàng hóa là để trao đổi, bán cho người khác (Xem trang 35, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Lao động trừu tượng phản ánh tính chất nào sau đây của lao động sản xuất hàng hóa?",o:["Trừu tượng.","Cụ thể.","Xã hội.","Tư nhân."],c:2,g:"Lao động trừu tượng phản ánh tính chất xã hội, trong khi lao động cụ thể phản ánh tính chất tư nhân (Xem trang 41, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những chức năng của tiền là thước đo:",o:["giá cả thị trường.","giá trị.","giá trị thị trường.","giá cả."],c:1,g:"Thước đo giá trị là chức năng đầu tiên của tiền tệ (Xem trang 49, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá cả thị trường dựa trên cơ sở:",o:["giá trị thặng dư.","giá trị sử dụng.","giá trị thị trường.","giá trị trao đổi."],c:2,g:"Giá trị thị trường là cơ sở của giá cả thị trường."},
{t:"Cơ chế tác động của quy luật giá trị là giá cả thị trường lên xuống xoay quanh:",o:["giá trị sử dụng.","giá trị xã hội.","giá trị trao đổi.","giá trị hàng hóa."],c:3,g:"Quy luật giá trị làm cho giá cả dao động quanh giá trị hàng hóa (Xem trang 67, 68, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tiền là kết quả của quá trình phát triển sản xuất và trao đổi hàng hóa, là sản phẩm của sự phát triển các hình thái:",o:["giá trị từ thấp đến cao.","biểu hiện của giá trị thặng dư.","tồn tại của tư bản.","giá trị sử dụng từ thấp đến cao."],c:0,g:"Tiền ra đời từ sự phát triển của 4 hình thái giá trị (Xem trang 46-48, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Sự hoạt động của quy luật giá trị biểu hiện thông qua sự vận động của yếu tố nào sau đây trên thị trường?",o:["Giá trị thặng dư.","Giá cả sản xuất.","Giá trị sử dụng.","Giá cả thị trường."],c:3,g:"Quy luật giá trị biểu hiện sự tồn tại của mình qua biến động giá cả (Xem trang 68, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Con người phát hiện ra nhiều giá trị sử dụng khác nhau của hàng hóa nhờ vào:",o:["Cơ chế kinh tế.","những điều kiện tự nhiên và thể chế kinh tế.","sự phát triển của nền sản xuất và khoa học, công nghệ.","thể chế chính trị."],c:2,g:"Khoa học công nghệ giúp phát hiện thêm nhiều công dụng của sản phẩm (Xem trang 37, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Lao động trừu tượng tạo ra:",o:["giá trị của hàng hóa.","giá trị trao đổi của hàng hóa.","giá trị sử dụng của hàng hóa.","giá trị xã hội của hàng hóa."],c:0,g:"Lao động trừu tượng kết tinh tạo thành giá trị (Xem trang 41, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Căn cứ vào tính chất và cơ chế vận hành của thị trường, có thể chia thị trường thành:",o:["thị trường tư liệu sản xuất và thị trường tư liệu tiêu dùng.","thị trường các yếu tố đầu vào và thị trường hàng hóa đầu ra.","thị trường trong nước và thị trường thế giới.","thị trường tự do, thị trường có điều tiết."],c:3,g:"Cách phân chia dựa trên cơ chế vận hành là tự do hoặc có điều tiết (Xem trang 58, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khi thực hiện chức năng cất trữ, tiền được rút khỏi lưu thông đi vào cất trữ dưới hình thái:",o:["bitcoin.","tiền ký hiệu giá trị (tiền giấy).","tiền vàng.","tiền điện tử."],c:2,g:"Để cất trữ thì tiền phải có đủ giá trị, thường là tiền vàng, bạc (Xem trang 50, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Để đứng vững trong cạnh tranh, người sản xuất phải luôn tìm cách làm cho giá trị cá biệt hàng hóa của mình nhỏ hơn hoặc bằng:",o:["giá trị xã hội.","giá trị trao đổi.","giá trị thặng dư.","giá trị sử dụng."],c:0,g:"Nếu giá trị cá biệt lớn hơn giá trị xã hội, người sản xuất sẽ gặp thua lỗ (Xem trang 68, 69, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Căn cứ vào phạm vi hoạt động, có thể chia thị trường thành:",o:["thị trường các yếu tố đầu vào và thị trường hàng hóa đầu ra.","thị trường tư liệu sản xuất và thị trường tư liệu tiêu dùng.","thị trường tự do và thị trường có điều tiết.","thị trường trong nước và thị trường thế giới."],c:3,g:"Cách chia theo không gian/phạm vi là trong nước và quốc tế (Xem trang 58, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tiền được dùng để trả nợ, trả tiền mua chịu hàng hóa là thực hiện chức năng:",o:["phương tiện thanh toán.","thước đo giá trị.","tiền tệ thế giới.","phương tiện lưu thông."],c:0,g:"Thanh toán các khoản nợ, mua chịu thuộc chức năng phương tiện thanh toán (Xem trang 51, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Lượng giá trị của một đơn vị hàng hóa được sản xuất ra bao hàm hao phí lao động quá khứ và hao phí:",o:["lao động thực tế.","lao động sống.","lao động mới kết tinh thêm.","lao động hiện tại."],c:2,g:"Giá trị hàng hóa gồm giá trị cũ (lao động quá khứ) và giá trị mới (lao động sống kết tinh) (Xem trang 43, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá trị sử dụng của hàng hóa do thuộc tính nào sau đây của yếu tố tham gia cấu thành nên hàng hóa đó quy định?",o:["Đa dạng.","Xã hội.","Lịch sử.","Tự nhiên."],c:3,g:"Giá trị sử dụng do thuộc tính tự nhiên của vật quyết định (Xem trang 37, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Lao động có ích dưới một hình thức cụ thể của những nghề nghiệp chuyên môn nhất định là:",o:["lao động giản đơn.","lao động trừu tượng.","lao động cụ thể.","lao động phức tạp."],c:2,g:"Định nghĩa về lao động cụ thể tạo ra giá trị sử dụng (Xem trang 40, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Sự hao phí sức lao động nói chung của người sản xuất hàng hóa về cơ bắp, thần kinh, trí óc là:",o:["lao động phức tạp.","lao động trừu tượng.","lao động cụ thể.","lao động giản đơn."],c:1,g:"Định nghĩa về lao động trừu tượng tạo ra giá trị hàng hóa (Xem trang 41, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Các doanh nghiệp tự do di chuyển nguồn lực của mình từ ngành này sang ngành khác, vào các ngành sản xuất kinh doanh khác nhau là biện pháp cạnh tranh:",o:["giữa các nền kinh tế.","giữa các ngành.","trong cùng đơn vị sản xuất.","trong nội bộ ngành."],c:1,g:"Biện pháp cạnh tranh giữa các ngành là các doanh nghiệp tự do di chuyển nguồn lực của mình từ ngành này sang ngành khác, vào các ngành sản xuất kinh doanh khác nhau (Xem trang 74, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Căn cứ vào đầu vào và đầu ra của quá trình sản xuất, có thể chia thị trường thành:",o:["thị trường tư liệu sản xuất và thị trường tư liệu tiêu dùng.","thị trường tự do, thị trường có điều tiết.","thị trường trong nước và thị trường thế giới.","thị trường các yếu tố đầu vào và thị trường hàng hóa đầu ra."],c:2,g:"Căn cứ vào đầu vào, đầu ra của quá trình sản xuất, có thể chia thành thị trường tư liệu sản xuất (đầu vào), thị trường tư liệu tiêu dùng (đầu ra) (Xem trang 58, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Căn cứ vào tính chuyên biệt của thị trường, có thể chia thị trường thành:",o:["thị trường cạnh tranh hoàn hảo, thị trường cạnh tranh không hoàn hảo.","thị trường trong nước và thị trường thế giới.","các loại thị trường gắn với các lĩnh vực khác nhau.","thị trường tư liệu sản xuất và thị trường tư liệu tiêu dùng."],c:2,g:"Chuyên biệt tức là tập trung vào một lĩnh vực nào đó. Đáp án C là phương án phân chia dựa trên tính chuyên biệt của các quan hệ kinh tế theo lĩnh vực cụ thể."},
{t:"Cơ chế thị trường là hệ thống các quan hệ kinh tế mang đặc tính tự điều chỉnh các cân đối của nền kinh tế theo yêu cầu của:",o:["người sản xuất.","người tiêu dùng.","các quy luật kinh tế.","các chính sách kinh tế."],c:2,g:"Cơ chế thị trường là hệ thống các quan hệ kinh tế mang đặc tính tự điều chỉnh các cân đối của nền kinh tế theo yêu cầu của các quy luật kinh tế (Xem trang 61, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những đặc trưng chung của kinh tế thị trường là thị trường đóng vai trò quyết định trong việc phân bổ các nguồn lực xã hội thông qua hoạt động của các:",o:["thị trường bộ phận.","chủ thể sản xuất.","chủ thể trung gian.","thị trường đầu vào."],c:0,g:"Thị trường đóng vai trò quyết định trong việc phân bổ các nguồn lực xã hội thông qua hoạt động của các thị trường bộ phận (Xem trang 62, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những đặc trưng chung của kinh tế thị trường là giá cả được hình thành theo:",o:["nguyên tắc tập trung.","mệnh lệnh nhà nước.","nguyên tắc thị trường.","nhu cầu người tiêu dùng."],c:2,g:"Một trong những đặc trưng chung của kinh tế thị trường là giá cả được hình thành theo nguyên tắc thị trường (Xem trang 62, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Kinh tế thị trường là:",o:["nền kinh tế phát triển cao.","nền kinh tế hiện đại.","nền kinh tế hàng hóa.","kinh tế hàng hóa phát triển cao."],c:3,g:"Nền kinh tế thị trường là nền kinh tế hàng hoá phát triển cao (Xem trang 61, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Biện pháp cạnh tranh trong nội bộ ngành là:",o:["di chuyển nguồn lực từ ngành này sang ngành khác.","cải tiến kỹ thuật, đổi mới công nghệ.","chuyển hướng đầu tư sang ngành nghề khác.","mở rộng ngành nghề kinh doanh."],c:1,g:"Biện pháp cạnh tranh trong nội bộ ngành là các doanh nghiệp ra sức cải tiến kỹ thuật, đổi mới công nghệ (Xem trang 73, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Kết quả cạnh tranh trong nội bộ ngành là hình thành:",o:["giá trị cá biệt của tất cả hàng hóa.","giá trị sử dụng của tất cả hàng hóa.","giá trị thị trường của từng loại hàng hóa.","giá trị thặng dư của từng loại hàng hóa."],c:2,g:"Kết quả của cạnh tranh trong nội bộ ngành là hình thành giá trị thị trường của từng loại hàng hoá (Xem trang 73, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá cả thị trường là hình thức biểu hiện bằng tiền của:",o:["giá trị cá biệt.","giá trị trao đổi.","giá trị thặng dư.","giá trị thị trường."],c:3,g:"Giá cả thị trường là hình thức biểu hiện bằng tiền của giá trị thị trường."},
{t:"Giá trị trung bình của những hàng hóa được sản xuất ra trong một khu vực sản xuất nào đó, là:",o:["giá trị cá biệt.","giá trị sử dụng.","giá trị thặng dư.","giá trị thị trường."],c:3,g:"Theo C. Mác, “Một mặt, phải coi giá trị thị trường là giá trị trung bình của những hàng hoá được sản xuất ra trong một khu vực nào đó\" (Xem trang 73, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Biện pháp cạnh tranh giữa các ngành là các doanh nghiệp:",o:["tự do di chuyển nguồn lực của mình từ ngành này sang ngành khác.","tăng cường độ lao động.","tăng năng suất lao động.","cải tiến kỹ thuật, đổi mới công nghệ."],c:0,g:"Biện pháp cạnh tranh giữa các ngành là các doanh nghiệp tự do di chuyển nguồn lực của mình từ ngành này sang ngành khác, vào các ngành sản xuất kinh doanh khác nhau (Xem trang 74, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những phương thức để thực hiện lợi ích của doanh nghiệp trong cùng một ngành sản xuất là cạnh tranh:",o:["giữa các nền kinh tế.","giữa các ngành.","trong nội bộ ngành.","trong cùng đơn vị sản xuất."],c:2,g:"Cạnh tranh trong nội bộ ngành là một trong những phương thức để thực hiện lợi ích của doanh nghiệp trong cùng một ngành sản xuất (Xem trang 73, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tìm nơi đầu tư có lợi nhất là mục đích của cạnh tranh:",o:["giữa các nền kinh tế.","giữa các ngành.","trong nội bộ ngành.","trong cùng đơn vị sản xuất."],c:1,g:"Mục đích cạnh tranh giữa các ngành là nhằm tìm nơi đầu tư có lợi nhất (Xem trang 74, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Các doanh nghiệp cải tiến kỹ thuật, đổi mới công nghệ là biện pháp cạnh tranh:",o:["giữa các nền kinh tế.","giữa các ngành.","trong nội bộ ngành.","trong cùng đơn vị sản xuất."],c:2,g:"Trong cạnh tranh trong nội bộ ngành, biện pháp cạnh tranh là các doanh nghiệp ra sức cải tiến kỹ thuật, đổi mới công nghệ, hợp lý hoá sản xuất, tăng năng suất lao động để hạ thấp giá trị cá biệt của hàng hoá."},
{t:"Các doanh nghiệp tự do di chuyển nguồn lực của mình từ ngành này sang ngành khác là biện pháp cạnh tranh:",o:["giữa các nền kinh tế.","giữa các ngành.","trong nội bộ ngành.","trong cùng đơn vị sản xuất."],c:1,g:"Biện pháp cạnh tranh giữa các ngành là các doanh nghiệp tự do di chuyển nguồn lực của mình từ ngành này sang ngành khác, vào các ngành sản xuất kinh doanh khác nhau (Xem trang 74, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá trị hàng hóa là:",o:["hình thức biểu hiện ra bên ngoài của giá trị trao đổi.","nội dung, là cơ sở của trao đổi.","nội dung, cơ sở của giá trị sử dụng.","hình thức biểu hiện ra bên ngoài của giá trị sử dụng."],c:1,g:"Giá trị hàng hóa là hình thức biểu hiện ra bên ngoài của giá trị; giá trị là nội dung, là cơ sở của trao đổi (Xem trang 39, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Việc phát hiện ra tính hai mặt của lao động sản xuất hàng hóa, giúp C. Mác luận giải triệt để và khoa học về:",o:["nguồn gốc, bản chất của giá trị.","nguồn gốc, bản chất của tiền.","mối quan hệ giữa hai thuộc tính của hàng hóa.","hai thuộc tính của hàng hóa."],c:0,g:"Việc phát hiện ra tính hai mặt của lao động sản xuất hàng hoá là phát kiến quan trọng của C. Mác, giúp ông luận giải triệt để và khoa học về nguồn gốc, bản chất của giá trị (Xem trang 81, 82, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Gắn kết nền kinh tế thành một chỉnh thể, gắn kết nền kinh tế quốc gia với nền kinh tế thế giới là vai trò của:",o:["doanh nghiệp.","thị trường.","nhà đầu tư.","người tiêu dùng."],c:1,g:"Thị trường gắn kết nền kinh tế thành một chỉnh thể, gắn kết nền kinh tế quốc gia với nền kinh tế thế giới (Xem trang 59, 60, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Nền sản xuất phát triển, khoa học, công nghệ càng tiên tiến, càng giúp con người phát hiện ra nhiều:",o:["giá trị sử dụng.","giá trị trao đổi.","giá trị thị trường.","giá trị cá biệt."],c:0,g:"Nền sản xuất phát triển, khoa học – công nghệ càng hiện đại, càng giúp con người phát hiện thêm các giá trị sử dụng của sản phẩm (Xem trang 37, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá trị hàng hóa là phạm trù có tính:",o:["tự nhiên.","phổ biến.","lịch sử.","phức tạp."],c:2,g:"Giá trị hàng hoá biểu hiện mối quan hệ kinh tế giữa những người sản xuất, trao đổi hàng hoá và là phạm trù có tính lịch sử (Xem trang 39, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Hàng hóa ở nơi có giá cả thấp được thu hút, chảy đến nơi có giá cả cao hơn, góp phần làm cho cung cầu hàng hóa giữa các vùng cân bằng thông qua mệnh lệnh của:",o:["giá trị hàng hóa.","giá trị sử dụng.","giá cả thị trường.","giá cả sản xuất."],c:2,g:"Thông qua mệnh lệnh của giá cả thị trường, hàng hoá ở nơi có giá cả thấp được thu hút, chảy đến nơi có giá cả cao hơn, góp phần làm cho cung – cầu hàng hoá giữa các vùng được cân bằng (Xem trang 68, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khi sản phẩm do những người sản xuất hàng hóa riêng biệt tạo ra không phù hợp với nhu cầu của xã hội thì xuất hiện mâu thuẫn giữa lao động cụ thể và:",o:["lao động quá khứ.","lao động hiện tại.","lao động sống.","lao động trừu tượng."],c:3,g:"Mâu thuẫn giữa lao động cụ thể và lao động trừu tượng xuất hiện khi sản phẩm do những người sản xuất hàng hoá riêng biệt tạo ra không phù hợp với nhu cầu xã hội (Xem trang 42, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khi mức tiêu hao lao động cá biệt cao hơn mức tiêu hao mà xã hội có thể chấp nhận được thì xuất hiện mâu thuẫn giữa lao động cụ thể và:",o:["lao động trừu tượng.","lao động quá khứ.","lao động hiện tại.","lao động sống."],c:0,g:"Mâu thuẫn giữa lao động cụ thể và lao động trừu tượng xuất hiện khi sản phẩm không phù hợp hoặc mức hao phí cá biệt cao hơn xã hội chấp nhận (Xem trang 42, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khi giá trị của đơn vị hàng hóa được đại biểu bằng một số tiền nhất định thì số tiền đó được gọi là:",o:["giá cả thị trường.","giá cả hàng hóa.","giá cả xã hội.","giá cả cá biệt."],c:1,g:"Giá trị hàng hoá được biểu hiện bằng tiền gọi là giá cả hàng hoá (Xem trang 49, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khi thực hiện chức năng phương tiện lưu thông, tiền được dùng:",o:["làm môi giới cho quá trình trao đổi hàng hóa.","rút khỏi lưu thông đi vào cất trữ.","trả nợ, trả tiền mua chịu hàng hóa.","để đo lượng giá trị của tất cả các hàng hóa khác nhau."],c:0,g:"Khi thực hiện chức năng phương tiện lưu thông, tiền được dùng làm môi giới cho quá trình trao đổi hàng hoá (Xem trang 50, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Cạnh tranh giữa các chủ thể kinh doanh trong cùng một ngành, cùng sản xuất một loại hàng hóa là cạnh tranh:",o:["trong nội bộ ngành.","giữa các ngành khác nhau.","trong nội bộ doanh nghiệp.","trong cùng đơn vị sản xuất kinh doanh."],c:0,g:"Cạnh tranh trong nội bộ ngành là cạnh tranh giữa các chủ thể kinh doanh trong cùng một ngành hàng hoá (Xem trang 73, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Mâu thuẫn giữa lao động cụ thể và lao động trừu tượng xuất hiện khi mức độ tiêu hao lao động cá biệt cao hơn mức tiêu hao mà xã hội có thể chấp nhận được là mầm mống của:",o:["suy thoái.","khủng hoảng thiếu.","khủng hoảng thừa.","hưng thịnh."],c:2,g:"Khi đó hàng hoá không bán được (thừa hàng), gây nên mầm mống của khủng hoảng thừa (Xem trang 42, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những vai trò của thị trường là:",o:["kết nối, thông tin trong các quan hệ mua bán.","thỏa mãn nhu cầu hiện tại của xã hội.","thực hiện quản trị phát triển nền kinh tế.","thông tin, định hướng cho mọi nhu cầu sản xuất kinh doanh."],c:3,g:"Thị trường có vai trò thông tin, định hướng cho mọi nhu cầu sản xuất kinh doanh (Xem trang 59, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá cả thị trường do yếu tố nào sau đây quyết định?",o:["Giá trị thị trường.","Giá trị hàng hóa.","Giá trị trao đổi.","Giá trị cá biệt."],c:0,g:"Giá cả thị trường là hình thức biểu hiện bằng tiền của giá trị thị trường, lấy giá trị thị trường làm cơ sở khách quan."},
{t:"Giá trị cá biệt của những hàng hóa được sản xuất trong những điều kiện trung bình của khu vực và chiếm đại bộ phận trong tổng số những hàng hóa của khu vực đó là:",o:["giá trị hàng hóa.","giá trị thị trường.","giá trị cá biệt.","giá trị trao đổi."],c:1,g:"Giá trị thị trường là giá trị cá biệt của những hàng hoá được sản xuất ra trong những điều kiện trung bình của khu vực đó (Xem trang 73, 74, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Trong lưu thông, quy luật giá trị điều tiết hàng hóa từ nơi có:",o:["giá cả thấp đến nơi có giá cả cao.","cung nhỏ hơn cầu đến nơi có cung lớn hơn cầu.","giá cả cao đến nơi có giá cả thấp.","cung bằng cầu đến nơi có cung lớn hơn cầu."],c:0,g:"Trong lưu thông, quy luật giá trị điều tiết hàng hoá từ nơi có giá cả thấp đến nơi có giá cả cao (Xem trang 68, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Mối quan hệ tỷ lệ về lượng giữa các giá trị sử dụng khác nhau là:",o:["giá trị hàng hóa.","giá trị cá biệt.","giá trị trao đổi.","giá trị thị trường."],c:2,g:"Tỷ lệ trao đổi giữa các giá trị sử dụng khác nhau này được gọi là giá trị trao đổi (Xem trang 1, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Năng suất lao động tỷ lệ nghịch với:",o:["lượng giá trị trong một đơn vị hàng hóa.","lượng giá trị sử dụng trong một đơn vị hàng hóa.","lượng giá trị trao đổi trong một đơn vị hàng hóa.","lượng giá trị thặng dư trong một đơn vị hàng hóa."],c:0,g:"Năng suất lao động tăng lên sẽ làm cho lượng giá trị trong một đơn vị sản xuất hàng hoá giảm xuống (Xem trang 44, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"C. Mác gọi lao động giản đơn được nhân bội lên là:",o:["lao động phức tạp.","lao động cá biệt.","lao động cụ thể.","lao động trừu tượng."],c:0,g:"Lao động phức tạp là lao động giản đơn được nhân bội lên (Xem trang 46, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Dịch vụ là hàng hóa:",o:["dùng để cất trữ.","dạng vật thể.","hữu hình.","không thể cất trữ."],c:3,g:"Dịch vụ là hàng hoá không thể cất trữ (Xem trang 52, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Dịch vụ là một loại hàng hóa:",o:["vô hình.","hữu hình.","có thể cất trữ.","dạng vật thể."],c:0,g:"Dịch vụ là một loại hàng hoá, nhưng đó là loại hàng hoá vô hình (Xem trang 51, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Những hoạt động lao động yêu cầu phải trải qua một quá trình đào tạo về kỹ năng, nghiệp vụ theo yêu cầu nhất định, gọi là:",o:["lao động cụ thể.","lao động giản đơn.","lao động trừu tượng.","lao động phức tạp."],c:0,g:"Lao động cụ thể là lao động có ích dưới một hình thức cụ thể của những nghề nghiệp chuyên môn nhất định (Xem trang 40, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Mục đích của việc cung ứng dịch vụ là nhằm thỏa mãn nhu cầu của người:",o:["có nhu cầu cung ứng dịch vụ đó.","tạo ra dịch vụ đó.","có nhu cầu về loại hình dịch vụ đó.","môi giới dịch vụ."],c:2,g:"Mục đích của việc cung ứng dịch vụ là nhằm thỏa mãn nhu cầu của người có nhu cầu về loại hình dịch vụ đó (Xem trang 52, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Những người kết nối giữa sản xuất và tiêu dùng, làm cho sản xuất và tiêu dùng trở nên ăn khớp với nhau là:",o:["các chủ thể trung gian trong thị trường.","người tiêu dùng.","người sản xuất hàng hóa.","chủ doanh nghiệp."],c:0,g:"Các chủ thể trung gian làm tăng sự kết nối giữa sản xuất và tiêu dùng (Xem trang 79, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Những người mua hàng hóa, dịch vụ trên thị trường để thỏa mãn nhu cầu tiêu dùng là:",o:["người tiêu dùng.","các chủ thể trung gian trong thị trường.","chủ doanh nghiệp.","người sản xuất hàng hóa."],c:0,g:"Người tiêu dùng là những người mua hàng hóa, dịch vụ trên thị trường để thỏa mãn nhu cầu tiêu dùng (Xem trang 78, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Những người sử dụng các yếu tố đầu vào để sản xuất, kinh doanh và thu lợi nhuận là:",o:["người tiêu dùng.","các chủ thể trung gian trong thị trường.","người sản xuất hàng hóa.","hộ gia đình."],c:2,g:"Người sản xuất là những người sử dụng các yếu tố đầu vào để sản xuất, kinh doanh và thu lợi nhuận (Xem trang 78, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Thực hiện quản trị phát triển nền kinh tế thông qua việc tạo lập môi trường kinh tế tốt nhất cho các chủ thể và khắc phục các khuyết tật của thị trường là vai trò của:",o:["nhà nước.","người tiêu dùng.","người sản xuất.","các chủ thể trung gian."],c:0,g:"Trong nền kinh tế thị trường, nhà nước thực hiện quản trị phát triển nền kinh tế và khắc phục các khuyết tật (Xem trang 80, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tăng cơ hội thực hiện giá trị của hàng hóa cũng như thỏa mãn nhu cầu của người tiêu dùng là vai trò của:",o:["các chủ thể trung gian trong thị trường.","người tiêu dùng.","nhà nước.","người sản xuất."],c:0,g:"Hoạt động của các chủ thể trung gian trong thị trường làm tăng cơ hội thực hiện giá trị và thỏa mãn nhu cầu người tiêu dùng (Xem trang 79, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Định hướng sản xuất là vai trò của:",o:["người tiêu dùng.","nhà nước.","các chủ thể trung gian.","người sản xuất."],c:0,g:"Người tiêu dùng có vai trò rất quan trọng trong định hướng sản xuất (Xem trang 78, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Không chỉ làm thỏa mãn nhu cầu hiện tại mà còn tạo ra và phục vụ cho nhu cầu tương lai là vai trò của:",o:["người sản xuất.","người tiêu dùng.","hộ gia đình.","các chủ thể trung gian."],c:0,g:"Nhiệm vụ của người sản xuất không chỉ làm thoả mãn nhu cầu hiện tại mà còn tạo nhu cầu trong tương lai (Xem trang 78, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Cung cấp hàng hoá, dịch vụ không làm tổn hại tới sức khoẻ và lợi ích xã hội là trách nhiệm của:",o:["người sản xuất.","người tiêu dùng.","nhà nước.","các chủ thể trung gian."],c:0,g:"Người sản xuất cần phải có trách nhiệm cung cấp những hàng hoá, dịch vụ không gây tổn hại (Xem trang 78, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Một trong những vai trò của các chủ thể trung gian trong thị trường là:",o:["kết nối, trao đổi thông tin trong các quan hệ mua, bán.","thực hiện quản trị phát triển nền kinh tế.","làm thỏa mãn nhu cầu hiện tại của xã hội.","kết nối các nhà sản xuất, định hướng sản xuất."],c:0,g:"Một trong những vai trò của các chủ thể trung gian trong thị trường là kết nối, trao đổi thông tin (Xem trang 79, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tiền trong nền sản xuất hàng hóa giản đơn vận động theo công thức:",o:["$H - T - H$","$T - H - T$","$T - H - T'$","$H - T - H'$"],c:0,g:"Tiền trong nền sản xuất hàng hoá giản đơn vận động theo quan hệ $H - T - H$ (Xem trang 85, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Bộ phận tư bản tồn tại dưới hình thái tư liệu sản xuất mà giá trị được lao động cụ thể của công nhân làm thuê bảo tồn và chuyển nguyên vẹn vào giá trị sản phẩm được C. Mác gọi là:",o:["tư bản khả biến.","tư bản lưu động.","tư bản bất biến.","tư bản cố định."],c:2,g:"Bộ phận tư bản tồn tại dưới hình thái tư liệu sản xuất mà giá trị không biến đổi trong quá trình sản xuất được gọi là tư bản bất biến (ký hiệu là $c$) (Xem trang 92, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Công thức chung của tư bản là:",o:["$T - H - T$","$H - T - H$","$T - H - T'$","$H - T - H'$"],c:2,g:"Tư bản vận động theo công thức: $T - H - T'$ (đây là công thức chung của tư bản) (Xem trang 85, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Toàn bộ những năng lực thể chất và tinh thần tồn tại trong cơ thể, trong một con người sống và được người đó đem vào vận dụng trong sản xuất là:",o:["sức lao động.","lao động.","hàng hóa sức lao động.","hàng hóa lao động."],c:0,g:"C. Mác viết: “Sức lao động hay năng lực lao động là toàn bộ những năng lực thể chất và tinh thần tồn tại trong cơ thể... đem vào vận dụng mỗi khi sản xuất ra một giá trị sử dụng nào đó” (Xem trang 86, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Ba giai đoạn vận động tuần hoàn của tư bản là:",o:["lưu thông - lưu thông - trao đổi.","sản xuất - lưu thông - lưu thông.","lưu thông - lưu thông - sản xuất.","lưu thông - sản xuất - lưu thông."],c:3,g:"Ba giai đoạn vận động tuần hoàn của tư bản là lưu thông – sản xuất – lưu thông."},
{t:"Bộ phận giá trị mới dôi ra ngoài giá trị sức lao động do công nhân tạo ra, là kết quả của lao động không công của công nhân cho nhà tư bản là:",o:["giá trị thặng dư.","giá trị của hàng hóa sức lao động.","giá trị trao đổi.","giá trị sử dụng của hàng hóa sức lao động."],c:0,g:"Giá trị thặng dư là bộ phận giá trị mới dôi ra ngoài giá trị sức lao động do công nhân tạo ra (Xem trang 90, 91, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Trong sản xuất giá trị thặng dư, ngày lao động của công nhân gồm thời gian lao động tất yếu và:",o:["thời gian lao động phức tạp.","thời gian lao động thặng dư.","thời gian lao động giản đơn.","thời gian lao động hiện tại."],c:1,g:"Trong sản xuất giá trị thặng dư, ngày lao động của công nhân gồm thời gian lao động tất yếu và thời gian lao động thặng dư (Xem trang 88, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"C. Mác ký hiệu giá trị thặng dư là:",o:["$P$","$M$","$m'$","$m$"],c:3,g:"Ký hiệu của giá trị thặng dư là $m$ (Xem trang 91, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"C. Mác ký hiệu tư bản bất biến là:",o:["$c$","$v$","$m'$","$m$"],c:0,g:"Ký hiệu của tư bản bất biến là $c$ (Xem trang 92, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"C. Mác ký hiệu tư bản khả biến là:",o:["$c$","$v$","$m'$","$G$"],c:1,g:"Ký hiệu của tư bản khả biến là $v$ (Xem trang 93, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tiền công trong nền kinh tế thị trường là giá cả của:",o:["hàng hóa.","hàng hóa lao động.","lao động.","hàng hóa sức lao động."],c:3,g:"Tiền công trong nền kinh tế thị trường là giá cả của hàng hoá sức lao động (Xem trang 94, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Sự vận động của tư bản lần lượt trải qua ba giai đoạn dưới ba hình thái kế tiếp nhau gắn với thực hiện những chức năng tương ứng và quay trở về hình thái ban đầu là:",o:["tuần hoàn của tư bản.","tuần hoàn của sản xuất.","chu chuyển của tư bản.","chu chuyển của sản xuất."],c:0,g:"Tuần hoàn của tư bản là sự vận động qua 3 giai đoạn (tiền tệ, sản xuất, hàng hoá) gắn với các chức năng tương ứng và quay về hình thái ban đầu cùng giá trị thặng dư (Xem trang 95, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Ba hình thái kế tiếp nhau của tư bản trong tuần hoàn của tư bản là:",o:["tư bản sản xuất, tư bản tiền tệ, tư bản hàng hóa.","tư bản tiền tệ, tư bản sản xuất, tư bản hàng hóa.","tư bản bất biến, tư bản khả biến, tư bản sản xuất.","tư bản sản xuất, tư bản bất biến, tư bản khả biến."],c:1,g:"Tuần hoàn của tư bản trải qua 3 giai đoạn: tư bản tiền tệ, tư bản sản xuất, tư bản hàng hoá (Xem trang 95, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tuần hoàn của tư bản được xét với tư cách là quá trình định kỳ, thường xuyên lặp đi lặp lại và đổi mới theo thời gian là:",o:["chu chuyển của hàng hóa.","chu chuyển của tư liệu sản xuất.","chu chuyển của tư bản.","chu chuyển của sản xuất."],c:2,g:"Chu chuyển của tư bản là tuần hoàn của tư bản được xét với tư cách là quá trình định kỳ, thường xuyên lặp đi lặp lại (Xem trang 96, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Hao mòn tư bản cố định gồm:",o:["hao mòn hữu hình và hao mòn tự nhiên.","hao mòn hữu hình và hao mòn vô hình.","hao mòn hữu hình và hao mòn do sử dụng.","hao mòn hữu hình và hao mòn vật chất."],c:1,g:"Hao mòn tư bản cố định gồm hao mòn vô hình và hao mòn hữu hình (Xem trang 97, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Chu chuyển của tư bản được đo lường bằng thời gian chu chuyển của tư bản hoặc:",o:["tốc độ chu chuyển tư bản.","tốc độ lưu thông của tư bản.","thời gian lưu thông của tư bản.","thời gian sản xuất của tư bản."],c:0,g:"Chu chuyển của tư bản được đo lường bằng thời gian chu chuyển hoặc tốc độ chu chuyển (Xem trang 1, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Phương thức chu chuyển giá trị của tư bản lưu động vào giá trị sản phẩm khi kết thúc từng quá trình sản xuất là chuyển:",o:["một lần, toàn phần.","nhiều lần, từng phần.","từng phần.","nhiều lần."],c:0,g:"Giá trị của tư bản lưu động được chuyển một lần, toàn phần vào giá trị sản phẩm khi kết thúc từng quá trình sản xuất (Xem trang 98, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tỷ lệ phần trăm giữa giá trị thặng dư và tư bản khả biến là:",o:["tỷ suất lợi nhuận.","tỷ suất giá trị thặng dư.","khối lượng lợi nhuận.","khối lượng giá trị thặng dư."],c:1,g:"Tỷ suất giá trị thặng dư ($m'$) là tỷ lệ phần trăm giữa giá trị thặng dư ($m$) và tư bản khả biến ($v$) để sản xuất ra giá trị thặng dư đó (Xem trang 100, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Công thức tính khối lượng giá trị thặng dư là:",o:["$M = m \cdot V$","$M = m'$","$M = m' \cdot V$","$M = m \cdot C$"],c:2,g:"Công thức tính khối lượng giá trị thặng dư là $M = m' \cdot V$ ($M$ là khối lượng $m$, $m'$ là tỷ suất $m$, $V$ là tổng tư bản khả biến) (Xem trang 100, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Hàng hóa sức lao động có các thuộc tính là:",o:["giá trị và giá trị trao đổi.","giá trị và giá trị sử dụng.","giá trị trao đổi và giá trị sử dụng.","giá trị trao đổi và giá trị cá biệt."],c:1,g:"Hàng hoá sức lao động có hai thuộc tính gồm: giá trị và giá trị sử dụng (Xem trang 87, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Mục đích trong lưu thông hàng hoá giản đơn là:",o:["giá trị và giá trị sử dụng.","giá trị và giá trị trao đổi.","giá trị sử dụng.","giá trị thặng dư."],c:2,g:"Mục đích trong lưu thông hàng hóa giản đơn là giá trị sử dụng (Xem trang 85, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Mục đích trong lưu thông tư bản là:",o:["giá trị và giá trị sử dụng.","giá trị trao đổi.","giá trị sử dụng.","giá trị lớn hơn."],c:3,g:"Mục đích trong lưu thông tư bản là giá trị lớn hơn ($T' > T$) (Xem trang 85, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá trị thặng dư thu được nhờ rút ngắn thời gian lao động tất yếu, do đó kéo dài thời gian lao động thặng dư trong khi độ dài ngày lao động không thay đổi là:",o:["giá trị thặng dư tương đối.","giá trị thặng dư siêu ngạch.","giá trị thặng dư tuyệt đối.","giá trị thặng dư đặc biệt."],c:0,g:"Giá trị thặng dư tương đối thu được nhờ rút ngắn thời gian lao động tất yếu thông qua tăng năng suất lao động xã hội (Xem trang 102, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá trị thặng dư thu được do kéo dài ngày lao động vượt quá thời gian lao động tất yếu, trong khi năng suất lao động không thay đổi là:",o:["giá trị thặng dư tương đối.","giá trị thặng dư siêu ngạch.","giá trị thặng dư tuyệt đối.","giá trị thặng dư đặc biệt."],c:2,g:"Giá trị thặng dư tuyệt đối thu được do kéo dài tuyệt đối ngày lao động trong khi các điều kiện khác không đổi (Xem trang 101, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Xét toàn bộ xã hội tư bản thì giá trị thặng dư siêu ngạch là một hiện tượng tồn tại:",o:["tạm thời.","thường xuyên.","vĩnh viễn.","bất biến."],c:1,g:"Xét toàn bộ xã hội tư bản thì giá trị thặng dư siêu ngạch là hiện tượng tồn tại thường xuyên (Xem trang 103, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Xét trong từng trường hợp đơn vị sản xuất cá biệt, giá trị thặng dư siêu ngạch là một hiện tượng:",o:["tạm thời.","thường xuyên.","vĩnh viễn.","bất biến."],c:0,g:"Xét trong từng trường hợp đơn vị sản xuất cá biệt, giá trị thặng dư siêu ngạch là một hiện tượng tạm thời (Xem trang 103, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Hàng hóa sức lao động mang yếu tố:",o:["tinh thần và tự nhiên.","vật chất và tinh thần.","vật chất và lịch sử.","tinh thần và lịch sử."],c:3,g:"Hàng hoá sức lao động là loại hàng hoá đặc biệt, mang yếu tố tinh thần và lịch sử (Xem trang 88, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"C. Mác khẳng định, nguồn gốc của giá trị thặng dư là do hao phí:",o:["thể lực của người lao động.","trí lực của người lao động.","sức lao động.","lao động cụ thể."],c:2,g:"Giá trị thặng dư là kết quả của sự hao phí sức lao động trong quá trình tạo ra và làm tăng giá trị (Xem trang 98, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá trị sử dụng của hàng hóa sức lao động, khi sử dụng sẽ tạo ra:",o:["lượng giá trị sử dụng mới nhỏ hơn giá trị bản thân nó.","lượng giá trị mới lớn hơn giá trị bản thân nó.","lượng giá trị mới nhỏ hơn giá trị bản thân nó.","lượng giá trị sử dụng mới lớn hơn giá trị bản thân nó."],c:1,g:"Trong khi sử dụng sức lao động, giá trị của nó không những được bảo tồn mà còn tạo ra được lượng giá trị lớn hơn (Xem trang 88, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Bộ phận tư bản tồn tại dưới hình thái tư liệu sản xuất, giá trị của nó không biến đổi trong quá trình sản xuất là:",o:["tư bản bất biến.","tư bản khả biến.","tư bản hàng hóa.","tư bản lưu động."],c:0,g:"Bộ phận tư bản tồn tại dưới hình thái tư liệu sản xuất mà giá trị không biến đổi trong quá trình sản xuất, được gọi là tư bản bất biến (Xem trang 92, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Bộ phận tư bản tồn tại dưới hình thái sức lao động, giá trị của nó tăng lên trong quá trình sản xuất là:",o:["tư bản bất biến.","tư bản khả biến.","tư bản hàng hóa.","tư bản lưu động."],c:1,g:"Bộ phận tư bản tồn tại dưới hình thái sức lao động, giá trị của nó tăng lên trong quá trình sản xuất là tư bản khả biến (Xem trang 93, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Căn cứ để phân chia tư bản thành tư bất biến và tư bản khả biến là vai trò của các bộ phận tư bản trong quá trình sản xuất:",o:["giá trị hàng hóa.","giá trị sử dụng.","giá trị xã hội.","giá trị thặng dư."],c:3,g:"Căn cứ để phân chia là vai trò của chúng trong việc tạo ra giá trị thặng dư (Xem trang 91, 92, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Giá trị thặng dư được tạo ra:",o:["trong lưu thông và do hao phí sức lao động.","trong lưu thông và do mua rẻ bán đắt.","trong sản xuất và do hao phí tư liệu sản xuất.","trong sản xuất và do hao phí sức lao động."],c:3,g:"Giá trị thặng dư được tạo ra trong sản xuất và do hao phí sức lao động (Xem trang 98, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Thời gian chu chuyển của tư bản gồm:",o:["thời gian sản xuất + thời gian dự trữ sản xuất.","thời gian sản xuất + thời gian lưu thông.","thời gian sản xuất + thời gian vận chuyển.","thời gian dự trữ sản xuất + thời gian lưu thông."],c:1,g:"Thời gian chu chuyển của tư bản bao gồm thời gian sản xuất và thời gian lưu thông (Xem trang 97, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tốc độ chu chuyển của từng bộ phận tư bản được xác định bằng thời gian của một năm chia cho:",o:["thời gian tuần hoàn của tư bản.","thời gian sản xuất.","thời gian một vòng chu chuyển của tư bản.","thời gian lưu thông."],c:2,g:"Công thức tính tốc độ chu chuyển là: $n = CH / ch$ ($CH$ là thời gian một năm, $ch$ là thời gian một vòng chu chuyển) (Xem trang 97, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Xét theo phương thức chu chuyển giá trị của tư bản sản xuất vào giá trị sản phẩm, tư bản được chia thành:",o:["tư bản cố định và tư bản lưu thông.","tư bản lưu thông và tư bản sản xuất.","tư bản sản xuất và tư bản lưu động.","tư bản cố định và tư bản lưu động."],c:3,g:"Xét theo phương thức chu chuyển giá trị, tư bản được chia thành: tư bản cố định và tư bản lưu động (Xem trang 97, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Tỷ suất giá trị thặng dư có thể tính theo tỷ lệ phần trăm giữa thời gian lao động thặng dư và thời gian lao động:",o:["tất yếu.","quá khứ.","thiết yếu.","hiện tại."],c:0,g:"Tỷ suất giá trị thặng dư cũng có thể tính theo tỷ lệ giữa thời gian lao động thặng dư và thời gian lao động tất yếu (Xem trang 100, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Khoảng thời gian mà một tư bản kể từ khi ứng ra dưới một hình thái nhất định đến khi quay trở về dưới hình thái đó là thời gian:",o:["dự trữ sản xuất.","gián đoạn lao động.","chu chuyển tư bản.","chu chuyển sản xuất."],c:2,g:"Chu chuyển tư bản là khoảng thời gian tư bản ứng ra cho đến khi quay về dưới hình thái đó cùng giá trị thặng dư."},
{t:"Các phương pháp sản xuất giá trị thặng dư trong nền kinh tế thị trường tư bản chủ nghĩa là sản xuất giá trị thặng dư:",o:["siêu ngạch và tuyệt đối.","tuyệt đối và tương đối.","siêu ngạch và tương đối.","tương đối và siêu lợi nhuận."],c:1,g:"Hai phương pháp cơ bản là sản xuất giá trị thặng dư tuyệt đối và tương đối (Xem trang 101, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"Quá trình sản xuất giá trị thặng dư là sự thống nhất của quá trình tạo ra và làm tăng:",o:["chi phí.","giá trị sử dụng.","giá trị.","lợi nhuận."],c:2,g:"Quá trình sản xuất giá trị thặng dư là sự thống nhất của quá trình tạo ra và làm tăng giá trị (Xem trang 88, giáo trình Kinh tế chính trị Mác – Lênin, 2021)."},
{t:"C. Mác ký hiệu tỷ suất lợi nhuận là",o:["P","V","p'","m"],c:2,g:"Ký hiệu của tỷ suất lợi nhuận là p' (Xem trang 113, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Các hình thức cơ bản của địa tô là",o:["địa tô chênh lệch, địa tô tuyệt đối","địa tô chênh lệch II, địa tô tuyệt đối","địa tô chênh lệch I, địa tô chênh lệch II","địa tô chênh lệch I, địa tô tuyệt đối"],c:0,g:"Địa tô gồm 2 hình thức cơ bản: địa tô chênh lệch và địa tô tuyệt đối (Xem trang 120, 121, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Phần giá trị thặng dư còn lại sau khi đã khấu trừ đi phần lợi nhuận bình quân mà các nhà tư bản kinh doanh trên lĩnh vực nông nghiệp phải trả cho địa chủ là",o:["tỷ suất lợi nhuận","lợi tức","địa tô","tỷ suất lợi nhuận bình quân"],c:2,g:"Địa tô là phần giá trị thặng dư còn lại sau khi đã khấu trừ đi phần lợi nhuận bình quân mà các nhà tư bản kinh doanh nông nghiệp trả cho địa chủ (Trang 120)."},
{t:"Cạnh tranh giữa các ngành là cơ chế cho sự hình thành",o:["tỷ suất lợi nhuận bình quân","tỷ suất lợi nhuận","lợi nhuận bình quân","lợi nhuận thương nghiệp"],c:2,g:"Cạnh tranh giữa các ngành là cơ chế dẫn đến sự hình thành lợi nhuận bình quân (Xem trang 114, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Ông A vay ông B số tiền 100.000.000 đồng với tỷ suất lợi tức 3% một tháng. Vậy lợi tức ông A trả cho ông B một tháng là bao nhiêu?",o:["3.000.000 đồng","6.000.000 đồng","5.000.000 đồng","4.000.000 đồng"],c:0,g:"Lợi tức (z) = Số tiền vay x Tỷ suất lợi tức = 100.000.000 x 3% = 3.000.000 đồng."},
{t:"C. Mác ký hiệu lợi nhuận là",o:["V","M","C","p"],c:3,g:"Ký hiệu của lợi nhuận là p (Xem trang 111, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"C. Mác ký hiệu địa tô là",o:["P","z","R","M"],c:2,g:"Ký hiệu của địa tô là R (Xem trang 120, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Khi hàng hóa bán bằng chi phí sản xuất thì",o:["lợi nhuận cao","không có lợi nhuận","lợi nhuận thấp","lợi nhuận bằng chi phí sản xuất"],c:1,g:"Trong trường hợp bán hàng hoá với giá cả đúng bằng chi phí sản xuất thì không có lợi nhuận (Trang 112)."},
{t:"Lợi nhuận bình quân được hình thành do cạnh tranh",o:["trong nội bộ ngành","không lành mạnh","giữa các ngành","trong nội bộ doanh nghiệp"],c:2,g:"Cạnh tranh giữa các ngành tất yếu dẫn tới hình thành lợi nhuận bình quân (Xem trang 116, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Khi hàng hóa bán thấp hơn giá trị nhưng cao hơn chi phí sản xuất thì",o:["không có lợi nhuận","có lợi nhuận","lợi nhuận bằng chi phí sản xuất","lợi nhuận bằng giá trị thặng dư"],c:1,g:"Bán thấp hơn giá trị nhưng cao hơn chi phí sản xuất vẫn có thể thu được lợi nhuận (Trang 112)."},
{t:"Công thức vận động của tư bản cho vay là",o:["T-H-T'","T-T'","H-T-H'","H-T"],c:1,g:"Tư bản cho vay vận động theo công thức T-T' (Xem trang 119, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Tỷ lệ phần trăm giữa lợi nhuận và toàn bộ giá trị của tư bản ứng trước là",o:["tỷ suất lợi tức","tỷ suất lợi nhuận bình quân","tỷ suất lợi nhuận","tỷ suất giá trị thặng dư"],c:2,g:"Tỷ suất lợi nhuận là tỷ lệ phần trăm giữa lợi nhuận và toàn bộ giá trị tư bản ứng trước (Trang 113)."},
{t:"Một phần giá trị thặng dư mà tư bản sản xuất trả cho nhà tư bản thương nghiệp là",o:["lợi nhuận thương nghiệp","lợi tức","địa tô","lợi nhuận bình quân"],c:0,g:"Nguồn gốc của lợi nhuận thương nghiệp là một phần giá trị thặng dư do nhà tư bản sản xuất trả cho nhà tư bản thương nghiệp (Trang 117)."},
{t:"Giá mảnh đất 100 m2 tăng từ 500.000.000 đồng lên 800.000.000 đồng, lãi suất tiền vay giảm từ 5% xuống 4%. Vậy địa tô thay đổi như thế nào?",o:["Từ 25.000.000 đồng tăng lên 32.000.000 đồng","Từ 25.000.000 đồng tăng lên 30.000.000 đồng","Từ 32.000.000 đồng giảm xuống 25.000.000 đồng","Từ 30.000.000 đồng giảm xuống 25.000.000 đồng"],c:0,g:"Địa tô = Giá cả đất đai x Lãi suất. Ban đầu: 500tr x 5% = 25tr. Lúc sau: 800tr x 4% = 32tr."},
{t:"Khi hàng hóa bán đúng giá trị thì lợi nhuận",o:["nhỏ hơn giá trị thặng dư","lớn hơn giá trị thặng dư","bằng giá trị","bằng giá trị thặng dư"],c:3,g:"Khi giá cả bằng đúng giá trị, nhà tư bản thực hiện được toàn bộ giá trị thặng dư dưới hình thái lợi nhuận (p = m)."},
{t:"Ông A vay 100.000.000 đồng, sau 1 tháng phải trả 103.000.000 đồng. Vậy tỷ suất lợi tức là bao nhiêu?",o:["4%","2%","3%","1%"],c:2,g:"Tiền lợi tức = 103tr - 100tr = 3tr. Tỷ suất z' = (3tr / 100tr) x 100% = 3%."},
{t:"C. Mác ký hiệu lợi tức là",o:["M","V","P","z"],c:3,g:"Ký hiệu lợi tức là z."},
{t:"Giá cả sản xuất bằng chi phí sản xuất cộng",o:["giá trị thặng dư","lợi nhuận bình quân","tỷ suất lợi nhuận bình quân","lợi nhuận"],c:1,g:"Giá cả sản xuất (GCSX) = k + p_ngang (Xem trang 116, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Có 3 ngành sản xuất: I (900C+100V), II (3100C+900V), III (8000C+2000V). Tỷ suất giá trị thặng dư 100%. Tỷ suất lợi nhuận bình quân là:",o:["15%","10%","20%","25%"],c:2,g:"Tổng p = Tổng m = 3000. Tổng tư bản (C+V) = 15000. Tỷ suất lợi nhuận bình quân = (3000/15000) x 100% = 20%."},
{t:"Một trong những đặc điểm cơ bản của tư bản cho vay là quyền sử dụng",o:["gắn liền quyền thừa kế","tách khỏi quyền quản lý","gắn liền quyền sở hữu","tách khỏi quyền sở hữu"],c:3,g:"Tư bản cho vay có đặc điểm là quyền sử dụng tách khỏi quyền sở hữu (Xem trang 118, 119)."},
{t:"Xí nghiệp A đầu tư 400.000.000 đồng, c/v = 3/2, m' = 50%. Trong điều kiện cung bằng cầu lợi nhuận là bao nhiêu?",o:["80.000.000 đồng","20.000.000 đồng","50.000.000 đồng","40.000.000 đồng"],c:0,g:"v = 160tr. m = 50% x 160tr = 80tr. Khi cung = cầu, p = m = 80.000.000 đồng."},
{t:"Địa tô mà địa chủ thu được trên mảnh đất cho thuê, không kể độ màu mỡ tự nhiên thuận lợi hay do thâm canh là",o:["địa tô chênh lệch I","địa tô tương đối","địa tô tuyệt đối","địa tô chênh lệch II"],c:2,g:"Địa tô tuyệt đối là địa tô thu được trên mảnh đất cho thuê bất kể chất lượng đất (Trang 121)."},
