{t:"Tạo lập những điều kiện để chuyển đổi từ nền sản xuất lạc hậu sang nền sản xuất tiến bộ là một trong những nội dung của:",o:["công nghiệp hóa, hiện đại hóa ở Việt Nam.","cách mạng công nghiệp lần thứ tư.","cách mạng công nghiệp lần thứ ba.","phát triển kinh tế tri thức ở Việt Nam."],c:0,g:"Đây là nội dung của công nghiệp hóa, hiện đại hóa ở Việt Nam (Xem trang 249, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Thực hiện các nhiệm vụ để chuyển đổi nền sản xuất lạc hậu sang nền sản xuất hiện đại là một trong những nội dung của:",o:["công nghiệp hóa, hiện đại hóa ở Việt Nam.","của cách mạng công nghiệp lần thứ tư.","của cách mạng công nghiệp lần thứ ba.","phát triển kinh tế tri thức ở Việt Nam."],c:0,g:"Đây là nội dung của công nghiệp hóa, hiện đại hóa ở Việt Nam (Xem trang 249, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Trong bối cảnh hội nhập kinh tế quốc tế, chủ thể nào dẫn dắt tiến trình hội nhập?",o:["Người dân.","Công ty xuyên quốc gia.","Nhà nước.","Doanh nghiệp có vốn đầu tư nước ngoài."],c:2,g:"Nhà nước dẫn dắt tiến trình hội nhập và hỗ trợ các chủ thể khác (Xem trang 270, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."}
]

// ===== STATE =====
let Q=[],ans=[],cur=0,showSum=false,totalSec=3600,timerInterval=null,chosenCount=60;

function setCount(n,btn){
  chosenCount=n;
  document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const mins=n<=20?20:n<=40?30:n<=60?60:n<=100?90:150;
  document.getElementById('meta-count').textContent=n;
  document.getElementById('meta-time').textContent=mins;
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startExam(){
  const n=Math.min(chosenCount,BANK.length);
  Q=shuffle(BANK).slice(0,n);
  ans=new Array(n).fill(null);
  cur=0;showSum=false;
  const mins=n<=20?20:n<=40?30:n<=60?60:n<=100?90:150;
  totalSec=mins*60;
  document.getElementById('hdr-sub').textContent='Random '+n+' câu';
  document.getElementById('splash').style.display='none';
  document.getElementById('app').style.display='block';
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(totalSec<=0){clearInterval(timerInterval);finishQuiz();return;}
    totalSec--;
    const m=String(Math.floor(totalSec/60)).padStart(2,'0');
    const s=String(totalSec%60).padStart(2,'0');
    const el=document.getElementById('timer-txt');
    if(el){el.textContent=m+':'+s;el.className='timer-txt'+(totalSec<=300?' timer-warn':'');}
  },1000);
  renderQ();
}

function backToSplash(){
  if(!showSum&&ans.some(a=>a!==null)){if(!confirm('Bỏ bài đang làm và về trang chủ?'))return;}
  clearInterval(timerInterval);
  document.getElementById('splash').style.display='flex';
  document.getElementById('app').style.display='none';
}

function getTabClass(i){
  const a=ans[i];
  const active=i===cur&&!showSum?' active':'';
  if(a===null)return'tab'+active;
  if(a==='skip'||a==='unanswered'||a==='hint')return'tab skip'+active;
  if(!a.revealed)return'tab'+active;
  if(a.choice===Q[i].c)return'tab ok'+active;
  return'tab ng'+active;
}

function renderTabs(){
  const wrap=document.getElementById('tabs-wrap');
  wrap.innerHTML=Q.map((_,i)=>`<div class="${getTabClass(i)}" onclick="goTo(${i})">Câu ${i+1}</div>`).join('');
  setTimeout(()=>{const tabs=wrap.querySelectorAll('.tab');if(tabs[cur])tabs[cur].scrollIntoView({block:'nearest',inline:'center'});},30);
}

function renderProgress(){
  const answered=ans.filter(a=>a&&a.revealed).length;
  const el=document.getElementById('prog-info');
  if(el)el.textContent=answered+' / '+Q.length+' câu';
  const bar=document.getElementById('prog-bar');
  if(!bar)return;
  const segW=(100/Q.length).toFixed(4)+'%';
  bar.innerHTML=Q.map((_,i)=>{
    const a=ans[i];
    let color='#E2E8F0';
    if(a==='unanswered')color='#DC2626';
    else if(a&&a!=='skip'&&a!=='hint'&&a.revealed){
      color=a.choice===Q[i].c?'#16A34A':'#DC2626';
    }
    return`<div class="pbar-seg" style="width:${segW};background:${color}"></div>`;
  }).join('');
}

function renderQ(){
  if(showSum){renderSum();return;}
  const q=Q[cur];
  const a=ans[cur];
  const isSkip=a==='unanswered';
  const isHint=a==='hint';
  const isChosen=a!==null&&a!=='skip'&&a!=='unanswered'&&a!=='hint';
  const isRevealed=isChosen&&a.revealed;
  const choice=isChosen?a.choice:null;

  let explain='';
  if(isRevealed){
    if(choice===q.c){
      explain=`<div class="explain correct"><span class="explain-icon">✅</span><div><div class="explain-lbl">Chính xác!</div><div class="explain-body">${q.g}</div></div></div>`;
    } else {
      explain=`<div class="explain wrong"><span class="explain-icon">❌</span><div><div class="explain-lbl">Chưa đúng — Đáp án đúng: ${q.o[q.c]}</div><div class="explain-body">${q.g}</div></div></div>`;
    }
  } else if(isHint){
    explain=`<div class="explain hint"><span class="explain-icon">💡</span><div><div class="explain-lbl">Đáp án đúng</div><div class="explain-body"><strong>${q.o[q.c]}</strong><br>${q.g}</div></div></div>`;
  }

  const locked=isSkip||isRevealed||isHint;
  const opts=q.o.map((o,i)=>{
    let cls='opt';
    if(locked)cls+=' locked';
    if(isRevealed){
      if(i===q.c)cls+=' correct';
      else if(i===choice&&choice!==q.c)cls+=' wrong';
    } else if(isChosen&&i===choice){cls+=' pending';}
    const click=!locked?`onclick="pick(${i})"`:'' ;
    return`<div class="${cls}" ${click}><div class="obadge">${['A','B','C','D'][i]}</div><span class="otext">${o}</span></div>`;
  }).join('');

  document.getElementById('main-content').innerHTML=`
    <div class="qwrap">
      <div class="qnum">Câu ${cur+1} / ${Q.length}</div>
      <div class="qtext">${q.t}</div>
      <div class="opts">${opts}</div>
      ${explain}
    </div>
    <div class="fnav">
      <button class="nav-btn nav-prev" onclick="prev()" ${cur===0?'disabled':''}>
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-center" onclick="toggleGrid()">
        <svg width="17" height="17" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="#2563EB" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="#2563EB" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="#2563EB" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="#2563EB" stroke-width="2"/></svg>
        <span class="nav-center-txt">Câu ${cur+1} / ${Q.length}</span>
      </div>
      <button class="nav-btn nav-next" onclick="next()">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>`;

  renderTabs();renderProgress();
  const fab=document.getElementById('fab-ans');
  if(fab){
    const canHint=!showSum&&(a===null||(a&&a!=='skip'&&a!=='unanswered'&&a!=='hint'&&!a.revealed));
    fab.classList.toggle('hidden',!canHint);
  }
  setTimeout(renderMath,50);
}

function renderSum(){
  const ok=ans.filter((a,i)=>a&&a!=='skip'&&a.revealed&&a.choice===Q[i].c).length;
  const ng=ans.filter((a,i)=>a&&a!=='skip'&&a.revealed&&a.choice!==Q[i].c).length;
  const sk=ans.filter(a=>a===null||a==='skip'||a==='unanswered'||a==='hint').length;
  const pct=Math.round(ok/Q.length*100);
  const score=(ok/Q.length*10).toFixed(1);
  const pass=ok>=Math.ceil(Q.length*0.8);
  document.getElementById('main-content').innerHTML=`
    <div class="sum-wrap">
      <div class="sum-hero">
        <div class="sum-emoji">${pass?'🎉':'📖'}</div>
        <div class="sum-score">${score}<span style="font-size:24px;font-weight:600;color:#94A3B8">/10</span></div>
        <div class="sum-grade">${pass?'Xuất sắc — Nắm vững nội dung!':'Cần ôn thêm để chắc hơn nhé'}</div>
      </div>
      <div class="sum-cards">
        <div class="sum-card"><div class="sum-card-num c-ok">${ok}</div><div class="sum-card-lbl">Câu đúng</div></div>
        <div class="sum-card"><div class="sum-card-num c-ng">${ng}</div><div class="sum-card-lbl">Câu sai</div></div>
        <div class="sum-card"><div class="sum-card-num c-sk">${sk}</div><div class="sum-card-lbl">Bỏ qua</div></div>
        <div class="sum-card"><div class="sum-card-num c-pct">${pct}%</div><div class="sum-card-lbl">Tỉ lệ đúng</div></div>
      </div>
      <div class="sum-actions">
        <button class="sum-btn sb-primary" onclick="restart()">🔄 Làm lại đề mới</button>
        <button class="sum-btn sb-outline" onclick="review()">👁 Xem lại câu trả lời</button>
        <button class="sum-btn sb-ghost" onclick="backToSplash()">🏠 Về trang chủ</button>
      </div>
    </div>`;
  renderTabs();renderProgress();
}

function revealCurrent(){
  const a=ans[cur];
  if(a&&a!=='skip'&&a!=='unanswered'&&a!=='hint'&&!a.revealed){ans[cur]={choice:a.choice,revealed:true};}
}
function skipIfEmpty(){if(ans[cur]===null)ans[cur]='skip';}

function pick(i){
  const a=ans[cur];
  if(a&&a!=='skip'&&a!=='unanswered'&&a!=='hint'&&a.revealed)return;
  ans[cur]={choice:i,revealed:false};
  renderQ();
}
function prev(){if(cur===0)return;revealCurrent();cur--;showSum=false;renderQ();}
function next(){revealCurrent();if(cur<Q.length-1){cur++;renderQ();}else{showSum=true;renderSum();}}
function goTo(i){if(i===cur&&!showSum){closeGridDirect();return;}revealCurrent();cur=i;showSum=false;renderQ();closeGridDirect();}

function openConfirm(){
  const done=ans.filter(a=>a!==null&&a!=='skip').length;
  const skip=ans.filter(a=>a===null||a==='skip').length;
  const sub=document.getElementById('confirm-sub');
  if(skip>0)sub.innerHTML=`Đã làm <strong>${done}/${Q.length}</strong> câu, còn <strong>${skip}</strong> câu chưa trả lời.`;
  else sub.innerHTML=`Đã hoàn thành <strong>tất cả ${Q.length} câu</strong>. Sẵn sàng nộp!`;
  document.getElementById('confirm-overlay').classList.add('show');
}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('show');}
function confirmFinish(){closeConfirm();finishQuiz();}

function finishQuiz(){
  clearInterval(timerInterval);revealCurrent();
  ans=ans.map(a=>{
    if(a===null)return'unanswered';
    if(a==='skip')return'skip';
    if(!a.revealed)return{choice:a.choice,revealed:true};
    return a;
  });
  showSum=true;renderSum();
}

function restart(){
  const n=Math.min(chosenCount,BANK.length);
  Q=shuffle(BANK).slice(0,n);
  ans=new Array(n).fill(null);
  cur=0;showSum=false;
  const mins=n<=20?20:n<=40?30:n<=60?60:n<=100?90:150;
  totalSec=mins*60;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(totalSec<=0){clearInterval(timerInterval);finishQuiz();return;}
    totalSec--;
    const m=String(Math.floor(totalSec/60)).padStart(2,'0');
    const s=String(totalSec%60).padStart(2,'0');
    const el=document.getElementById('timer-txt');
    if(el){el.textContent=m+':'+s;el.className='timer-txt'+(totalSec<=300?' timer-warn':'');}
  },1000);
  renderQ();
}

function review(){showSum=false;cur=0;renderQ();}

function showHint(){
  const a=ans[cur];
  if(a&&a!=='skip'&&a!=='unanswered'&&!a.revealed){ans[cur]={choice:a.choice,revealed:true};}
  else if(a===null){ans[cur]='hint';}
  renderQ();
}

function toggleGrid(){
  const grid=document.getElementById('q-grid');
  grid.innerHTML=Q.map((_,i)=>{
    const a=ans[i];
    let cls='gdot';
    if(i===cur&&!showSum)cls+=' cur';
    else if(a===null)cls+='';
    else if(a==='skip')cls+='';
    else if(!a.revealed)cls+='';
    else if(a.choice===Q[i].c)cls+=' ok';
    else cls+=' ng';
    return`<div class="${cls}" onclick="goTo(${i})">${i+1}</div>`;
  }).join('');
  document.getElementById('grid-overlay').classList.add('show');
}
function closeGrid(e){if(e.target===document.getElementById('grid-overlay'))closeGridDirect();}
function closeGridDirect(){document.getElementById('grid-overlay').classList.remove('show');}

function renderMath(){
  if(typeof renderMathInElement==='function'){
    renderMathInElement(document.getElementById('main-content'),{
      delimiters:[{left:"$",right:"$",display:false}],throwOnError:false
    });
  }
}
</script>
