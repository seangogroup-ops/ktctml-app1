{t:"Địa tô mà địa chủ thu được trên những loại ruộng đất tốt, độ màu mỡ cao và điều kiện tự nhiên thuận lợi là",o:["địa tô chênh lệch I","địa tô tuyệt đối","địa tô chênh lệch II","địa tô tương đối"],c:0,g:"Địa tô chênh lệch I thu được do điều kiện tự nhiên thuận lợi và độ màu mỡ cao (Trang 120)."},
{t:"C. Mác ký hiệu lợi nhuận bình quân là",o:["P","P'","p (có gạch ngang đầu)","m"],c:2,g:"Ký hiệu của lợi nhuận bình quân là p có gạch ngang trên đầu (Trang 115)."},
{t:"3 ngành sản xuất đầu tư cùng lượng vốn 100.000.000 đồng, cấu tạo hữu cơ lần lượt 4/1, 3/2, 7/3, m' = 100%. Lợi nhuận bình quân từng ngành là:",o:["80.000.000 đồng","40.000.000 đồng","20.000.000 đồng","30.000.000 đồng"],c:3,g:"Tổng m của 3 ngành là 90tr. Tổng tư bản là 300tr. p' ngang = 30%. p ngang = 30% x 100tr = 30tr đồng."},
{t:"Xí nghiệp A đầu tư 800.000.000 đồng, lợi nhuận 8.000.000 đồng. Vậy tỷ suất lợi nhuận là:",o:["0,1%","10%","1%","2%"],c:2,g:"p' = (8.000.000 / 800.000.000) x 100% = 1%."},
{t:"Kết quả cạnh tranh giữa các ngành hình thành",o:["giá cả thị trường","lợi nhuận bình quân","giá cả sản xuất","giá trị thị trường"],c:1,g:"Cạnh tranh giữa các ngành tất yếu dẫn tới hình thành lợi nhuận bình quân (Trang 116)."},
{t:"Tổng giá trị hàng hóa tháng 650.000.000 đồng, m thu được 100.000.000 đồng. Vậy chi phí sản xuất (k) là:",o:["550.000.000 đồng","300.000.000 đồng","450.000.000 đồng","500.000.000 đồng"],c:0,g:"k = G - m = 650tr - 100tr = 550.000.000 đồng."},
{t:"Lợi nhuận thương nghiệp là số chênh lệch giữa",o:["giá bán và giá mua hàng hóa","giá cả và giá trị hàng hóa","giá trị và chi phí sản xuất","giá cả và chi phí sản xuất"],c:0,g:"Lợi nhuận thương nghiệp là số chênh lệch giữa giá bán và giá mua (Trang 117)."},
{t:"C. Mác ký hiệu tỷ suất lợi nhuận bình quân là",o:["p' (có gạch ngang đầu)","P","P'","M"],c:0,g:"Ký hiệu của tỷ suất lợi nhuận bình quân là p' có gạch ngang trên đầu (Trang 115)."},
{t:"C. Mác ký hiệu tỷ suất lợi tức là",o:["m","z'","P","z"],c:1,g:"Ký hiệu của tỷ suất lợi tức là z' (Xem trang 119)."},
{t:"Chi phí sản xuất (k) bao gồm",o:["m và v","c và m","c và v","c, v và m"],c:2,g:"Chi phí sản xuất bao gồm tư bản bất biến (c) và tư bản khả biến (v) (Trang 111)."},
{t:"Tỷ suất lợi tức là tỷ lệ phần trăm giữa",o:["lợi tức và giá trị thặng dư","lợi nhuận bình quân và giá trị thặng dư","lợi tức và tư bản cho vay","giá trị thặng dư và tư bản cho vay"],c:2,g:"Tỷ suất lợi tức là tỷ lệ phần trăm giữa lợi tức và tư bản cho vay (Trang 119)."},
{t:"Địa tô mà địa chủ thu được trên những mảnh đất do đầu tư thâm canh và làm tăng độ màu mỡ là",o:["địa tô tương đối","địa tô chênh lệch II","địa tô tuyệt đối","địa tô chênh lệch I"],c:1,g:"Địa tô chênh lệch II thu được do đầu tư thâm canh làm tăng độ màu mỡ (Trang 120)."},
{t:"Phần giá trị bù lại giá cả tư liệu sản xuất và sức lao động đã sử dụng để sản xuất hàng hóa là",o:["chi phí chu chuyển tư bản","chi phí tuần hoàn tư bản","chi phí tư bản bất biến","chi phí sản xuất tư bản chủ nghĩa"],c:3,g:"Đây là định nghĩa về chi phí sản xuất tư bản chủ nghĩa (Trang 111)."},
{t:"Có 3 ngành A, B, C đầu tư cùng vốn 100tr, cấu tạo hữu cơ 4/1, 3/2, 7/3, m' = 100%. Tỷ suất lợi nhuận bình quân là:",o:["20%","30%","25%","10%"],c:1,g:"Tổng m của 3 ngành là 90tr. Tổng tư bản là 300tr. p' ngang = 90/300 x 100% = 30%."},
{t:"Điểm giống nhau giữa địa tô chênh lệch và địa tô tuyệt đối là đều có nguồn gốc từ",o:["giá trị thặng dư","giá trị sử dụng","giá trị trao đổi","giá trị"],c:0,g:"Các hình thức địa tô đều có nguồn gốc từ giá trị thặng dư (Trang 120)."},
{t:"Xí nghiệp A đầu tư 800tr, lợi nhuận 8tr, chu chuyển 6 tháng/vòng. Tỷ suất lợi nhuận trong năm là:",o:["0,2%","0,1%","1%","2%"],c:3,g:"Một năm có 2 vòng chu chuyển. Tổng lợi nhuận năm là 16tr. p' = (16/800) x 100% = 2%."},
{t:"Về bản chất lợi nhuận và giá trị thặng dư đều là",o:["lao động của người lao động làm thuê","lao động cụ thể của người làm thuê","lao động phức tạp của người làm thuê","lao động không công của người lao động làm thuê"],c:3,g:"Cả hai đều có nguồn gốc duy nhất là lao động không công của công nhân."},
{t:"Một phần lợi nhuận bình quân mà người đi vay phải trả cho người cho vay vì sử dụng lượng tiền nhàn rỗi là",o:["lợi nhuận bình quân","lợi tức","địa tô","lợi nhuận thương nghiệp"],c:1,g:"Lợi tức là một phần lợi nhuận bình quân mà người vay trả cho chủ nợ (Trang 118)."},
{t:"Xí nghiệp A có lượng tư bản đầu tư lần thứ nhất 200.000.000 đồng, cấu tạo hữu cơ của tư bản 4/1, tỷ suất giá trị thặng dư 100%, giá trị thặng dư được tư bản hóa 50%. Vậy lượng tư bản đầu tư lần thứ hai là bao nhiêu?",o:["220.000.000 đồng.","225.000.000 đồng.","235.000.000 đồng.","230.000.000 đồng."],c:0,g:"Ta có c=4v, c+v=200tr => v=40tr. m=100%*v=40tr. Lượng tích lũy = 50%*m=20tr. Lượng tư bản lần hai = 200tr + 20tr = 220.000.000 đồng."},
{t:"Mối quan hệ tỷ lệ giữa số lượng tư liệu sản xuất và số lượng sức lao động là:",o:["cấu tạo giá trị sử dụng của tư bản.","cấu tạo hữu cơ của tư bản.","cấu tạo kỹ thuật của tư bản.","cấu tạo giá trị của tư bản."],c:2,g:"Quan sát qua hình thái hiện vật, tỷ lệ giữa số lượng tư liệu sản xuất và số lượng sức lao động được gọi là cấu tạo kỹ thuật (Trang 107)."},
{t:"Sự tăng thêm quy mô của tư bản cá biệt bằng cách tư bản hóa giá trị thặng dư là:",o:["phát triển tư bản.","đầu tư tư bản.","tích tụ tư bản.","tập trung tư bản."],c:2,g:"Tích tụ tư bản là sự tăng thêm quy mô tư bản cá biệt bằng cách tư bản hóa giá trị thặng dư (Trang 108)."},
{t:"Trong tái sản xuất giản đơn, toàn bộ giá trị thặng dư đã được nhà tư bản tiêu dùng cho:",o:["tư bản bất biến.","tư bản khả biến.","sản xuất.","cá nhân."],c:3,g:"Trong tái sản xuất giản đơn, toàn bộ giá trị thặng dư được nhà tư bản tiêu dùng cho cá nhân (Trang 105)."},
{t:"Xí nghiệp A có thời gian chu chuyển một vòng của tư bản 6 tháng. Vậy tốc độ chu chuyển tư bản là bao nhiêu?",o:["1 vòng/năm.","2 vòng/năm.","4 vòng/năm.","3 vòng/năm."],c:1,g:"Tốc độ chu chuyển n = CH/ch = 12 tháng / 6 tháng = 2 (vòng/năm)."},
{t:"Để tái sản xuất sức lao động cần tiêu dùng: ăn uống 50.000 đồng/ngày, đồ gia dụng 29.200.000 đồng/năm, văn hóa 900.000 đồng/tháng. Vậy giá trị sức lao động trong ngày là bao nhiêu?",o:["160.000 đồng.","170.000 đồng.","180.000 đồng.","200.000 đồng."],c:0,g:"Chi phí một ngày = 50.000 + (29.200.000/365) + (900.000/30) = 50.000 + 80.000 + 30.000 = 160.000 đồng."},
{t:"Cấu tạo kỹ thuật của tư bản phản ánh mối quan hệ tỷ lệ giữa số lượng tư liệu sản xuất và số lượng:",o:["lao động.","lực lượng sản xuất.","sức lao động.","quan hệ sản xuất."],c:2,g:"Theo hình thái hiện vật, cấu tạo kỹ thuật phản ánh tỷ lệ giữa số lượng tư liệu sản xuất và số lượng sức lao động (Trang 107)."},
{t:"Xí nghiệp A có lượng tư bản đầu tư 200.000.000 đồng, cấu tạo hữu cơ 4/1, tỷ suất m' 100%, tỷ suất tích lũy tư bản 80%. Hỏi khối lượng giá trị thặng dư tư bản hóa là bao nhiêu?",o:["30.000.000 đồng.","35.000.000 đồng.","32.000.000 đồng.","20.000.000 đồng."],c:2,g:"v=40tr, m=40tr. Lượng tư bản hóa = m * tỷ suất tích lũy = 40tr * 80% = 32.000.000 đồng."},
{t:"Tăng cấu tạo hữu cơ tư bản là một trong những hệ quả của:",o:["chu chuyển tư bản.","tích lũy tư bản.","tuần hoàn tư bản.","tiết kiệm tư bản."],c:1,g:"Một trong các hệ quả của tích lũy tư bản là làm tăng cấu tạo hữu cơ của tư bản (Trang 107, 108)."},
{t:"Tích tụ tư bản và tập trung tư bản giống nhau ở điểm nào sau đây?",o:["Có chung hình thức biểu hiện.","Làm tăng quy mô tư bản xã hội.","Làm tăng quy mô tư bản cá biệt.","Có chung nguồn gốc tích lũy."],c:2,g:"Cả tích tụ và tập trung tư bản đều làm tăng quy mô tư bản cá biệt (Trang 108)."},
{t:"Công ty A có 10 người lao động, giá trị sức lao động mỗi tháng của một công nhân 5.000.000 đồng, chi phí tư bản bất biến 90.000.000 đồng, tỷ suất m' 50%. Vậy tổng giá trị hàng hóa là bao nhiêu?",o:["190.000.000 đồng.","195.000.000 đồng.","185.000.000 đồng.","165.000.000 đồng."],c:3,g:"v = 10 * 5tr = 50tr. m = 50% * v = 25tr. Tổng giá trị G = c + v + m = 90tr + 50tr + 25tr = 165.000.000 đồng."},
{t:"Xí nghiệp A có lượng tư bản đầu tư 10 tỷ đồng, c gấp bốn lần v, khối lượng giá trị thặng dư thu được 1.000.000.000 đồng. Vậy tỷ suất giá trị thặng dư là bao nhiêu?",o:["150%.","100%.","200%.","50%."],c:3,g:"c+v=10 tỷ, c=4v => v=2 tỷ. m'= m/v * 100% = 1 tỷ / 2 tỷ * 100% = 50%."},
{t:"Nguồn gốc của tư bản tích lũy là:",o:["lợi nhuận bình quân.","giá trị thặng dư.","lợi nhuận siêu ngạch.","giá trị hàng hóa."],c:1,g:"Nguồn gốc duy nhất của tích lũy tư bản là giá trị thặng dư (Trang 105)."},
{t:"Công ty A có 10 người lao động, giá trị sức lao động mỗi người 5tr, sản xuất 1000 đơn vị hàng hóa, c = 90tr, m' = 50%. Vậy giá trị của một đơn vị hàng hóa là bao nhiêu?",o:["195.000 đồng.","165.000 đồng.","185.000 đồng.","190.000 đồng."],c:1,g:"Tổng giá trị hàng hóa G = 165tr. Giá trị 1 đơn vị = 165tr / 1000 = 165.000 đồng."},
{t:"Xí nghiệp A có chi phí tư bản 100.000.000 đồng, trong đó chi phí mua tư liệu sản xuất 70.000.000 đồng. Vậy cấu tạo hữu cơ của tư bản là bao nhiêu?",o:["3/1.","4/1.","3/2.","7/3."],c:3,g:"c=70tr, c+v=100tr => v=30tr. Cấu tạo hữu cơ c/v = 70tr/30tr = 7/3."},
{t:"Ngày làm việc 8 giờ thì m' = 100%. Sau đó nhà tư bản kéo dài ngày làm việc đến 10 giờ. Vậy tỷ suất m' thay đổi như thế nào nếu giá trị sức lao động không đổi và sử dụng phương pháp nào?",o:["150%, sản xuất giá trị thặng dư tuyệt đối.","300%, sản xuất giá trị thặng dư tương đối.","300%, sản xuất giá trị thặng dư tuyệt đối.","150%, sản xuất giá trị thặng dư tương đối."],c:0,g:"Ban đầu t=4, t'=4. Khi ngày làm 10h, t=4 không đổi, t'=6. m'= 6/4 * 100% = 150%. Kéo dài ngày lao động là phương pháp tuyệt đối."},
{t:"Xí nghiệp A có lượng tư bản đầu tư 10 tỷ đồng, c gấp bốn lần v, tỷ suất m' 50%. Vậy khối lượng giá trị thặng dư là bao nhiêu?",o:["1.000.000.000 đồng.","700.000.000 đồng.","500.000.000 đồng.","900.000.000 đồng."],c:0,g:"c+v=10 tỷ, c=4v => v=2 tỷ. M = m' * v = 50% * 2 tỷ = 1.000.000.000 đồng."},
{t:"Tích tụ tư bản là sự tăng thêm quy mô tư bản cá biệt bằng cách tư bản hóa:",o:["giá trị cá biệt.","giá trị sử dụng.","giá trị thặng dư.","giá trị xã hội."],c:2,g:"Tích tụ tư bản là sự tăng thêm quy mô tư bản cá biệt bằng cách tư bản hóa giá trị thặng dư (Trang 108)."},
{t:"Xí nghiệp A đầu tư 100tr, m tư bản hóa 50%, quy mô sau tích lũy là 110tr. Nếu đầu tư 200tr (các tỷ lệ khác không đổi) thì quy mô sau tích lũy là bao nhiêu?",o:["300.000.000 đồng.","220.000.000 đồng.","250.000.000 đồng.","200.000.000 đồng."],c:1,g:"Khi vốn đầu tư ban đầu gấp đôi, các tỷ lệ không đổi thì phần tích lũy và quy mô sau tích lũy cũng gấp đôi (110tr * 2 = 220tr)."},
{t:"Xí nghiệp A có chi phí tư bản 100.000.000 đồng, cấu tạo hữu cơ 3/2. Vậy chi phí tư bản khả biến là bao nhiêu?",o:["10.000.000 đồng.","40.000.000 đồng.","20.000.000 đồng.","30.000.000 đồng."],c:1,g:"c+v=100tr, c/v=3/2 => 1,5v + v = 100tr => v = 40.000.000 đồng."},
{t:"Tích tụ tư bản là kết quả trực tiếp của:",o:["tiết kiệm tư bản.","tập trung tư bản.","phát triển tư bản.","tích lũy tư bản."],c:3,g:"Tích tụ tư bản là kết quả trực tiếp của quá trình tích lũy tư bản (Trang 108)."},
{t:"Một trong những hệ quả của tích lũy tư bản là:",o:["tăng chi phí sản xuất.","giảm cấu tạo hữu cơ tư bản.","giảm tích tụ và tập trung tư bản.","tăng cấu tạo hữu cơ tư bản."],c:3,g:"Quá trình tích lũy tư bản làm tăng cấu tạo hữu cơ của tư bản (Trang 107, 108)."},
{t:"Sự hợp nhất các tư bản cá biệt vào một chỉnh thể tạo thành một tư bản cá biệt lớn hơn là:",o:["tích lũy tư bản.","phát triển tư bản.","tập trung tư bản.","tích tụ tư bản."],c:2,g:"Tập trung tư bản là sự hợp nhất các tư bản cá biệt có sẵn trong xã hội thành một tư bản cá biệt lớn hơn (Trang 108)."},
{t:"Trong quá trình tái sản xuất tư bản chủ nghĩa, quy mô của tư bản cá biệt tăng lên thông qua quá trình tích tụ và:",o:["xuất khẩu đầu tư.","tiết kiệm tư bản.","nhập khẩu tư bản.","tập trung tư bản."],c:3,g:"Quy mô tư bản cá biệt tăng lên thông qua hai con đường: tích tụ và tập trung tư bản (Trang 108)."},
{t:"Tập trung tư bản có thể được thực hiện thông qua sáp nhập các:",o:["tư bản cá biệt với nhau.","tư bản cho vay với nhau.","tư bản công nghiệp với nhau.","tư bản thương nghiệp với nhau."],c:0,g:"Tập trung tư bản có thể thực hiện thông qua sáp nhập các tư bản cá biệt với nhau (Trang 108)."},
{t:"Nâng cao m', nâng cao năng suất, sử dụng hiệu quả máy móc, đại lượng tư bản ứng trước là những nhân tố ảnh hưởng:",o:["quy mô tích lũy tư bản.","thời gian chu chuyển tư bản.","tốc độ chu chuyển tư bản.","quy mô tiết kiệm tư bản."],c:0,g:"Đây là các nhân tố chính ảnh hưởng đến quy mô tích lũy tư bản (Trang 106, 107)."},
{t:"Tích lũy tư bản là tư bản hóa:",o:["giá trị sử dụng.","giá trị.","giá trị thặng dư.","giá trị trao đổi."],c:2,g:"Tích lũy tư bản là sự chuyển hóa một phần giá trị thặng dư thành tư bản (Trang 105)."},
{t:"C. Mác ký hiệu cấu tạo hữu cơ của tư bản là:",o:["v/c.","m/v.","v/m.","c/v."],c:3,g:"Cấu tạo hữu cơ của tư bản được ký hiệu là c/v (Trang 107)."},
{t:"Xí nghiệp A có chi phí tư bản 100.000.000 đồng, cấu tạo hữu cơ 3/2. Vậy chi phí tư bản bất biến là bao nhiêu?",o:["50.000.000 đồng.","60.000.000 đồng.","30.000.000 đồng.","40.000.000 đồng."],c:1,g:"v=40tr, c+v=100tr => c = 100tr - 40tr = 60.000.000 đồng."},
{t:"Tích tụ tư bản khác tập trung tư bản ở điểm làm tăng quy mô:",o:["tư bản sản xuất.","tư bản xã hội.","tư bản tiền tệ.","tư bản cá biệt."],c:1,g:"Tích tụ tư bản làm tăng quy mô tư bản cá biệt đồng thời làm tăng quy mô tư bản xã hội (Trang 108)."},
{t:"Xí nghiệp A đầu tư 10 tỷ đồng, c=4v, m'=50%, chu chuyển 6 tháng/vòng. Vậy khối lượng giá trị thặng dư có được trong năm là bao nhiêu?",o:["1 tỷ đồng.","900.000.000 đồng.","500.000.000 đồng.","2 tỷ đồng."],c:3,g:"v=2 tỷ, m một vòng = 1 tỷ. Một năm 2 vòng nên tổng M = 2 tỷ đồng."},
{t:"Cấu tạo giá trị của tư bản phản ánh mối quan hệ tỷ lệ giữa tư bản bất biến và:",o:["tư bản sản xuất.","tư bản tiền tệ.","tư bản khả biến.","tư bản lưu động."],c:2,g:"Quan sát qua hình thái giá trị, tỷ lệ giữa tư bản bất biến và tư bản khả biến gọi là cấu tạo giá trị (Trang 107)."},
{t:"Xí nghiệp A đầu tư 200tr, c/v 4/1, m' 100%, tiêu dùng m hết 50%. Vậy lượng giá trị thặng dư tư bản hóa là bao nhiêu?",o:["20.000.000 đồng.","30.000.000 đồng.","25.000.000 đồng.","35.000.000 đồng."],c:0,g:"v=40tr, m=40tr. Lượng tư bản hóa = 50% * m = 20.000.000 đồng."},
{t:"Tăng chênh lệch giữa thu nhập của nhà tư bản với người lao động là một trong những hệ quả của:",o:["tuần hoàn tư bản.","tích lũy tư bản.","chu chuyển tư bản.","tiết kiệm tư bản."],c:1,g:"Một trong các hệ quả của tích lũy tư bản là làm tăng chênh lệch thu nhập giữa các giai cấp (Trang 107, 108)."},
{t:"Xí nghiệp A đầu tư 200tr, c/v 4/1, m' 100%, tích lũy 50%. Nếu m' tăng lên 150% thì lượng m tư bản hóa tăng lên so với trước bao nhiêu?",o:["35.000.000 đồng.","10.000.000 đồng.","30.000.000 đồng.","20.000.000 đồng."],c:1,g:"Ban đầu tích lũy 20tr. Khi m'=150%, m=60tr, tích lũy=30tr. Tăng thêm = 30tr - 20tr = 10.000.000 đồng."},
{t:"Ngày làm việc 8h, t'=4h. Năng suất lao động ở các ngành tư liệu sinh hoạt tăng làm giá trị hàng hóa giảm 2 lần. m' thay đổi thế nào và thuộc phương pháp nào?",o:["300%, sản xuất giá trị thặng dư tương đối.","200%, sản xuất giá trị thặng dư tương đối.","300%, sản xuất giá trị thặng dư siêu ngạch.","300%, sản xuất giá trị thặng dư tuyệt đối."],c:0,g:"t ban đầu = 4h. Giá trị hàng giảm 2 lần nên t giảm còn 2h. t' mới = 8 - 2 = 6h. m' = 6/2 * 100% = 300%. Đây là phương pháp tương đối."},
{t:"Xí nghiệp A có chi phí tư bản 100.000.000 đồng, trong đó trả tiền công 40.000.000 đồng. Vậy cấu tạo hữu cơ là bao nhiêu?",o:["4/1.","3/2.","3/1.","7/3."],c:1,g:"v=40tr, c+v=100tr => c=60tr. c/v = 60/40 = 3/2."},
{t:"Xí nghiệp A đầu tư 200tr, c/v 4/1, m' 100%, lượng m tích lũy 20tr. Vậy tỷ suất tích lũy là bao nhiêu?",o:["150%.","100%.","50%.","200%."],c:2,g:"m=40tr. Tỷ suất tích lũy = Lượng m tư bản hóa / m = 20tr / 40tr = 50%."},
{t:"Cấu tạo giá trị được quyết định bởi cấu tạo kỹ thuật và phản ánh sự biến đổi của cấu tạo kỹ thuật là:",o:["cấu tạo vô hình của tư bản.","cấu tạo hữu cơ của tư bản.","cấu tạo hiện vật của tư bản.","cấu tạo hữu hình của tư bản."],c:1,g:"Cấu tạo hữu cơ là cấu tạo giá trị do cấu tạo kỹ thuật quyết định và phản ánh sự biến đổi của cấu tạo kỹ thuật (Trang 107)."},
{t:"Công ty A có 10 người lao động, giá trị sức lao động mỗi người 5tr, tỷ suất m' 50%. Vậy giá trị mới của mỗi người lao động là bao nhiêu?",o:["750.000 đồng.","8.500.000 đồng.","850.000 đồng.","7.500.000 đồng."],c:3,g:"v mỗi người = 5tr. m mỗi người = 50% * 5tr = 2,5tr. Giá trị mới mỗi người = v + m = 7.500.000 đồng."},
{t:"Ngày làm việc 8 giờ thì tỷ suất giá trị thặng dư 100%. Sau đó nhà tư bản kéo dài ngày làm việc đến 10 giờ. Vậy tỷ suất giá trị thặng dư thay đổi như thế nào nếu giá trị sức lao động không đổi và nhà tư bản sử dụng phương pháp sản xuất giá trị thặng dư nào?",o:["150%, sản xuất giá trị thặng dư tuyệt đối.","300%, sản xuất giá trị thặng dư tương đối.","300%, sản xuất giá trị thặng dư tuyệt đối.","150%, sản xuất giá trị thặng dư tương đối."],c:0,g:"Thời gian lao động tất yếu không đổi (t = 4 giờ), thời gian lao động thặng dư mới là 10 - 4 = 6 giờ. m' = (6/4) x 100% = 150%. Do kéo dài ngày lao động nên là phương pháp tuyệt đối (Trang 101)."},
{t:"Nâng cao tỷ suất giá trị thặng dư, nâng cao năng suất lao động, sử dụng hiệu quả máy móc, đại lượng tư bản ứng trước là những nhân tố ảnh hưởng:",o:["quy mô tích lũy tư bản.","thời gian chu chuyển tư bản.","quy mô tiết kiệm tư bản.","tốc độ chu chuyển tư bản."],c:0,g:"Đây là các nhân tố chính ảnh hưởng tới quy mô tích lũy tư bản (Trang 106, 107)."},
{t:"Để tái sản xuất sức lao động cần tiêu dùng: ăn uống 50.000 đồng/ngày, đồ gia dụng 29.200.000 đồng/năm, nhu cầu văn hóa 900.000 đồng/tháng. Vậy giá trị sức lao động trong ngày là bao nhiêu?",o:["180.000 đồng.","200.000 đồng.","170.000 đồng.","160.000 đồng."],c:3,g:"Tổng chi phí/ngày = 50.000 + (29.200.000/365) + (900.000/30) = 50.000 + 80.000 + 30.000 = 160.000 đồng."},
{t:"Xí nghiệp A có lượng tư bản đầu tư 200.000.000 đồng, c/v = 4/1, m' = 100%, m được tư bản hóa 50%. Nếu m' tăng lên 150% thì lượng m tư bản hóa tăng lên so với trước là bao nhiêu?",o:["35.000.000 đồng.","10.000.000 đồng.","20.000.000 đồng.","30.000.000 đồng."],c:1,g:"Lúc đầu tích lũy 20 triệu. Khi m' = 150%, m = 60 triệu, tích lũy 30 triệu. Tăng thêm 30 - 20 = 10 triệu đồng."},
{t:"Tăng chênh lệch giữa thu nhập của nhà tư bản với thu nhập của người lao động làm thuê là hệ quả của:",o:["chu chuyển tư bản.","tích lũy tư bản.","tiết kiệm tư bản.","tuần hoàn tư bản."],c:1,g:"Đây là một trong các hệ quả của tích lũy tư bản (Trang 107, 108)."},
{t:"Xí nghiệp A có lượng tư bản đầu tư lần thứ nhất 200 triệu đồng, c/v = 4/1, m' = 100%, m được tư bản hóa 50%. Vậy lượng tư bản đầu tư lần thứ hai là bao nhiêu?",o:["225.000.000 đồng.","235.000.000 đồng.","220.000.000 đồng.","230.000.000 đồng."],c:2,g:"m = 40 triệu, phần tích lũy là 20 triệu. Tư bản lần hai = 200 + 20 = 220 triệu đồng."},
{t:"Xí nghiệp A đầu tư 10 tỷ đồng, c = 4v, m' = 50%, chu chuyển 6 tháng/vòng. Khối lượng m thu được trong năm là bao nhiêu?",o:["1 tỷ đồng.","900.000.000 đồng.","500.000.000 đồng.","2 tỷ đồng."],c:3,g:"v = 2 tỷ, M một vòng = 1 tỷ. Một năm 2 vòng nên M = 2 tỷ đồng."},
{t:"Công ty A có 10 lao động, lương 5 triệu/người/tháng, sản xuất 1000 hàng hóa, chi phí c một tháng 90 triệu, m' = 50%. Giá trị một đơn vị hàng hóa là:",o:["185.000 đồng.","165.000 đồng.","195.000 đồng.","190.000 đồng."],c:1,g:"v = 50 triệu, m = 25 triệu. Tổng giá trị = 90 + 50 + 25 = 165 triệu. Đơn giá = 165.000 đồng."},
{t:"Xí nghiệp A đầu tư 100 triệu, c/v=4/1, m'=100%, m tư bản hóa 50%, quy mô sau tích lũy là 110 triệu. Nếu đầu tư 200 triệu thì quy mô sau tích lũy là:",o:["300.000.000 đồng.","200.000.000 đồng.","250.000.000 đồng.","220.000.000 đồng."],c:3,g:"Khi tư bản đầu tư ban đầu gấp đôi, phần tích lũy cũng gấp đôi, tổng là 220 triệu đồng."},
{t:"Công ty A có 10 lao động, lương 5 triệu/tháng, c = 90 triệu, m' = 50%. Tổng giá trị hàng hóa là:",o:["195.000.000 đồng.","185.000.000 đồng.","190.000.000 đồng.","165.000.000 đồng."],c:3,g:"Tổng G = c + v + m = 90 + 50 + 25 = 165 triệu đồng."},
{t:"Xí nghiệp A có chi phí tư bản 100 triệu, c/v = 3/2. Chi phí tư bản khả biến là:",o:["20.000.000 đồng.","40.000.000 đồng.","30.000.000 đồng.","10.000.000 đồng."],c:1,g:"c = 1,5v. Ta có 1,5v + v = 100 => 2,5v = 100 => v = 40 triệu."},
{t:"Xí nghiệp A đầu tư 200 triệu, c/v = 4/1, m' = 100%, tỷ suất tích lũy 80%. Khối lượng m tư bản hóa là:",o:["32.000.000 đồng.","20.000.000 đồng.","30.000.000 đồng.","35.000.000 đồng."],c:0,g:"v = 40 triệu, m = 40 triệu. Phần tích lũy = 80% x 40 = 32 triệu đồng."},
{t:"Xí nghiệp A đầu tư 10 tỷ đồng, c = 4v, m' = 50%. Khối lượng giá trị thặng dư là:",o:["500.000.000 đồng.","1.000.000.000 đồng.","700.000.000 đồng.","900.000.000 đồng."],c:1,g:"5v = 10 tỷ => v = 2 tỷ. M = 50% x 2 tỷ = 1 tỷ đồng."},
{t:"Công ty A có 10 lao động, lương 5 triệu/tháng, m' = 50%. Giá trị mới của mỗi người lao động là bao nhiêu?",o:["750.000 đồng.","850.000 đồng.","7.500.000 đồng.","8.500.000 đồng."],c:2,g:"Giá trị mới = v + m = 5 triệu + 2,5 triệu = 7,5 triệu đồng/người."},
{t:"Ngày làm việc 8 giờ, lao động thặng dư 4 giờ. Do năng suất lao động tăng làm giá trị hàng hóa giảm 2 lần. Tỷ suất thặng dư thay đổi thế nào và thuộc phương pháp nào?",o:["200%, sản xuất giá trị thặng dư tương đối.","300%, sản xuất giá trị thặng dư tuyệt đối.","300%, sản xuất giá trị thặng dư siêu ngạch.","300%, sản xuất giá trị thặng dư tương đối."],c:3,g:"t giảm 2 lần còn 2 giờ. t' = 8 - 2 = 6 giờ. m' = (6/2) x 100% = 300%. Đây là phương pháp tương đối."},
{t:"Xí nghiệp A chi phí 100 triệu, c/v = 3/2. Chi phí tư bản bất biến là:",o:["40.000.000 đồng.","60.000.000 đồng.","50.000.000 đồng.","30.000.000 đồng."],c:1,g:"v = 40 triệu (từ câu 22), suy ra c = 100 - 40 = 60 triệu đồng."},
{t:"Quy mô tư bản cá biệt tăng lên thông qua tích tụ và:",o:["nhập khẩu tư bản.","tập trung tư bản.","xuất khẩu đầu tư.","tiết kiệm tư bản."],c:1,g:"Quy mô tư bản cá biệt tăng qua tích tụ và tập trung tư bản (Trang 108)."},
{t:"Xí nghiệp A đầu tư 200 triệu, c/v = 4/1, m' = 100%, m dành cho tiêu dùng 50%. Vậy lượng m tư bản hóa là:",o:["35.000.000 đồng.","30.000.000 đồng.","20.000.000 đồng.","25.000.000 đồng."],c:2,g:"m = 40 triệu. Phần tư bản hóa là 100% - 50% = 50%. Lượng tích lũy = 20 triệu."},
{t:"Xí nghiệp A chi phí 100 triệu, chi mua tư liệu sản xuất 70 triệu. Cấu tạo hữu cơ là:",o:["3/2.","7/3.","3/1.","4/1."],c:1,g:"c = 70 triệu, v = 100 - 70 = 30 triệu. c/v = 70/30 = 7/3."},
{t:"Xí nghiệp A có thời gian chu chuyển một vòng là 6 tháng. Tốc độ chu chuyển tư bản là:",o:["4 vòng/năm.","3 vòng/năm.","1 vòng/năm.","2 vòng/năm."],c:3,g:"n = 12/6 = 2 vòng/năm."},
{t:"Xí nghiệp A đầu tư 10 tỷ đồng, c = 4v, M = 1 tỷ. Tỷ suất giá trị thặng dư là:",o:["50%.","200%.","150%.","100%."],c:0,g:"v = 2 tỷ. m' = (1/2) x 100% = 50%."},
{t:"Xí nghiệp A đầu tư 200 triệu, c/v = 4/1, m' = 100%, m tích lũy 20 triệu. Tỷ suất tích lũy là:",o:["50%.","100%.","200%.","150%."],c:0,g:"m = 40 triệu. Tỷ suất tích lũy = (20/40) x 100% = 50%."},
{t:"Xí nghiệp A chi phí 100 triệu, trả lương 40 triệu. Cấu tạo hữu cơ là:",o:["3/2.","3/1.","7/3.","4/1."],c:0,g:"v = 40 triệu, c = 60 triệu. c/v = 60/40 = 3/2."},
{t:"Phần giá trị thặng dư còn lại sau khi đã khấu trừ đi phần lợi nhuận bình quân mà các nhà tư bản kinh doanh nông nghiệp phải trả cho địa chủ là",o:["tỷ suất lợi nhuận","lợi tức","địa tô","tỷ suất lợi nhuận bình quân"],c:2,g:"Địa tô là phần giá trị thặng dư còn lại sau khi khấu trừ lợi nhuận bình quân trả cho địa chủ (Trang 120)."},
{t:"Cạnh tranh giữa các ngành là cơ chế cho sự hình thành của",o:["tỷ suất lợi nhuận bình quân","tỷ suất lợi nhuận","lợi nhuận bình quân","lợi nhuận thương nghiệp"],c:2,g:"Cạnh tranh giữa các ngành là cơ chế dẫn đến sự hình thành lợi nhuận bình quân (Trang 114)."},
{t:"Giá mảnh đất 100 m2 tăng từ 500 triệu lên 800 triệu, lãi suất vay giảm từ 5% xuống 4%. Địa tô thay đổi thế nào?",o:["Từ 25.000.000 đồng tăng lên 32.000.000 đồng","Từ 25.000.000 đồng tăng lên 30.000.000 đồng","Từ 32.000.000 đồng giảm xuống 25.000.000 đồng","Từ 30.000.000 đồng giảm xuống 25.000.000 đồng"],c:0,g:"Địa tô = Giá cả đất đai x Lãi suất vay. Lúc đầu: 500tr x 5% = 25tr; Lúc sau: 800tr x 4% = 32tr."},
{t:"Ông A vay 100.000.000 đồng, sau 1 tháng phải trả 103.000.000 đồng. Tỷ suất lợi tức là bao nhiêu?",o:["4%","2%","3%","1%"],c:2,g:"Tiền lợi tức = 3tr. Tỷ suất lợi tức (z') = (3tr / 100tr) x 100% = 3%."},
{t:"Có 3 ngành sản xuất: I (900C+100V), II (3100C+900V), III (8000C+2000V), m' = 100%. Tỷ suất lợi nhuận bình quân là",o:["15%","10%","20%","25%"],c:2,g:"Tổng m = tổng v = 3000. Tổng tư bản (c+v) = 15000. p' = (3000 / 15000) x 100% = 20%."},
{t:"Đặc điểm cơ bản của tư bản cho vay là quyền sử dụng",o:["gắn liền quyền thừa kế","tách khỏi quyền quản lý","gắn liền quyền sở hữu","tách khỏi quyền sở hữu"],c:3,g:"Tư bản cho vay có đặc điểm là quyền sử dụng tách khỏi quyền sở hữu (Trang 118, 119)."},
{t:"Xí nghiệp A đầu tư 400.000.000 đồng, c/v = 3/2, m' = 50%. Lợi nhuận (cung = cầu) là bao nhiêu?",o:["80.000.000 đồng","20.000.000 đồng","50.000.000 đồng","40.000.000 đồng"],c:0,g:"v = 160tr. m = 50% x 160tr = 80tr. Khi cung = cầu, p = m = 80.000.000 đồng."},
{t:"Địa tô thu được trên mảnh đất cho thuê, không kể độ màu mỡ tự nhiên thuận lợi hay do thâm canh là",o:["địa tô chênh lệch I","địa tô tương đối","địa tô tuyệt đối","địa tô chênh lệch II"],c:2,g:"Địa tô tuyệt đối thu được trên mảnh đất cho thuê bất kể chất lượng đất (Trang 121)."},
{t:"Địa tô thu được trên những loại ruộng đất tốt, độ màu mỡ cao và điều kiện tự nhiên thuận lợi là",o:["địa tô chênh lệch I","địa tô tuyệt đối","địa tô chênh lệch II","địa tô tương đối"],c:0,g:"Địa tô chênh lệch I thu được do điều kiện tự nhiên thuận lợi và đất màu mỡ (Trang 120)."},
{t:"3 ngành A, B, C đầu tư cùng 100 triệu, c/v lần lượt 4/1, 3/2, 7/3, m' = 100%. Lợi nhuận bình quân từng ngành là",o:["80.000.000 đồng","40.000.000 đồng","20.000.000 đồng","30.000.000 đồng"],c:3,g:"Tổng m = 90tr. Tổng tư bản = 300tr. p' = 30%. Lợi nhuận bình quân = 30% x 100tr = 30 triệu đồng."},
{t:"Xí nghiệp A đầu tư 800.000.000 đồng, lợi nhuận 8.000.000 đồng. Tỷ suất lợi nhuận là",o:["0,1%","10%","1%","2%"],c:2,g:"p' = (8tr / 800tr) x 100% = 1%."},
{t:"Xí nghiệp giày da có tổng giá trị hàng hóa 650 triệu, m thu được 100 triệu. Chi phí sản xuất là bao nhiêu?",o:["550.000.000 đồng","300.000.000 đồng","450.000.000 đồng","500.000.000 đồng"],c:0,g:"Chi phí sản xuất k = G - m = 650tr - 100tr = 550.000.000 đồng."},
{t:"Địa tô thu được trên những mảnh đất do đầu tư thâm canh và làm tăng độ màu mỡ là",o:["địa tô tương đối","địa tô chênh lệch II","địa tô tuyệt đối","địa tô chênh lệch I"],c:1,g:"Địa tô chênh lệch II thu được do thâm canh làm tăng độ màu mỡ (Trang 120)."},
{t:"Phần giá trị bù lại giá cả tư liệu sản xuất và sức lao động đã sử dụng là",o:["chi phí chu chuyển tư bản","chi phí tuần hoàn tư bản","chi phí tư bản bất biến","chi phí sản xuất tư bản chủ nghĩa"],c:3,g:"Đây là định nghĩa chi phí sản xuất tư bản chủ nghĩa (Trang 111)."},
{t:"Có 3 ngành A, B, C đầu tư cùng 100 triệu, c/v lần lượt 4/1, 3/2, 7/3, m' = 100%. Tỷ suất lợi nhuận bình quân bằng bao nhiêu?",o:["20%","30%","25%","10%"],c:1,g:"p' = (90tr / 300tr) x 100% = 30%."},
{t:"Xí nghiệp A đầu tư 800 triệu, lợi nhuận 8 triệu, chu chuyển 6 tháng/vòng. Tỷ suất lợi nhuận trong năm là",o:["0,2%","0,1%","1%","2%"],c:3,g:"1 năm có 2 vòng. Tổng lợi nhuận năm là 16tr. p' = (16tr / 800tr) x 100% = 2%."},
{t:"Một phần lợi nhuận bình quân mà người đi vay trả cho người cho vay vì sử dụng lượng tiền nhàn rỗi là",o:["lợi nhuận bình quân","lợi tức","địa tô","lợi nhuận thương nghiệp"],c:1,g:"Đây là định nghĩa về lợi tức (Trang 118)."},
{t:"\"Nền kinh tế vận hành theo các quy luật của thị trường, đồng thời góp phần hướng tới từng bước xác lập một xã hội mà ở đó dân giàu, nước mạnh, dân chủ, công bằng, văn minh có sự điều tiết của Nhà nước do Đảng cộng sản Việt Nam lãnh đạo\" là khái niệm về:",o:["kinh tế thị trường tư bản chủ nghĩa.","kinh tế thị trường có sự quản lý của nhà nước.","kinh tế thị trường hiện đại.","kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam."],c:3,g:"Đây là định nghĩa đầy đủ về mô hình kinh tế thị trường đặc thù của Việt Nam (Xem trang 170, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Quan điểm: “Kinh tế thị trường định hướng xã hội chủ nghĩa là mô hình kinh tế tổng quát của thời kỳ quá độ lên chủ nghĩa xã hội ở nước ta\" được khẳng định trong văn kiện Đại hội lần thứ mấy của Đảng?",o:["VIII.","IX.","X.","XI."],c:1,g:"Đại hội IX của Đảng đã chính thức khẳng định mô hình kinh tế tổng quát này (Xem trang 172, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Quan điểm: \"Nền kinh tế hàng hóa nhiều thành phần, vận hành theo cơ chế thị trường, có sự quản lý của Nhà nước, dưới sự lãnh đạo của Đảng Cộng sản Việt Nam\" được khẳng định rõ nhất tại Đại hội:",o:["VIII.","IX.","X.","XI."],c:3,g:"Văn kiện Đại hội XI của Đảng đã khẳng định và làm rõ thêm các yếu tố cấu thành nền kinh tế thị trường nước ta (Xem trang 172, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Nội dung nào sau đây KHÔNG thể hiện tính tất yếu khách quan của việc phát triển kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?",o:["Phù hợp với tính quy luật phát triển khách quan.","Tính ưu việt của kinh tế thị trường trong thúc đẩy phát triển.","Mô hình kinh tế thị trường phù hợp với nguyện vọng của nhân dân.","Mô hình kinh tế này đã và đang là mục tiêu của nhân loại."],c:3,g:"Đây là sự lựa chọn riêng biệt phù hợp với con đường đi lên CNXH của Việt Nam, không phải mục tiêu chung của toàn nhân loại (Xem trang 173, 174, 175)."},
{t:"Một trong những tính tất yếu khách quan của việc phát triển kinh tế thị trường định hướng XHCN ở Việt Nam là vì mô hình này:",o:["phù hợp với sự phát triển của quan hệ sản xuất.","được nhiều nước trên thế giới lựa chọn.","phù hợp với nguyện vọng của nhân dân.","đang được thử nghiệm theo mô hình kinh tế mới."],c:2,g:"Mô hình này hướng tới mục tiêu dân giàu, nước mạnh, dân chủ, công bằng, văn minh, phù hợp mong muốn nhân dân (Xem trang 176)."},
{t:"Phát triển kinh tế thị trường định hướng XHCN ở Việt Nam là tất yếu khách quan vì nó:",o:["phù hợp với tính quy luật phát triển khách quan.","phù hợp với sự phát triển của quan hệ sản xuất.","được nhiều nước trên thế giới lựa chọn.","đang được thử nghiệm theo mô hình kinh tế mới."],c:0,g:"Phát triển kinh tế thị trường là xu thế tất yếu của thời đại và phù hợp với quy luật khách quan (Xem trang 173)."},
{t:"Nội dung nào luận giải về tính tất yếu khách quan của việc phát triển kinh tế thị trường định hướng XHCN ở Việt Nam?",o:["phát triển theo mô hình kinh tế mới của thế giới.","tính ưu việt của kinh tế thị trường trong thúc đẩy phát triển.","đây là mô hình kinh tế nhiều nước trên thế giới lựa chọn.","thử nghiệm theo mô hình kinh tế mới."],c:1,g:"Kinh tế thị trường là phương thức hiệu quả để thúc đẩy sức sản xuất xã hội (Xem trang 175)."},
{t:"Quan hệ nào sau đây KHÔNG phải là quan hệ lợi ích kinh tế cơ bản trong nền kinh tế thị trường?",o:["Quan hệ lợi ích giữa người lao động và người sử dụng lao động.","Quan hệ lợi ích giữa những người sử dụng lao động.","Quan hệ giữa lợi ích cá nhân, lợi ích nhóm và lợi ích xã hội.","Quan hệ giữa Đảng, Nhà nước và nhân dân."],c:3,g:"Quan hệ giữa Đảng, Nhà nước và nhân dân là quan hệ chính trị - xã hội, không thuộc quan hệ lợi ích kinh tế cơ bản (Xem trang 1)."},
{t:"Trong nền kinh tế thị trường định hướng XHCN, các thành phần kinh tế nòng cốt để phát triển kinh tế là:",o:["bền vững.","độc lập, tự chủ.","tiến bộ.","tiên tiến, hiện đại."],c:1,g:"Kinh tế nhà nước, tập thể và tư nhân là nòng cốt để phát triển một nền kinh tế độc lập, tự chủ."},
{t:"Nội dung nào sau đây KHÔNG phải là lý do phải hoàn thiện thể chế kinh tế thị trường định hướng XHCN ở Việt Nam?",o:["Thể chế còn chưa đồng bộ.","Thể chế kinh tế thị trường định hướng xã hội chủ nghĩa không phù hợp.","Hệ thống thể chế chưa đầy đủ.","Hệ thống thể chế còn kém hiệu lực, hiệu quả."],c:1,g:"Thể chế này hoàn toàn phù hợp, lý do cần hoàn thiện là vì nó còn chưa đồng bộ và kém hiệu quả (Xem trang 188, 189)."},
{t:"Một trong những lý do phải hoàn thiện thể chế kinh tế thị trường định hướng XHCN ở Việt Nam là:",o:["còn chưa đồng bộ.","không phù hợp.","khác với các nước trên thế giới.","còn mới mẻ."],c:0,g:"Do hệ thống pháp luật và cơ chế vận hành hiện nay còn chồng chéo, chưa khớp nhau (Xem trang 188, 189)."},
{t:"Hoàn thiện thể chế kinh tế thị trường là yêu cầu cấp thiết vì hệ thống thể chế hiện nay:",o:["không phù hợp.","chưa đầy đủ.","khác với các nước trên thế giới.","còn mới mẻ."],c:1,g:"Nhiều loại hình thị trường và yếu tố thị trường vẫn còn thiếu khung pháp lý điều chỉnh (Xem trang 188, 189)."},
{t:"Đâu là lý do cần hoàn thiện thể chế kinh tế thị trường định hướng XHCN tại Việt Nam?",o:["Không phù hợp với điều kiện của đất nước.","Khác với các nước trên thế giới.","Còn kém hiệu lực, hiệu quả, thiếu các yếu tố thị trường và các loại thị trường.","Còn mới mẻ, chưa thật sự phù hợp với điều kiện kinh tế."],c:2,g:"Thể chế hiện tại chưa phát huy được tối đa các nguồn lực do thiếu các loại thị trường bộ phận (Xem trang 188, 189)."},
{t:"Nội dung nào sau đây KHÔNG thuộc nhiệm vụ hoàn thiện thể chế kinh tế thị trường định hướng XHCN ở Việt Nam?",o:["Hoàn thiện thể chế về sở hữu, phát triển các thành phần kinh tế.","Hoàn thiện thể chế để phát triển đồng bộ các yếu tố thị trường.","Hoàn thiện thể chế mới cho phù hợp với điều kiện phát triển của đất nước.","Hoàn thiện thể chế, nâng cao năng lực lãnh đạo của Đảng."],c:2,g:"Việc hoàn thiện là trên nền tảng thể chế hiện có, không phải xây dựng một \"thể chế mới\" hoàn toàn khác (Xem trang 191 - 196)."},
{t:"Một trong những nội dung trọng tâm để hoàn thiện thể chế kinh tế thị trường định hướng XHCN ở Việt Nam là:",o:["để phát triển đồng bộ các yếu tố thị trường và các loại thị trường.","cho phù hợp với điều kiện phát triển của đất nước.","để tăng trưởng kinh tế.","để phát triển văn hóa."],c:0,g:"Đây là nội dung quan trọng nhằm tạo môi trường kinh doanh thuận lợi (Xem trang 194)."},
{t:"Hoàn thiện thể chế gắn kết tăng trưởng kinh tế với công bằng xã hội nhằm thúc đẩy:",o:["mở rộng hoạt động kinh tế đối ngoại.","nền sản xuất phát triển.","hội nhập quốc tế.","phát triển kinh tế, chính trị, văn hóa."],c:2,g:"Thúc đẩy hội nhập quốc tế là kết quả của việc hoàn thiện thể chế gắn với phát triển bền vững (Xem trang 195)."},
{t:"Nội dung nào không thuộc nội dung hoàn thiện thể chế kinh tế thị trường định hướng XHCN?",o:["Hoàn thiện thể chế về sở hữu.","Hoàn thiện thể chế phát triển yếu tố thị trường.","Nâng cao năng lực lãnh đạo của Đảng và hệ thống chính trị.","Hoàn thiện thể chế kinh tế, chính trị, văn hoá, xã hội."],c:3,g:"Nhiệm vụ này chỉ tập trung vào thể chế kinh tế, không bao hàm tất cả các lĩnh vực xã hội khác (Xem trang 191 - 196)."},
{t:"Hoàn thiện thể chế kinh tế thị trường bao gồm việc nâng cao vai trò của chủ thể nào?",o:["Nâng cao năng lực cạnh tranh.","Thúc đẩy sản xuất phát triển.","Nâng cao vị thế Việt Nam.","Đẩy mạnh, nâng cao năng lực lãnh đạo của Đảng và hệ thống chính trị."],c:3,g:"Đảng lãnh đạo là đặc trưng cốt lõi của định hướng XHCN tại Việt Nam (Xem trang 196)."},
{t:"Nội dung nào sau đây là nội dung tiên quyết để hoàn thiện thể chế kinh tế thị trường định hướng XHCN?",o:["Sở hữu, phát triển các thành phần kinh tế, các loại hình doanh nghiệp.","Bảo đảm tạo việc làm cho người lao động.","Mở rộng hoạt động kinh tế đối ngoại.","Nâng cao năng lực cạnh tranh."],c:0,g:"Quan hệ sở hữu là nền tảng của mọi thể chế kinh tế (Xem trang 191)."},
{t:"Quan điểm của Đảng và Nhà nước xác định vai trò của lợi ích kinh tế là:",o:["nguyện vọng của các chủ thể kinh tế.","trách nhiệm của các chủ thể kinh tế.","động lực trực tiếp của các chủ thể và hoạt động kinh tế xã hội.","quyền lợi của các chủ thể kinh tế."],c:2,g:"Lợi ích kinh tế thúc đẩy các cá nhân, doanh nghiệp nỗ lực hoạt động sản xuất (Xem trang 199, 200)."},
{t:"Sự khác biệt cơ bản giữa kinh tế thị trường định hướng XHCN ở Việt Nam với kinh tế thị trường tư bản chủ nghĩa nằm ở:",o:["tồn tại nhiều hình thức sở hữu.","có sự điều tiết của Nhà nước.","tồn tại nhiều hình thức phân phối.","xây dựng trên nền tảng chế độ công hữu về những tư liệu sản xuất chủ yếu."],c:3,g:"Chế độ công hữu về tư liệu sản xuất chủ yếu đảm bảo phát triển vì lợi ích nhân dân."},
{t:"Lý do trực tiếp dẫn đến sự tồn tại nhiều thành phần kinh tế hiện nay là vì:",o:["tồn tại nhiều hình thức sở hữu tư liệu sản xuất.","tồn tại nhiều hình thức phân phối.","sự phát triển của lực lượng sản xuất.","sự phát triển của quan hệ sản sản xuất."],c:0,g:"Hình thức sở hữu quyết định thành phần kinh tế tương ứng."},
{t:"Vai trò chủ yếu của lợi ích kinh tế là:",o:["động lực trực tiếp của các chủ thể kinh tế và hoạt động kinh tế - xã hội.","nguyện vọng của các chủ thể kinh tế.","trách nhiệm trực tiếp của các chủ thể kinh tế.","quyền lợi của các chủ thể kinh tế."],c:0,g:"Lợi ích kinh tế là cơ sở thúc đẩy sự phát triển các lợi ích khác (Xem trang 199)."},
{t:"Trong nền kinh tế thị trường định hướng XHCN ở Việt Nam, kinh tế nhà nước giữ vai trò:",o:["thống trị.","nền tảng.","chủ đạo.","quan trọng."],c:2,g:"Kinh tế nhà nước là lực lượng vật chất để Nhà nước điều tiết nền kinh tế (Xem trang 181)."},
{t:"Trong nền kinh tế thị trường định hướng XHCN ở Việt Nam, kinh tế tư nhân:",o:["bị xem nhẹ và bị hạn chế phát triển.","có vai trò quan trọng (là một động lực quan trọng).","đóng vai trò chủ đạo.","là hình thức sở hữu thống trị."],c:1,g:"Đảng khẳng định kinh tế tư nhân là một động lực quan trọng của nền kinh tế (Xem trang 181)."},
{t:"Đặc trưng phản ánh thuộc tính quan trọng mang tính định hướng xã hội chủ nghĩa tại Việt Nam là:",o:["Về mục tiêu.","Về quan hệ sở hữu và thành phần kinh tế.","Về quan hệ quản lý nền kinh tế và quan hệ phân phối.","Về quan hệ giữa gắn tăng trưởng kinh tế với công bằng xã hội."],c:3,g:"Đây là đặc trưng thể hiện bản chất nhân văn của chế độ (Xem trang 185)."},
{t:"Những hình thức phân phối phản ánh định hướng xã hội chủ nghĩa của nền kinh tế thị trường Việt Nam là:",o:["Phân phối công bằng các yếu tố sản xuất.","Phân phối theo lao động và hiệu quả kinh tế, phân phối theo phúc lợi.","Phân phối theo vốn và tài sản.","Phân phối dựa trên nhu cầu."],c:1,g:"Đảm bảo công bằng thông qua lao động và an sinh xã hội (Xem trang 185)."},
{t:"Nội dung nào sau đây KHÔNG đúng khi nói về vai trò chủ đạo của kinh tế nhà nước?",o:["Kinh tế nhà nước nắm giữ hầu hết các ngành, các lĩnh vực trong nền kinh tế quốc dân.","Kinh tế nhà nước là đòn bẩy thúc đẩy nền kinh tế tăng trưởng nhanh, bền vững.","Kinh tế nhà nước hướng dẫn, mở đường, hỗ trợ các thành phần kinh tế khác phát triển.","Là lực lượng vật chất để Nhà nước quản lý, điều tiết nền kinh tế."],c:0,g:"Kinh tế nhà nước chỉ nắm giữ các ngành then chốt, những lĩnh vực trọng yếu (Xem trang 214 - 220)."},
{t:"Nhận định nào sai khi nói về vai trò chủ đạo của kinh tế nhà nước ở Việt Nam?",o:["Là đòn bẩy thúc đẩy nền kinh tế tăng trưởng nhanh.","Hướng dẫn, mở đường cho thành phần khác.","Là lực lượng vật chất để quản lý vĩ mô.","Sự tăng nhanh về quy mô, số lượng các doanh nghiệp nhà nước."],c:3,g:"Vai trò chủ đạo không đồng nghĩa với việc tăng mãi số lượng doanh nghiệp nhà nước (Xem trang 214 - 220)."},
{t:"Lý do cần hoàn thiện thể chế kinh tế thị trường định hướng XHCN bao gồm:",o:["Thể chế chưa đồng bộ.","Hệ thống thể chế chưa đầy đủ.","Hiệu lực, hiệu quả còn kém.","Cả A, B và C đều đúng."],c:3,g:"Đây là tổng hợp các lý do chính được nêu trong giáo trình (Xem trang 188, 189)."},
{t:"Về mặt lịch sử, cho đến nay, loài người đã và đang trải qua bao nhiêu cuộc cách mạng công nghiệp?",o:["4","5","3","2"],c:0,g:"Loài người đã trải qua ba cuộc cách mạng công nghiệp và đang bắt đầu cuộc cách mạng công nghiệp lần thứ tư (Xem trang 225, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Nghiên cứu về cách mạng công nghiệp lần thứ nhất, C. Mác đã khái quát tính quy luật của cách mạng công nghiệp qua ba giai đoạn phát triển là:",o:["đại công nghiệp, công trường thủ công và hiệp tác giản đơn.","hiệp tác giản đơn, công trường thủ công và đại công nghiệp.","công trường thủ công, hiệp tác giản đơn và đại công nghiệp.","hiệp tác giản đơn, đại công nghiệp và công trường thủ công."],c:1,g:"Trình tự phát triển theo quy luật từ thấp đến cao là hiệp tác giản đơn, công trường thủ công và đại công nghiệp (Trang 226, 227)."},
{t:"Liên kết giữa thế giới thực và ảo, để thực hiện công việc thông minh và hiệu quả nhất là đặc trưng của cách mạng công nghiệp:",o:["lần thứ nhất.","lần thứ hai.","lần thứ ba.","lần thứ tư."],c:3,g:"Đây là đặc trưng cốt lõi của cuộc cách mạng công nghiệp lần thứ tư (Trang 229, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Sử dụng công nghệ thông tin và máy tính để tự động hóa sản xuất là đặc trưng của cách mạng công nghiệp:",o:["lần thứ nhất.","lần thứ hai.","lần thứ ba.","lần thứ tư."],c:2,g:"Đặc trưng của cách mạng công nghiệp lần thứ ba là ứng dụng công nghệ thông tin và máy tính (Trang 229)."},
{t:"Sử dụng năng lượng điện và động cơ điện, để tạo ra dây chuyền sản xuất hàng loạt là đặc trưng của cách mạng công nghiệp:",o:["lần thứ nhất.","lần thứ hai.","lần thứ ba.","lần thứ tư."],c:1,g:"Năng lượng điện và sản xuất hàng loạt gắn liền với cách mạng công nghiệp lần thứ hai (Trang 229)."},
{t:"Sử dụng năng lượng nước và hơi nước để cơ khí hóa sản xuất là đặc trưng của cách mạng công nghiệp:",o:["lần thứ nhất.","lần thứ hai.","lần thứ ba.","lần thứ tư."],c:0,g:"Đây là đặc trưng cơ bản nhất của cuộc cách mạng công nghiệp lần thứ nhất (Trang 229)."},
{t:"Những bước phát triển nhảy vọt về chất trình độ của tư liệu lao động trên cơ sở những phát minh đột phá về kỹ thuật và công nghệ... là khái niệm về:",o:["công nghiệp hóa, hiện đại hóa.","phát triển bền vững.","cách mạng công nghiệp.","hội nhập kinh tế quốc tế."],c:2,g:"Đây là định nghĩa đầy đủ về cách mạng công nghiệp (Trang 225, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Công nghiệp hóa là quá trình chuyển đổi nền sản xuất xã hội từ dựa trên lao động thủ công là chính sang nền sản xuất dựa chủ yếu trên lao động bằng máy móc nhằm:",o:["xây dựng nền kinh tế hiện đại.","thúc đẩy nền kinh tế phát triển cao.","tạo ra năng suất lao động xã hội cao.","xây dựng cơ sở hạ tầng hiện đại."],c:2,g:"Mục đích cốt lõi của công nghiệp hóa là nâng cao năng suất lao động xã hội (Trang 242)."},
{t:"\"Quá trình chuyển đổi căn bản, toàn diện các hoạt động sản xuất kinh doanh... nhằm tạo ra năng suất lao động xã hội cao\" là khái niệm về:",o:["cách mạng công nghiệp.","công nghiệp hóa, hiện đại hóa.","phát triển bền vững.","phát triển theo chiều sâu."],c:1,g:"Đây là khái niệm đầy đủ về quá trình công nghiệp hóa, hiện đại hóa (Trang 246)."},
{t:"Quá trình chuyển đổi nền sản xuất xã hội từ lao động thủ công sang lao động bằng máy móc để tạo ra năng suất cao là khái niệm về:",o:["hiện đại hóa.","công nghiệp hóa.","công nghiệp hóa, hiện đại hóa.","cơ khí hóa, điện khí hóa."],c:2,g:"Đây là cách định nghĩa ngắn gọn về bản chất của công nghiệp hóa, hiện đại hóa (Trang 246)."},
{t:"Một đặc điểm chủ yếu của công nghiệp hóa, hiện đại hóa ở Việt Nam là thực hiện mục tiêu:",o:["\"dân giàu, nước mạnh, xã hội văn minh, dân chủ, bình đẳng\".","\"dân giàu, nước mạnh, văn minh, bình đẳng, công bằng\".","\"dân giàu, nước mạnh, dân chủ, công bằng, văn minh\".","\"dân giàu, nước mạnh, bình đẳng, công bằng, dân chủ\"."],c:2,g:"Mục tiêu xuyên suốt là xây dựng xã hội \"dân giàu, nước mạnh, dân chủ, công bằng, văn minh\" (Trang 249)."},
{t:"Đặc điểm chủ yếu của công nghiệp hóa, hiện đại hóa ở Việt Nam là tiến hành trong điều kiện kinh tế thị trường:",o:["định hướng phát triển bền vững.","định hướng tăng trưởng bền vững.","định hướng phát triển theo chiều sâu.","định hướng xã hội chủ nghĩa."],c:3,g:"CNH, HĐH tại Việt Nam luôn gắn liền với định hướng chính trị xã hội chủ nghĩa (Trang 249)."},
{t:"Đặc điểm chủ yếu của công nghiệp hóa, hiện đại hóa ở Việt Nam là gắn liền với:",o:["tăng trưởng xanh.","tăng trưởng bền vững.","phát triển kinh tế tri thức.","phát triển nền kinh tế mới."],c:2,g:"Đây là một đặc điểm quan trọng trong bối cảnh cuộc cách mạng công nghiệp hiện đại (Trang 249)."},
{t:"Đối với các nước kém phát triển quá độ lên CNXH như Việt Nam, xây dựng cơ sở vật chất - kỹ thuật cho CNXH phải thực hiện từ đầu thông qua:",o:["hợp tác quốc tế.","phát triển kinh tế tri thức.","cơ khí hóa, điện khí hóa.","công nghiệp hoá, hiện đại hoá."],c:3,g:"Đây là con đường tất yếu để tạo ra nền tảng vật chất cho xã hội mới (Trang 247)."},
{t:"Nội dung CNH, HĐH ở Việt Nam là tạo lập điều kiện để chuyển đổi từ nền sản xuất - xã hội lạc hậu sang:",o:["nền sản xuất - xã hội tiến bộ.","nền sản xuất - xã hội hiện đại.","nền kinh tế thị trường.","nền kinh tế tri thức."],c:0,g:"Tạo lập tiền đề để thực hiện bước chuyển mình sang xã hội tiến bộ (Trang 249)."},
{t:"Một nội dung của CNH, HĐH ở Việt Nam là thực hiện nhiệm vụ chuyển đổi từ nền sản xuất - xã hội lạc hậu sang:",o:["nền kinh tế thị trường.","nền sản xuất - xã hội tiến bộ.","nền sản xuất - xã hội hiện đại.","nền kinh tế tri thức."],c:2,g:"Chuyển đổi căn bản trình độ sản xuất sang hướng hiện đại (Trang 249, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Một nhiệm vụ để chuyển đổi nền sản xuất hiện đại là từng bước hoàn thiện quan hệ sản xuất phù hợp với trình độ phát triển của:",o:["nền sản xuất.","lực lượng sản xuất.","phương thức sản xuất.","tư liệu sản xuất."],c:1,g:"Quan hệ sản xuất phải luôn phù hợp với sự phát triển của lực lượng sản xuất (Trang 250)."},
{t:"Nhiệm vụ chuyển đổi sang nền sản xuất hiện đại bao gồm chuyển dịch cơ cấu kinh tế theo hướng:",o:["các nước đang phát triển.","phát triển bền vững.","các nước phát triển.","hiện đại, hợp lý và hiệu quả."],c:3,g:"Cơ cấu kinh tế phải dịch chuyển sang các ngành có năng suất và hiệu quả cao (Trang 253)."},
{t:"Để CNH, HĐH thích ứng với cách mạng công nghiệp 4.0, cần hoàn thiện thể chế và xây dựng nền kinh tế trên nền tảng:",o:["của các nước đi trước.","của các nước phát triển.","đổi mới, sáng tạo.","phát triển."],c:2,g:"Đổi mới sáng tạo là nhân tố quyết định trong thời đại công nghệ số (Trang 255)."},
{t:"Nội dung nào sau đây KHÔNG phải là nhiệm vụ ứng phó với tác động tiêu cực của cách mạng công nghiệp 4.0?",o:["Thực hiện chuyển đổi số nền kinh tế và quản trị xã hội.","Đẩy mạnh công nghiệp hoá, hiện đại hoá nông nghiệp, nông thôn.","Phát triển nguồn nhân lực chất lượng cao.","Phát triển các loại hình du lịch và dịch vụ."],c:3,g:"Các nhiệm vụ ứng phó tập trung vào hạ tầng, số hóa, nông nghiệp và nhân lực (Trang 256 - 259)."},
{t:"Một trong những điều kiện của hội nhập kinh tế quốc tế là sự tương đồng giữa các nước về:",o:["chế độ kinh tế.","thể chế kinh tế.","chế độ chính trị.","thể chế chính trị."],c:1,g:"Thể chế kinh tế tương đồng giúp việc phối hợp và giao thương thuận lợi hơn (Trang 275)."},
{t:"Một vấn đề ảnh hưởng lớn đến hội nhập kinh tế quốc tế của Việt Nam hiện nay là:",o:["cơ chế thị trường chưa hoàn thiện.","cơ chế thị trường chưa ổn định.","kinh tế thị trường ở trình độ sơ khai.","kinh tế thị trường còn chưa đầy đủ."],c:0,g:"Đây là một rào cản nội tại cần khắc phục để hội nhập sâu rộng (Trang 276)."},
{t:"Một rào cản đối với hội nhập kinh tế quốc tế của Việt Nam là hệ thống luật pháp, chính sách:",o:["chưa phù hợp.","chưa đồng bộ.","chưa đầy đủ.","chưa ổn định."],c:1,g:"Hệ thống pháp luật thiếu đồng bộ gây khó khăn cho các hoạt động kinh tế quốc tế (Trang 276)."},
{t:"Một trong những vấn đề có ảnh hưởng lớn đến hội nhập kinh tế quốc tế của Việt Nam hiện nay là:",o:["môi trường kinh tế còn hạn chế.","môi trường cạnh tranh còn nhiều hạn chế.","môi trường xã hội còn phức tạp.","môi trường chính trị còn nhiều bất ổn."],c:1,g:"Năng lực cạnh tranh thấp là thách thức lớn khi tham gia sân chơi toàn cầu (Trang 276)."},
{t:"Biện pháp xây dựng nền kinh tế độc lập tự chủ đi đôi với hội nhập quốc tế là hoàn thiện đường lối chung và:",o:["đường lối chính trị, xây dựng và phát triển đất nước.","các chính sách ưu tiên phát triển kinh tế.","các chính sách ưu tiên hội nhập kinh tế quốc tế.","đường lối kinh tế, xây dựng và phát triển đất nước."],c:3,g:"Đường lối kinh tế đúng đắn là kim chỉ nam cho sự phát triển bền vững (Trang 279)."},
{t:"Để xây dựng nền kinh tế độc lập, tự chủ và hội nhập quốc tế, Việt Nam cần đẩy mạnh:",o:["xây dựng nền kinh tế độc lập, tự chủ.","phát triển kinh tế thị trường.","công nghiệp hóa, hiện đại hóa đất nước.","phát triển kinh tế tri thức."],c:2,g:"CNH, HĐH là giải pháp then chốt để tăng cường sức mạnh nội sinh (Trang 279, 280)."},
{t:"Để đẩy mạnh CNH, HĐH, một biện pháp cần tập trung là cơ cấu lại nền kinh tế, chuyển sang tăng trưởng theo:",o:["chiều rộng.","hướng bền vững.","hướng hiện đại.","chiều sâu."],c:3,g:"Tăng trưởng theo chiều sâu dựa trên năng suất và công nghệ là hướng đi bền vững (Trang 279)."},
{t:"Một giải pháp hội nhập hiệu quả là thực hiện thành công ba đột phá chiến lược gồm cải cách thể chế, phát triển hạ tầng và:",o:["phát triển nguồn nhân lực.","phát triển kinh tế.","phát triển xã hội.","cải cách chính trị."],c:0,g:"Nhân lực là nhân tố quyết định sự thành bại của quá trình phát triển (Trang 280)."},
{t:"Tiến trình hội nhập kinh tế quốc tế được chia theo mức độ từ thấp đến cao là:",o:["PTA, FTA, CU, Thị trường chung.","FTA, CU, Thị trường chung, PTA.","CU, Thị trường chung, PTA, FTA.","Thị trường chung, PTA, FTA, CU."],c:0,g:"Đây là trình tự liên kết kinh tế quốc tế theo cấp độ sâu rộng dần (Trang 263)."},
{t:"Quan điểm xây dựng nền kinh tế tự chủ dựa trên làm chủ công nghệ được nêu rõ trong chiến lược giai đoạn:",o:["2000.","2001 - 2010.","2011 - 2020.","2021 - 2030."],c:3,g:"Đây là định hướng mới nhất được khẳng định trong chiến lược phát triển kinh tế xã hội mười năm tới (Trang 279)."},
{t:"Các nhà tài phiệt sử dụng nhiều thủ đoạn như lập công ty mới, phát hành trái khoản, kinh doanh công trái, đầu cơ chứng khoán, đầu cơ ruộng đất để:",o:["thu giá trị thặng dư siêu ngạch.","thu lợi nhuận độc quyền.","thu lợi nhuận độc quyền cao.","thu lợi nhuận siêu ngạch."],c:2,g:"Tài phiệt sử dụng các thủ đoạn tài chính và đầu cơ để thu về lợi nhuận độc quyền cao (Trang 141, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Người bán không mất quyền sở hữu, người mua chỉ được quyền sử dụng trong một thời gian là đặc điểm của:",o:["tư bản hàng hóa.","tư bản sản xuất.","tư bản thương nghiệp.","tư bản cho vay."],c:3,g:"Đặc điểm của tư bản cho vay là quyền sở hữu tách rời quyền sử dụng trong một thời hạn nhất định (Trang 118)."},
{t:"Nền kinh tế trong đó sự sản sinh ra, phổ cập và sử dụng tri thức giữ vai trò quyết định nhất đối với sự phát triển kinh tế là:",o:["kinh tế tự cung tự cấp.","kinh tế hàng hóa.","kinh tế tri thức.","kinh tế thị trường."],c:2,g:"Đây là định nghĩa về nền kinh tế tri thức, lấy tri thức làm động lực chính tạo ra của cải (Trang 251)."},
{t:"Xí nghiệp A đầu tư 200.000.000 đồng, cấu tạo hữu cơ c/v = 4/1, tỷ suất m' = 100%. Vậy lượng giá trị mới là bao nhiêu?",o:["25.000.000 đồng.","30.000.000 đồng.","80.000.000 đồng.","40.000.000 đồng."],c:2,g:"c+v=200tr, c=4v => v=40tr. m'=100% => m=40tr. Giá trị mới = v + m = 40tr + 40tr = 80.000.000 đồng."},
{t:"Nhà kinh tế học Pierr Boisguillebert là đại biểu tiêu biểu của:",o:["Chủ nghĩa trọng nông.","Chủ nghĩa trọng thương.","Kinh tế chính trị cổ điển Anh.","Kinh tế chính trị tầm thường."],c:0,g:"Pierr Boisguillebert cùng với Jacques Turgot là những đại biểu của chủ nghĩa trọng nông (Trang 14)."},
{t:"Mâu thuẫn giữa lao động cụ thể và lao động trừu tượng xuất hiện khi sản phẩm tạo ra không phù hợp với:",o:["thói quen tiêu dùng.","nhu cầu xã hội.","nhu cầu cá nhân.","thị hiếu cá nhân."],c:1,g:"Xuất hiện khi sản phẩm không được xã hội chấp nhận hoặc hao phí lao động cá biệt cao hơn mức xã hội chấp nhận (Trang 42)."},
{t:"Cuộc khủng hoảng kinh tế nào sau đây dẫn tới hình thành các doanh nghiệp độc quyền?",o:["2008.","1997.","1873.","1914."],c:2,g:"Cuộc khủng hoảng năm 1873 làm phá sản hàng loạt doanh nghiệp nhỏ, thúc đẩy quá trình tích tụ và hình thành độc quyền (Trang 127)."},
{t:"Một trong những nhân tố chủ yếu ảnh hưởng đến quy mô tích lũy tư bản là:",o:["năng suất lao động xã hội.","lao động cụ thể.","lao động trừu tượng.","phân công lao động xã hội."],c:0,g:"Tăng năng suất lao động xã hội giúp tăng khối lượng giá trị thặng dư được tư bản hóa (Trang 106, 107)."},
{t:"Một trong những điều kiện để sức lao động trở thành hàng hóa là người lao động:",o:["có sức lao động.","có sức khỏe và trí tuệ.","muốn bán sức lao động.","được tự do về thân thể."],c:3,g:"Hai điều kiện là tự do về thân thể và không có tư liệu sản xuất (Trang 86, 87)."},
{t:"Sự hình thành các liên kết kinh tế quốc tế và khu vực tạo ra sân chơi chung là đặc trưng của:",o:["hội nhập kinh tế quốc tế.","kinh tế tri thức.","công nghiệp hoá, hiện đại hoá.","kinh tế thị trường."],c:0,g:"Hội nhập kinh tế quốc tế dẫn đến hình thành các khối liên kết và khu vực mậu dịch chung (Trang 273)."},
{t:"Giá trị hàng hoá biểu hiện mối quan hệ giữa những người sản xuất, trao đổi và là phạm trù có tính:",o:["lịch sử.","vĩnh viễn.","phổ biến.","đặc thù."],c:0,g:"Giá trị hàng hóa chỉ tồn tại trong các nền kinh tế sản xuất hàng hóa, nên có tính lịch sử (Trang 39)."},
{t:"Tiết kiệm tư bản bất biến là một trong những nhân tố ảnh hưởng đến:",o:["tỷ suất lợi nhuận.","tỷ suất lợi tức.","lợi nhuận bình quân.","tỷ suất lợi nhuận bình quân."],c:0,g:"Tiết kiệm c làm giảm tư bản ứng trước, từ đó làm tăng tỷ suất lợi nhuận (Trang 114)."},
{t:"Phần giá trị bù lại giá cả tư liệu sản xuất và sức lao động đã sử dụng để sản xuất ra hàng hóa gọi là:",o:["tư bản bất biến.","tư bản khả biến.","chi phí hàng hóa.","chi phí sản xuất."],c:3,g:"k = c + v, dùng để bù đắp các chi phí đầu vào của nhà tư bản (Trang 111)."},
{t:"Theo luật lưu thông tiền tệ, số lượng tiền cần thiết cho lưu thông phải thống nhất với:",o:["tiêu dùng.","lưu thông hàng hoá.","nhu cầu cá nhân.","sản xuất."],c:1,g:"Lượng tiền phát hành phải tương ứng với tổng giá cả hàng hóa lưu thông trên thị trường (Trang 71)."},
{t:"Tiền biến thành tư bản khi được dùng để mang lại:",o:["giá trị trao đổi.","giá trị.","giá trị thặng dư.","giá trị sử dụng."],c:2,g:"Mục đích cuối cùng của vận động tư bản là tạo ra m (Trang 85, 86)."},
{t:"Xí nghiệp A chi phí tư bản 100.000.000 đồng, cấu tạo hữu cơ c/v = 7/3, m' = 50%. Vậy giá trị cũ là bao nhiêu?",o:["30.000.000 đồng.","45.000.000 đồng.","15.000.000 đồng.","70.000.000 đồng."],c:3,g:"c+v=100tr, c=7/3v => 10/3v=100tr => v=30tr. Giá trị cũ là c = 100tr - 30tr = 70.000.000 đồng."},
{t:"Trong cơ cấu của độc quyền nhà nước, nhà nước đã trở thành:",o:["một doanh nghiệp độc quyền.","một tập thể tư bản khổng lồ.","một tổ chức xã hội.","một nhà tư bản lớn."],c:1,g:"Nhà nước kết hợp với các tổ chức độc quyền tư nhân để hình thành một tập thể tư bản thống trị (Trang 131)."},
{t:"Thực hiện quản trị phát triển nền kinh tế thông qua việc tạo lập môi trường kinh tế tốt nhất là vai trò của:",o:["người tiêu dùng.","người sản xuất.","chủ thể trung gian.","nhà nước."],c:3,g:"Nhà nước đóng vai trò quản lý vĩ mô và kiến tạo môi trường kinh doanh (Trang 80)."},
{t:"Trong kinh tế thị trường định hướng XHCN Việt Nam, kinh tế tư nhân là một động lực:",o:["quyết định.","chủ đạo.","quan trọng.","cơ bản."],c:2,g:"Kinh tế nhà nước giữ vai trò chủ đạo, kinh tế tư nhân là một động lực quan trọng của nền kinh tế (Trang 1)."},
{t:"Kiểm soát, ngăn ngừa các quan hệ lợi ích có ảnh hưởng tiêu cực đối với xã hội là vai trò của:",o:["Người sản xuất.","Người tiêu dùng.","Chủ thể trung gian.","Nhà nước."],c:3,g:"Nhà nước điều tiết và giải quyết các mâu thuẫn lợi ích để đảm bảo hài hòa xã hội (Trang 214-220)."},
{t:"Quá trình hình thành sự liên kết giữa các độc quyền theo chiều dọc và ngang dẫn đến sự ra đời của:",o:["syndicate và các trust.","concern và các conglomerate.","trust và các cartel.","cartel và các syndicate."],c:1,g:"Đây là các hình thức liên kết độc quyền đa ngành phát triển cao (Trang 150)."},
{t:"Quy luật kinh tế nào sau đây điều tiết quan hệ giữa bên bán và bên mua hàng hoá trên thị trường?",o:["Giá trị.","Cung - cầu.","Lưu thông tiền tệ.","Cạnh tranh."],c:1,g:"Quy luật cung - cầu trực tiếp điều tiết quan hệ trao đổi giữa người bán và người mua (Trang 70)."},
{t:"Tổng tư bản công nghiệp và thương nghiệp là 1 tỷ đồng, p' ngang = 18%, lợi nhuận công nghiệp là 162 triệu. Vậy lợi nhuận thương nghiệp là:",o:["18.000.000 đồng.","14.800.000 đồng.","148.000.000 đồng.","180.000.000 đồng."],c:0,g:"Tổng lợi nhuận p ngang = 1 tỷ * 18% = 180tr. Lợi nhuận thương nghiệp = 180tr - 162tr = 18.000.000 đồng."},
{t:"Hệ thống quy tắc, luật pháp, bộ máy quản lý và cơ chế vận hành nhằm điều chỉnh hành vi kinh tế gọi là:",o:["hệ thống kinh tế.","chế độ kinh tế.","thể chế kinh tế.","quy luật kinh tế."],c:2,g:"Đây là định nghĩa đầy đủ về thể chế kinh tế (Trang 187)."},
{t:"Cạnh tranh giữa các tổ chức độc quyền và các xí nghiệp ngoài độc quyền nhằm:",o:["thôn tính, loại bỏ các xí nghiệp độc quyền.","hỗ trợ cho các xí nghiệp ngoài độc quyền phát triển.","mở rộng thị trường cho các xí nghiệp ngoài độc quyền.","thôn tính, loại bỏ các xí nghiệp ngoài độc quyền."],c:3,g:"Các tổ chức độc quyền dùng sức mạnh để loại bỏ các đối thủ yếu hơn (Trang 135)."},
{t:"Bản chất của tích lũy tư bản là quá trình:",o:["lưu thông tiền tệ.","lưu thông hàng hoá.","tái sản xuất giản đơn.","tái sản xuất mở rộng."],c:3,g:"Tích lũy tư bản là việc biến một phần giá trị thặng dư thành tư bản phụ thêm để mở rộng sản xuất (Trang 105)."},
{t:"Sự kết hợp về nhân sự giữa tổ chức độc quyền và nhà nước được thực hiện thông qua:",o:["thị trường.","hội đồng quản trị.","các đảng phái.","doanh nghiệp."],c:2,g:"Các đảng phái chính trị là cầu nối nhân sự giữa giới tài phiệt và bộ máy nhà nước (Trang 145)."},
{t:"Phát hiện ra các quy luật chi phối quan hệ lợi ích giữa con người trong sản xuất là giá trị khoa học của:",o:["Kinh tế chính trị Mác - Lênin.","Chủ nghĩa trọng nông.","Chủ nghĩa trọng thương.","Kinh tế chính trị tầm thường."],c:0,g:"Đây là đóng góp khoa học to lớn của học thuyết kinh tế Mác - Lênin (Trang 26)."},
{t:"Quy luật kinh tế nào điều tiết khách quan mối quan hệ ganh đua kinh tế giữa các chủ thể?",o:["Lưu thông tiền tệ.","Giá trị.","Cung - cầu.","Cạnh tranh."],c:3,g:"Cạnh tranh là quy luật thúc đẩy sự ganh đua và đào thải giữa các chủ thể (Trang 72)."},
{t:"Chức năng thực tiễn của Kinh tế chính trị Mác - Lênin giúp xây dựng hoạt động kinh tế phù hợp với:",o:["xu hướng chung của thế giới.","sự quản lý của nhà nước.","quy luật khách quan.","thói quen cá nhân."],c:2,g:"Chức năng thực tiễn trang bị năng lực vận dụng đúng các quy luật khách quan vào đời sống (Trang 31)."},
{t:"Tiền trong nền sản xuất tư bản chủ nghĩa vận động theo công thức:",o:["H-H-T.","T-H-T'.","H-T-H'.","T-H-T."],c:1,g:"Tư bản vận động theo trình tự Tiền - Hàng - Tiền (có giá trị lớn hơn) (Trang 85)."},
{t:"Giá trị thặng dư trong nền kinh tế thị trường tư bản chủ nghĩa mang bản chất là quan hệ:",o:["trao đổi.","lợi ích.","xã hội.","giai cấp."],c:3,g:"Nó phản ánh quan hệ bóc lột giữa giai cấp tư sản và giai cấp công nhân làm thuê (Trang 98)."},
{t:"Sở dĩ hàng hoá có hai thuộc tính là do lao động của người sản xuất có tính hai mặt là:",o:["giản đơn và phức tạp.","cụ thể và cần thiết.","trừu tượng và giản đơn.","cụ thể và trừu tượng."],c:3,g:"Lao động cụ thể tạo ra giá trị sử dụng, lao động trừu tượng tạo ra giá trị (Trang 40)."},
{t:"Cơ sở để so sánh, trao đổi các giá trị sử dụng khác nhau là lao động:",o:["trừu tượng.","phức tạp.","cụ thể.","giản đơn."],c:0,g:"Lao động trừu tượng là sự hao phí sức lao động nói chung, là thước đo giá trị chung (Trang 41)."},
{t:"C. Mác đã kế thừa trực tiếp giá trị khoa học của học thuyết nào để phát triển lý luận về phương thức sản xuất tư bản?",o:["Chủ nghĩa trọng nông.","Kinh tế chính trị tầm thường.","Kinh tế chính trị cổ điển Anh.","Chủ nghĩa trọng thương."],c:2,g:"Mác kế thừa tinh hoa của Petty, A. Smith và David Ricardo (Trang 16)."},
{t:"Mục đích nghiên cứu ở cấp độ cao nhất của kinh tế chính trị Mác - Lênin là phát hiện ra các quy luật chi phối quan hệ:",o:["trao đổi hàng hóa.","sản xuất tư bản.","giữa người với người trong sản xuất và trao đổi.","quản lý vĩ mô của nhà nước."],c:2,g:"Đây là mục đích nghiên cứu bản chất các quan hệ xã hội trong kinh tế (Trang 24)."},
{t:"Mối quan hệ tỷ lệ giữa các ngành, các vùng và các thành phần kinh tế gọi là:",o:["chế độ kinh tế.","hệ thống kinh tế.","cơ cấu kinh tế.","thể chế kinh tế."],c:2,g:"Cơ cấu kinh tế phản ánh cấu trúc và tỷ trọng của các bộ phận kinh tế (Trang 253)."},
{t:"Kết quả của cạnh tranh trong nội bộ ngành là hình thành:",o:["giá trị sử dụng.","giá trị.","giá trị trao đổi.","giá trị thị trường."],c:3,g:"Cạnh tranh nội bộ ngành san bằng các mức hao phí lao động cá biệt thành giá trị thị trường (Trang 73)."},
{t:"Kinh tế hàng hoá hình thành khi có phân công lao động xã hội và:",o:["sự phụ thuộc lẫn nhau về mặt kinh tế.","sự phát triển của khoa học kỹ thuật.","sự tách biệt về mặt kinh tế của các chủ thể sản xuất.","sự phát triển của lực lượng sản xuất."],c:2,g:"Sự tách biệt về sở hữu đòi hỏi việc trao đổi sản phẩm phải thông qua mua bán (Trang 35, 36)."},
{t:"Kinh tế chính trị cổ điển Anh được hình thành, phát triển từ cuối thế kỷ XVIII đến nửa đầu thế kỷ XIX và kết thúc ở hệ thống lý luận của:",o:["William Petty.","A. Smith.","David Ricardo.","Montchretien."],c:2,g:"Hệ thống lý luận của David Ricardo là điểm kết thúc với nhiều giá trị khoa học của kinh tế chính trị cổ điển Anh (Trang 14)."},
{t:"Quy luật kinh tế tồn tại khách quan, không phụ thuộc vào ý chí của con người. Con người có thể:",o:["thủ tiêu quy luật kinh tế.","nhận thức và vận dụng quy luật kinh tế.","thay đổi quy luật kinh tế.","điều chỉnh hoặc xoá bỏ quy luật kinh tế."],c:1,g:"Con người không thể thay đổi hay thủ tiêu nhưng có thể nhận thức để vận dụng phục vụ lợi ích của mình (Trang 26)."},
{t:"Chính sách kinh tế tác động vào các quan hệ lợi ích và những sự tác động đó mang tính chất nào sau đây?",o:["Chủ quan.","Khách quan.","Mâu thuẫn.","Đối lập."],c:0,g:"Khác với quy luật kinh tế khách quan, chính sách kinh tế là sản phẩm của con người nên mang tính chủ quan (Trang 25)."},
{t:"Việc người lao động hình thành năng lực, kỹ năng vận dụng các quy luật kinh tế vào thực tiễn hoạt động lao động là nói đến chức năng nào của Kinh tế chính trị Mác - Lênin?",o:["Nhận thức.","Tư tưởng.","Phương pháp luận.","Thực tiễn."],c:3,g:"Chức năng thực tiễn giúp người lao động vận dụng kiến thức vào thực tế sản xuất (Trang 30)."},
{t:"Năng lực sản xuất của người lao động, được tính bằng số lượng sản phẩm sản xuất ra trong một đơn vị thời gian được gọi là:",o:["cường độ lao động.","lực lượng lao động.","năng suất lao động.","đối tượng lao động."],c:2,g:"Đây là định nghĩa về năng suất lao động tính trên đơn vị sản phẩm hoặc thời gian (Trang 43)."},
{t:"Năng lực sản xuất của người lao động, được tính bằng số lượng thời gian hao phí để sản xuất ra một đơn vị sản phẩm được gọi là:",o:["cường độ lao động.","năng suất lao động.","lực lượng lao động.","đối tượng lao động."],c:1,g:"Năng suất lao động có thể tính bằng thời gian hao phí để tạo ra 1 đơn vị sản phẩm (Trang 43)."},
{t:"Mức độ khẩn trương, tích cực của hoạt động lao động trong sản xuất được gọi là:",o:["cường độ lao động.","năng suất lao động.","lực lượng lao động.","đối tượng lao động."],c:0,g:"Cường độ lao động phản ánh mức độ khẩn trương trong quá trình sản xuất (Trang 44)."},
{t:"Lao động cụ thể và lao động trừu tượng là tính hai mặt của lao động:",o:["tư nhân.","sản xuất hàng hóa.","xã hội cần thiết.","cá biệt."],c:1,g:"C. Mác phát hiện lao động của người sản xuất hàng hóa có tính hai mặt: cụ thể và trừu tượng (Trang 40)."},
{t:"Giá cả hàng hóa là hình thức biểu hiện bằng tiền của:",o:["giá trị hàng hóa.","giá trị sử dụng của hàng hóa.","giá trị trao đổi.","giá trị thị trường."],c:0,g:"Giá cả là hình thái tiền tệ của giá trị (Trang 49)."},
{t:"Việc đưa số lượng tiền cần thiết cho lưu thông phải thống nhất với lưu thông hàng hóa là yêu cầu của quy luật:",o:["lưu thông hàng hóa.","lưu thông tiền tệ.","giá trị.","cung - cầu."],c:1,g:"Đây là yêu cầu cơ bản của quy luật lưu thông tiền tệ (Trang 71)."},
{t:"Thị trường đóng vai trò quyết định trong việc phân bố các nguồn lực xã hội là một trong những đặc trưng của:",o:["cơ cấu kinh tế.","thể chế kinh tế.","kinh tế thị trường.","kinh tế tự nhiên."],c:2,g:"Phân bố nguồn lực qua cơ chế thị trường là đặc trưng phổ biến của kinh tế thị trường (Trang 62)."},
{t:"Giá cả được hình thành theo nguyên tắc thị trường là một trong những đặc trưng chung của:",o:["kinh tế thị trường.","kinh tế tự nhiên.","thể chế kinh tế.","cơ cấu kinh tế."],c:0,g:"Trong kinh tế thị trường, giá cả do cung cầu và các yếu tố thị trường quyết định (Trang 62)."},
{t:"Giá trị hàng hóa là nội dung, là cơ sở của:",o:["giá trị sử dụng.","giá trị trao đổi.","phân phối.","tiêu dùng."],c:1,g:"Giá trị là nội dung, là cơ sở cho các quan hệ trao đổi trên thị trường (Trang 39)."},
{t:"Thực hiện quản trị phát triển nền kinh tế là vai trò của:",o:["người tiêu dùng.","người sản xuất.","các chủ thể trung gian.","nhà nước."],c:3,g:"Nhà nước quản trị phát triển bằng cách tạo lập môi trường kinh tế thuận lợi cho các chủ thể (Trang 80)."},
{t:"Lý luận giá trị thặng dư của C. Mác được trình bày cô đọng nhất trong tác phẩm nào?",o:["Chuyên luận về kinh tế chính trị.","Bộ Tư bản.","Tuyên ngôn của đảng cộng sản.","Phê phán cương lĩnh Gôta."],c:1,g:"Bộ Tư bản là tác phẩm trình bày hoàn chỉnh và cô đọng nhất lý luận này (Trang 85)."},
{t:"Tiền ứng ra ban đầu với mục đích thu được giá trị thặng dư trở thành:",o:["hàng hoá.","giá trị sử dụng.","tư bản.","giá trị trao đổi."],c:2,g:"Mục đích thu về giá trị thặng dư biến tiền thành tư bản (Trang 85)."},
{t:"Điểm khác cơ bản giữa lưu thông hàng hoá giản đơn và lưu thông tư bản chủ nghĩa là:",o:["mục đích của quá trình lưu thông.","điểm bắt đầu và kết thúc.","giới hạn lưu thông.","trình tự lưu thông."],c:0,g:"Mục đích của sản xuất hàng hóa giản đơn là giá trị sử dụng, còn của tư bản là giá trị thặng dư (Trang 85)."},
{t:"Một trong các bộ phận hợp thành giá trị của hàng hoá sức lao động là:",o:["phí tốn lao động.","chi phí hàng hoá.","chi phí sản xuất.","phí tốn đào tạo người lao động."],c:3,g:"Giá trị sức lao động gồm tư liệu sinh hoạt nuôi gia đình và phí tổn đào tạo (Trang 87)."},
{t:"Xí nghiệp A đầu tư 100.000.000 đồng, c/v = 4/1. Vậy chi phí sức lao động là bao nhiêu?",o:["40.000.000 đồng.","20.000.000 đồng.","10.000.000 đồng.","80.000.000 đồng."],c:1,g:"c+v=100tr, c=4v => 5v=100tr => v=20tr. Tư bản khả biến (v) chính là chi phí sức lao động."},
{t:"Việc làm tăng chênh lệch thu nhập giữa nhà tư bản và người lao động là hệ quả của:",o:["tích luỹ tư bản.","tích luỹ tiêu dùng.","lưu thông hàng hoá.","lưu thông tiền tệ."],c:0,g:"Một hệ quả xã hội của tích lũy tư bản là làm sâu sắc thêm sự chênh lệch thu nhập (Trang 108)."},
{t:"Xí nghiệp A chi phí 100.000.000 đồng, c/v = 3/2. Chi phí tư liệu sản xuất là:",o:["40.000.000 đồng.","60.000.000 đồng.","30.000.000 đồng.","50.000.000 đồng."],c:1,g:"c+v=100tr, c=1,5v => 2,5v=100tr => v=40tr. Suy ra c = 100 - 40 = 60 triệu (c là tư liệu sản xuất)."},
{t:"Mục tiêu, động cơ, động lực của hoạt động sản xuất kinh doanh trong nền kinh tế thị trường là:",o:["giá cả.","lợi nhuận.","thoả mãn nhu cầu xã hội.","thoả mãn nhu cầu cá nhân."],c:1,g:"Lợi nhuận là động lực thúc đẩy mọi hoạt động của các chủ thể kinh tế thị trường (Trang 112)."},
{t:"Một trong những phạm trù thể hiện lợi ích kinh tế của nhà tư bản trong kinh tế thị trường tư bản là:",o:["trao đổi hàng hoá.","giá trị hàng hoa.","tỷ suất lợi nhuận.","giá trị sử dụng."],c:2,g:"Tỷ suất lợi nhuận phản ánh hiệu quả sử dụng tư bản và lợi ích của nhà tư bản (Trang 113)."},
{t:"Cơ sở khoa học để giải quyết các quan hệ đất đai và chính sách thuế liên quan là lý luận địa tô của:",o:["C. Mác.","VI. Lênin.","A. Montchretien.","Thomas Mun."],c:0,g:"Lý luận địa tô của C. Mác là cơ sở khoa học để điều tiết và giải quyết quan hệ đất đai (Trang 121)."},
{t:"Mảnh đất 100m2, địa tô 60 triệu đồng, lãi suất ngân hàng 5%. Giá cả mảnh đất là:",o:["1.200.000.000 đồng.","1.080.000.000 đồng.","1.300.000.000 đồng.","1.480.000.000 đồng."],c:0,g:"Giá cả đất đai = Địa tô / Lãi suất = 60.000.000 / 5% = 1,2 tỷ đồng."},
{t:"Giá trị thặng dư của các nhà tư bản vừa và nhỏ bị các tổ chức lớn chiếm đoạt trong cạnh tranh tạo thành nguồn gốc của:",o:["độc quyền cao.","lợi nhuận độc quyền.","lợi nhuận bình quân.","lợi nhuận siêu ngạch."],c:1,g:"Lợi nhuận độc quyền bao gồm m của công nhân độc quyền và m của tư bản ngoài độc quyền (Trang 127, 128)."},
{t:"Độc quyền nhà nước trong chủ nghĩa tư bản hình thành nhằm phục vụ lợi ích của:",o:["xã hội.","người lao động.","độc quyền tư nhân.","tập thể."],c:2,g:"Nhà nước tư sản can thiệp để bảo vệ lợi ích cho các tổ chức độc quyền tư nhân (Trang 131)."},
{t:"Độc quyền góp phần thúc đẩy nền kinh tế phát triển theo hướng nào?",o:["tự do cạnh tranh.","sản xuất lớn hiện đại.","kinh tế tự nhiên.","sản xuất tự cấp tự túc."],c:1,g:"Độc quyền tập trung sức mạnh kinh tế để đẩy mạnh sản xuất lớn hiện đại (Trang 133)."},
{t:"Sự phát triển của lực lượng sản xuất thúc đẩy trình độ độc quyền tư nhân lên trạng thái:",o:["độc quyền công nghiệp.","độc quyền tư bản.","độc quyền ngân hàng.","độc quyền nhà nước."],c:3,g:"Độc quyền nhà nước là nấc thang phát triển cao hơn của độc quyền (Trang 129)."},
{t:"Doanh nghiệp nhà nước được hình thành bằng nguồn vốn nào dưới đây?",o:["nước ngoài.","doanh nghiệp tư nhân.","doanh nghiệp độc quyền.","ngân sách."],c:3,g:"Nhà nước dùng vốn ngân sách để xây dựng và phát triển các doanh nghiệp nhà nước (Trang 147)."},
{t:"Sức mạnh và phạm vi bành trướng của các công ty xuyên quốc gia thúc đẩy sự hình thành:",o:["độc quyền nhà nước.","độc quyền quốc tế.","độc quyền tư nhân.","tự do cạnh tranh."],c:1,g:"Sự bành trướng quốc tế dẫn đến các hình thức độc quyền xuyên quốc gia và quốc tế."},
{t:"Trong kinh tế thị trường định hướng XHCN ở Việt Nam, thị trường giữ vai trò quyết định trong:",o:["phân bố nguồn lực xã hội.","tạo lập điều kiện cho sản xuất.","phân phối sản phẩm.","thỏa mãn nhu cầu xã hội."],c:0,g:"Thị trường là cơ chế chính để phân bổ các nguồn lực trong nền kinh tế Việt Nam hiện nay."},
{t:"Nội dung tiên quyết trong hoàn thiện thể chế kinh tế thị trường ở Việt Nam là hoàn thiện thể chế:",o:["về sở hữu, phát triển các thành phần kinh tế.","phát triển các loại thị trường.","gắn tăng trưởng với công bằng xã hội.","nâng cao năng lực lãnh đạo."],c:0,g:"Hoàn thiện thể chế sở hữu là nội dung quan trọng hàng đầu trong hệ thống thể chế[cite: 5, 7]."},
{t:"Nhân tố nào sau đây KHÔNG ảnh hưởng đến quan hệ lợi ích kinh tế trong nền kinh tế thị trường?",o:["Trình độ lực lượng sản xuất.","Phong tục tập quán, truyền thống văn hóa.","Địa vị của chủ thể trong quan hệ sản xuất.","Chính sách phân phối của Nhà nước."],c:1,g:"Phong tục tập quán không phải nhân tố kinh tế trực tiếp ảnh hưởng đến các quan hệ lợi ích (Trang 205, 206)."},
{t:"Chuyển đổi từ nền sản xuất lạc hậu sang nền sản xuất tiến bộ là nội dung của:",o:["công nghiệp hóa, hiện đại hóa ở Việt Nam.","cách mạng công nghiệp lần thứ tư.","cách mạng công nghiệp lần thứ ba.","kinh tế tri thức."],c:0,g:"Đây là mục tiêu cơ bản của sự nghiệp CNH-HĐH tại Việt Nam (Trang 249)."},
{t:"Chuyển đổi nền sản xuất lạc hậu sang nền sản xuất hiện đại là một nội dung của:",o:["công nghiệp hóa, hiện đại hóa ở Việt Nam.","cách mạng công nghiệp lần thứ tư.","cách mạng công nghiệp lần thứ ba.","phát triển kinh tế tri thức."],c:0,g:"Tương tự câu 38, CNH-HĐH nhằm hiện đại hóa nền sản xuất quốc gia (Trang 249)."},
{t:"Chủ thể nào dẫn dắt tiến trình hội nhập kinh tế quốc tế và hỗ trợ các chủ thể khác cùng tham gia?",o:["Người dân.","Công ty xuyên quốc gia.","Nhà nước.","Doanh nghiệp có vốn đầu tư nước ngoài."],c:2,g:"Nhà nước đóng vai trò chủ đạo trong việc định hướng và dẫn dắt hội nhập (Trang 270)."},
{t:"Việc người lao động hình thành được năng lực, kỹ năng vận dụng các quy luật kinh tế vào thực tiễn là nói đến chức năng nào của Kinh tế chính trị Mác - Lênin?",o:["Nhận thức.","Tư tưởng.","Phương pháp luận.","Thực tiễn."],c:3,g:"Đây là biểu hiện của chức năng thực tiễn (Xem trang 30, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Thị trường đóng vai trò quyết định trong việc phân bố các nguồn lực xã hội thông qua hoạt động của các thị trường bộ phận là đặc trưng của:",o:["cơ cấu kinh tế.","thể chế kinh tế.","kinh tế thị trường.","kinh tế tự nhiên."],c:2,g:"Đây là đặc trưng phổ biến của nền kinh tế thị trường (Xem trang 62, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Lý luận giá trị thặng dư của C. Mác được trình bày cô đọng nhất trong tác phẩm nào sau đây?",o:["Chuyên luận về kinh tế chính trị.","Bộ Tư bản.","Tuyên ngôn của đảng cộng sản.","Phê phán cương lĩnh Gôta."],c:1,g:"Được trình bày cô đọng nhất trong tác phẩm Tư bản (Xem trang 85, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Điểm khác cơ bản giữa hai hình thức vận động của tiền trong sản xuất hàng hoá giản đơn và sản xuất hàng hoá tư bản chủ nghĩa là:",o:["mục đích của quá trình lưu thông.","điểm bắt đầu và kết thúc.","giới hạn của quá trình lưu thông.","trình tự của quá trình lưu thông."],c:0,g:"Điểm khác nhau cơ bản thể hiện ở mục đích của quá trình lưu thông (Xem trang 85, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Xí nghiệp A có lượng tư bản đầu tư 100.000.000 đồng, cấu tạo hữu cơ 4/1. Vậy chi phí sức lao động là bao nhiêu?",o:["40.000.000 đồng.","10.000.000 đồng.","20.000.000 đồng.","80.000.000 đồng."],c:2,g:"c+v=100tr, c/v=4/1 => v=20tr. Tư bản khả biến (v) là chi phí sức lao động."},
{t:"Việc làm tăng chênh lệch thu nhập giữa nhà tư bản và người lao động làm thuê là hệ quả của:",o:["tích luỹ tư bản.","tích luỹ tiêu dùng.","lưu thông hàng hoá.","lưu thông tiền tệ."],c:0,g:"Đây là hệ quả của quá trình tích lũy tư bản (Xem trang 108, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
{t:"Xí nghiệp A có chi phí tư bản 100.000.000 đồng, cấu tạo hữu cơ 3/2. Vậy chi phí tư liệu sản xuất là bao nhiêu?",o:["40.000.000 đồng.","60.000.000 đồng.","30.000.000 đồng.","50.000.000 đồng."],c:1,g:"c+v=100tr, c/v=3/2 => v=40tr, c=60tr. Tư bản bất biến (c) là chi phí tư liệu sản xuất."},

{t:"Sở hữu nhà nước được hình thành dưới hình thức xây dựng doanh nghiệp nhà nước bằng vốn của:",o:["nước ngoài.","doanh nghiệp tư nhân.","doanh nghiệp độc quyền.","ngân sách."],c:3,g:"Được hình thành bằng vốn của ngân sách (Xem trang 147, giáo trình Kinh tế chính trị Mác - Lênin, 2021)."},
